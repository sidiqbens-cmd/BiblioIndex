<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة الرسائل الجامعية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; padding: 5px; table-layout: fixed; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 26px; font-size: 13px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 8px; display: flex; justify-content: center; gap: 6px; border-bottom: 2px solid #2c3e50; flex-wrap: wrap; }
        .btn { padding: 5px 12px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 275px; height: calc(100vh - 285px); overflow-y: auto; padding: 10px; }
        .admin-table { border-collapse: collapse; background: #fff; font-size: 12px; width: 100%; table-layout: fixed; }
        .admin-table th { position: sticky; top: 0; background: #34495e; color: white; padding: 8px; border: 1px solid #2c3e50; }
        .admin-table td { border: 1px solid #ccc; padding: 6px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; }
        .modal-content { background:white; width:90%; margin:1% auto; padding:20px; height: 85vh; overflow-y: auto; }
        .column-wrapper { column-count: 2; column-gap: 30px; }
        * { margin: 0; padding: 0; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#34495e; color:white; padding:6px 15px;">
        <strong style="font-size: 18px;">منظومة الرسائل الجامعية</strong>
        <div style="display:flex; gap:8px;">
            <button onclick="copyRec()" class="btn" style="background:#7f8c8d">نسخ تسجيلة</button>
            <button onclick="pasteRec()" class="btn" style="background:#95a5a6">لصق تسجيلة</button>
            <button onclick="document.getElementById('xlIn').click()" class="btn" style="background:#e67e22">استيراد XLSX</button>
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير XLSX</button>
            <input type="file" id="xlIn" style="display:none" onchange="importX(event)">
            <button onclick="newP()" class="btn" style="background:#27ae60">+ مشروع جديد</button>
            <select id="pSel" style="width:160px" onchange="switchP(this.value)"></select>
            <button onclick="delP()" class="btn" style="background:#c0392b">حذف المشروع</button>
        </div>
    </div>
    <div style="background:#ecf0f1; padding:8px; border-bottom:2px solid #bdc3c7; display:flex; align-items:center; justify-content:space-between; gap:15px;">
        <div style="display:flex; align-items:center; gap:10px;">
            <strong style="color:#2c3e50;">رقم التسجيلة:</strong>
            <input type="number" id="searchID" style="width:80px; padding:5px; border:1px solid #7f8c8d; border-radius:4px; text-align:center; font-weight:bold;">
            <button type="button" class="btn" style="background:#27ae60; color:white; padding:5px 20px;" onclick="loadRec()">استرجاع</button>
        </div>
        <span id="totalCounter" style="color:#c0392b; font-weight:bold; font-size: 14pt;">[ العدد الإجمالي: 0 ]</span>
    </div>
    <form id="bForm">
        <table class="input-table" id="inputTable">
            <tr>
                <td><span class="field-label">رأس الموضوع</span><input type="text" id="subject" list="list_subject" class="in"></td>
                <td><span class="field-label">إحالة انظر</span><input type="text" id="see" list="list_subject" class="in"></td>
                <td><span class="field-label">إحالة انظر أيضاً</span><input type="text" id="see_also" list="list_subject" class="in"></td>
                <td><span class="field-label">اسم الطالب (مقلوب)</span><input type="text" id="author" list="list_author" class="in"></td>
            </tr>
            <tr>
                <td colspan="2"><span class="field-label">العنوان</span><input type="text" id="title" list="list_title" class="in"></td>
                <td><span class="field-label">المشرف</span><input type="text" id="supervisor" list="list_supervisor" class="in"></td>
                <td>
                    <span class="field-label">نوع الرسالة</span>
                    <select id="degreeType" class="in">
                        <option value="">اختر النوع</option>
                        <option value="رسالة ماجستير">رسالة ماجستير</option>
                        <option value="أطروحة دكتوراه">أطروحة دكتوراه</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><span class="field-label">القسم</span><input type="text" id="dept" list="list_dept" class="in"></td>
                <td><span class="field-label">الكلية</span><input type="text" id="faculty" list="list_faculty" class="in"></td>
                <td><span class="field-label">الجامعة</span><input type="text" id="uni" list="list_uni" class="in"></td>
                <td><span class="field-label">السنة</span><input type="text" id="year" class="in"></td>
            </tr>
        </table>
        <div id="datalistsContainer"></div>
        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ السجل</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="openBiblioWindow()">المعاينة</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runAuthorIdx()">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title', 'العناوين')">كشاف العناوين</button>
            <button type="button" class="btn" style="background:#16a085" onclick="runIdx('subject', 'الموضوعات')">كشاف الموضوعات</button>
            <button type="button" class="btn" style="background:#2980b9" onclick="runIdx('dept', 'الأقسام')">كشاف الأقسام</button>
            <button type="button" class="btn" style="background:#34495e" onclick="runIdx('faculty', 'الكليات')">كشاف الكليات</button>
            <button type="button" class="btn" style="background:#c0392b" onclick="runIdx('uni', 'الجامعات')">كشاف الجامعات</button>
        </div>
    </form>
</div>

<div id="modalOverlay"><div style="padding: 10px;"><button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق</button></div><div class="modal-content" id="modalBody"></div></div>

<div class="scroll-area">
    <table class="admin-table">
        <thead><tr><th style="width:50px;">رقم</th><th style="width:150px;">المؤلف</th><th>العنوان</th><th style="width:120px;">إجراءات</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_1'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIndex = -1;

const cleanSort = (s) => s ? s.toString().replace(/^(ال)/, '').trim() : '';

function draw() {
    document.getElementById('totalCounter').innerText = `[ العدد الإجمالي: ${recs.length} ]`;
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    updateAllDatalists();
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `<tr><td>${r.finalID||i+1}</td><td>${r.author||''}</td><td>${r.title||''}</td><td><button onclick="edit(${i})">تعديل</button><button onclick="deleteRec(${i})" style="color:red">حذف</button></td></tr>`).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
}

function updateAllDatalists() {
    const container = document.getElementById('datalistsContainer');
    // تأكد من إضافة 'supervisor' هنا
    const fields = ['subject', 'see', 'see_also', 'author', 'title', 'supervisor', 'dept', 'faculty', 'uni'];

    let html = '';
    fields.forEach(field => {
        // النظام سيبحث الآن عن قيم فريدة لـ 'supervisor' ويضعها في list_supervisor
        let values = [...new Set(recs.map(r => r[field]).filter(x => x))].sort((a,b) => cleanSort(a).localeCompare(cleanSort(b), 'ar'));
        html += `<datalist id="list_${field}">`;
        values.forEach(v => { html += `<option value="${v}">`; });
        html += `</datalist>`;
    });
    container.innerHTML = html;
}

function save() { 
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim()); 
    if(!d.subject) { alert("رأس الموضوع إلزامي"); return; } 
    if (editIndex > -1) recs[editIndex] = { ...recs[editIndex], ...d };
    else { d.finalID = recs.length + 1; recs.push(d); }
    editIndex = -1; document.getElementById('bForm').reset(); draw();
}

function edit(i) { editIndex = i; let r = recs[i]; document.querySelectorAll('.in').forEach(inp => inp.value = r[inp.id] || ''); window.scrollTo(0,0); }
function deleteRec(i) { if(confirm("حذف؟")) { recs.splice(i, 1); draw(); } }
function loadRec() { let id = document.getElementById('searchID').value; let idx = recs.findIndex(x => x.finalID == id); if(idx !== -1) edit(idx); else alert("غير موجود"); }

function runIdx(f, label) { let m = {}; recs.forEach(r => { let v = r[f]; if(v) { if(!m[v]) m[v]=[]; m[v].push(r.finalID); }}); renderIdx(m, label); }
function runAuthorIdx() { let m = {}; recs.forEach(r => { if(r.author) { if(!m[r.author]) m[r.author]=[]; m[r.author].push(r.finalID); }}); renderIdx(m, "المؤلفين"); }

function renderIdx(m, title) {
    let k = Object.keys(m).sort((a,b)=>cleanSort(a).localeCompare(cleanSort(b),'ar'));
    let h = `<h2 style="text-align:center;">كشاف ${title}</h2><div class="column-wrapper">`;
    k.forEach(x => h += `<div><b>${x}</b> (${m[x].join(', ')})</div>`);
    document.getElementById('modalBody').innerHTML = h + `</div>`;
    document.getElementById('modalOverlay').style.display='block';
}

function exportX() {
    if (recs.length === 0) {
        alert("لا توجد بيانات لتصديرها");
        return;
    }
    
    // تحويل مصفوفة البيانات إلى ورقة عمل
    const ws = XLSX.utils.json_to_sheet(recs);
    
    // إنشاء كتاب عمل جديد
    const wb = XLSX.utils.book_new();
    
    // إضافة الورقة إلى كتاب العمل
    XLSX.utils.book_append_sheet(wb, ws, "البيانات");
    
    // تصدير الملف باسم المشروع الحالي
    XLSX.writeFile(wb, (curP || "Export") + ".xlsx");
}
function importX(e) {}
function newP() { let n = prompt("المشروع:"); if(n) { projs.push(n); curP=n; recs=[]; draw(); } }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
function delP() { projs = projs.filter(p=>p!==curP); curP=projs[0]||'مشروع_1'; recs=JSON.parse(localStorage.getItem('R_'+curP))||[]; draw(); }
function closeM() { document.getElementById('modalOverlay').style.display='none'; }

function openBiblioWindow() {
    const win = window.open('', '_blank');
    let content = `<html dir="rtl"><head><title>المعاينة الببليوغرافية</title><style>
        body { font-family: 'Times New Roman', serif; padding: 30px; line-height: 1.4; font-size: 13pt; background: #fff; }
        .subject-header { background-color: #e0e0e0; text-align: center; font-weight: bold; font-size: 14pt; padding: 5px; margin: 20px 0 5px 0; }
        .ref-header { background-color: #f2f2f2; text-align: right; font-weight: bold; font-size: 14pt; padding: 5px; margin: 0; border-bottom: 1px solid #ccc; }
        .entry-container { margin-bottom: 15px; }
        .first-line { display: flex; justify-content: space-between; font-weight: bold; }
        .second-line { text-align: justify; }
    </style></head><body>`;

    let grouped = {};
    recs.forEach(r => {
        if (!grouped[r.subject]) grouped[r.subject] = { records: [], see: [], see_also: [] };
        if (r.subject) {
            if (r.see) grouped[r.subject].see.push(r.see);
            if (r.see_also) grouped[r.subject].see_also.push(r.see_also);
            grouped[r.subject].records.push(r);
        }
    });

    let sortedSubjects = Object.keys(grouped).sort((a,b) => cleanSort(a).localeCompare(cleanSort(b), 'ar'));

    sortedSubjects.forEach(sub => {
        content += `<div class="subject-header">${sub}</div>`;
        
        // معالجة "انظر"
        if (grouped[sub].see.length > 0) {
            grouped[sub].see.sort((a,b) => cleanSort(a).localeCompare(cleanSort(b), 'ar')).forEach(s => {
                content += `<div class="ref-header">انظر: ${s}</div>`;
            });
        }
        // معالجة "انظر أيضاً"
        if (grouped[sub].see_also.length > 0) {
            grouped[sub].see_also.sort((a,b) => cleanSort(a).localeCompare(cleanSort(b), 'ar')).forEach(s => {
                if(grouped[s]) { // التأكد أن الرأس مستخدم فعلاً
                    content += `<div class="ref-header" style="font-size: 13pt;">انظر أيضاً: ${s}</div>`;
                }
            });
        }

        grouped[sub].records.forEach(r => {
            let line2 = `${r.title || ''}`; // العنوان دائماً موجود
            // نجمع الأجزاء التي تحتوي على بيانات فقط
            let details = [];
            if (r.supervisor) details.push(`إشراف ${r.supervisor}`);
            if (r.dept) details.push(`قسم ${r.dept}`);
            if (r.faculty) details.push(`كلية ${r.faculty}`);
            if (r.uni) details.push(`جامعة ${r.uni}`);
            if (r.year) details.push(`${r.year}`);

            // الآن ندمجهم: الفواصل بين البيانات، والشرطة قبل نوع الرسالة
            if (details.length > 0) {
            line2 += ` . ـــ ${details.join(' ، ')}`;
            }
            if (r.degreeType) {
                line2 += ` . — ${r.degreeType}`;
            }

            content += `<div class="entry-container">
                <div class="first-line"><span>${r.author || 'بدون مؤلف'}</span><span>(${r.finalID || ''})</span></div>
                <div class="second-line">${line2}</div>
            </div>`;
        });
    });

    win.document.write(content + '</body></html>');
    win.document.close();
}

function copyRec() {
    let d = {}; 
    document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    localStorage.setItem('BIB_CLIP', JSON.stringify(d));
    alert("تم نسخ البيانات الحالية في الحافظة");
}

function pasteRec() {
    let data = JSON.parse(localStorage.getItem('BIB_CLIP'));
    if (data) {
        document.querySelectorAll('.in').forEach(i => { if (data[i.id]) i.value = data[i.id]; });
        alert("تم لصق البيانات");
    } else { alert("لا توجد بيانات منسوخة"); }
}

window.onload = draw;
</script>
</body>
</html>
