<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الفهرس الليبي الموحد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; padding: 5px; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; }
        .field-label { font-size: 10px; font-weight: bold; color: #333; display: block; }
        input, select { width: 100%; height: 22px; font-size: 11px; border: 1px solid #999; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 4px; display: flex; justify-content: center; gap: 3px; flex-wrap: wrap; }
        .btn { padding: 3px 8px; cursor: pointer; border: none; border-radius: 2px; color: #fff; font-size: 10px; font-weight: bold; }
        .scroll-area { margin-top: 180px; height: calc(100vh - 190px); overflow-y: auto; padding: 5px; }
        .admin-table { width: 100%; border-collapse: collapse; background: #fff; font-size: 11px; }
        .admin-table th, .admin-table td { border: 1px solid #ccc; padding: 3px; text-align: right; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="color:white; font-weight:bold; margin-bottom:5px;">الفهرس الليبي الموحد - [ العدد: <span id="totalCounter">0</span> ]</div>
    <table class="input-table" id="inputTable">
        <tr>
            <td><span class="field-label">الموضوع</span><input type="text" id="subject" class="in" list="list_subject"></td>
            <td><span class="field-label">اسم الطالب</span><input type="text" id="author" class="in" list="list_author"></td>
            <td><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
            <td><span class="field-label">الجامعة</span><input type="text" id="uni" class="in" list="list_uni"></td>
        </tr>
        <tr>
            <td><span class="field-label">الكلية</span><input type="text" id="faculty" class="in" list="list_faculty"></td>
            <td><span class="field-label">القسم</span><input type="text" id="dept" class="in" list="list_dept"></td>
            <td><span class="field-label">السنة</span><input type="text" id="year" class="in"></td>
            <td><span class="field-label">إشراف</span><input type="text" id="editor" class="in"></td>
        </tr>
    </table>
    <datalist id="list_subject"></datalist>
    <datalist id="list_author"></datalist>
    <datalist id="list_uni"></datalist>
    <datalist id="list_faculty"></datalist>
    <datalist id="list_dept"></datalist>

    <div class="actions">
        <button class="btn" style="background:#27ae60" onclick="save()">حفظ</button>
        <button class="btn" style="background:#8e44ad" onclick="openBiblio()">معاينة</button>
        <button class="btn" style="background:#2980b9" onclick="exportData()">تصدير</button>
        <button class="btn" style="background:#c0392b" onclick="runIdx('dept','الأقسام')">كشاف الأقسام</button>
        <button class="btn" style="background:#d35400" onclick="runIdx('faculty','الكليات')">كشاف الكليات</button>
    </div>
</div>

<div class="scroll-area"><table class="admin-table" id="adminBody"></table></div>

<script>
let recs = JSON.parse(localStorage.getItem('THESES_DATA')) || [];

function save() {
    let d = {}; 
    document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    recs.push(d);
    localStorage.setItem('THESES_DATA', JSON.stringify(recs));
    updateLists();
    drawTable();
}

function updateLists() {
    ['subject', 'author', 'uni', 'faculty', 'dept'].forEach(f => {
        let list = document.getElementById('list_' + f);
        let vals = [...new Set(recs.map(r => r[f]).filter(v => v))];
        list.innerHTML = vals.map(v => `<option value="${v}">`).join('');
    });
}

function drawTable() {
    document.getElementById('totalCounter').innerText = recs.length;
    let b = document.getElementById('adminBody');
    b.innerHTML = recs.map(r => `<tr><td>${r.subject}</td><td>${r.author}</td><td>${r.title}</td><td>${r.dept}</td></tr>`).join('');
}

function runIdx(f, title) {
    let win = window.open('', '_blank');
    let m = {};
    recs.forEach(r => { if(r[f]) { if(!m[r[f]]) m[r[f]] = []; m[r[f]].push(r.author); }});
    let h = `<div dir="rtl"><h2>كشاف ${title}</h2>`;
    Object.keys(m).sort().forEach(k => h += `<div><b>${k}</b>: ${m[k].join(', ')}</div>`);
    win.document.write(h);
}

function exportData() {
    let ws = XLSX.utils.json_to_sheet(recs);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Data");
    XLSX.writeFile(wb, "Theses_Export.xlsx");
}

window.onload = () => { updateLists(); drawTable(); };
</script>
</body>
</html>
