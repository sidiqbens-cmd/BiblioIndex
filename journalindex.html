<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الفهرسة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; overflow: hidden; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; padding: 2px; table-layout: fixed; border-spacing: 2px; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 1px; }
        input, select { width: 100%; height: 24px; font-size: 12px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 5px; display: flex; justify-content: center; gap: 4px; }
        .btn { padding: 4px 10px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 11px; font-weight: bold; }
        .scroll-area { margin-top: 170px; height: calc(100vh - 180px); overflow-y: auto; padding: 5px; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; }
        .admin-table td, th { border: 1px solid #ccc; padding: 4px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="background:#34495e; color:white; padding:5px 15px; display:flex; justify-content:space-between; align-items:center;">
        <strong style="font-size: 16px;">نظام إدارة المدخلات</strong>
        <div style="display:flex; gap:5px;">
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير Excel</button>
            <button onclick="importX()" class="btn" style="background:#27ae60">استيراد</button>
            <select id="pSel" style="width:120px;" onchange="switchP(this.value)"></select>
            <button onclick="newP()" class="btn" style="background:#27ae60">+ جديد</button>
        </div>
    </div>

    <form id="bForm">
        <table class="input-table">
            <tr style="background:#b3b3b3;">
                <td colspan="3"><span class="field-label">تصنيف المئات</span><select id="dewey100" onchange="updateDewey10()"></select></td>
                <td colspan="3"><span class="field-label">تصنيف العشرات</span><select id="dewey10"></select></td>
            </tr>
            <tr>
                <td><span class="field-label">المؤلف (مقلوب)</span><input type="text" id="author" class="in"></td>
                <td colspan="2"><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
                <td><span class="field-label">المجلة</span><input type="text" id="journal" class="in"></td>
                <td><span class="field-label">التبعية</span><input type="text" id="affiliation" class="in"></td>
                <td><span class="field-label">مترجمون</span><input type="text" id="translator" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">مشاركون</span><input type="text" id="collab" class="in"></td>
                <td><span class="field-label">السنة</span><input type="text" id="year" class="in"></td>
                <td><span class="field-label">العدد</span><input type="text" id="issue" class="in"></td>
                <td><span class="field-label">الصفحات</span><input type="text" id="pages" class="in"></td>
                <td colspan="2"><span class="field-label">ملاحظات</span><input type="text" id="notes" class="in"></td>
            </tr>
        </table>

        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ السجل</button>
            <button type="button" class="btn" style="background:#34495e" onclick="copyRec()">نسخ</button>
            <button type="button" class="btn" style="background:#34495e" onclick="pasteRec()">لصق</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="openBiblio()">معاينة الببليوغرافيا</button>
        </div>
    </form>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead><tr><th>ت</th><th>التصنيف</th><th>المحتوى</th><th>إجراء</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
const deweyData = {
    "000 المعارف العامة": ["000 العموميات", "001 المعرفة", "002 الكتاب", "003 النظم", "004 معالجة البيانات ،علم الحاسوب", "005 برمجة الحاسوب ،البرامج و البيانات", "006 طرق حاسوبية خاصة", "010 الببليوجرافيا", "011 الببليوجرافيات العامة", "012 ببليوجرافيات الأفراد", "013 ببليوجرافيات الأعمال لفئات معينة من المؤلفين", "014 ببليوجرافيات الأعمال مجهولة المؤلف", "015 ببليوجرافيات الأعمال المكانية", "016 الببليوجرافيات الموضوعية", "017 الفهارس الموضوعية العامة", "018 الفهارس المرتبة بالمؤلف أو التاريخ", "019 الفهارس القاموسية", "020 علوم المكتبات و المعلومات", "021 العلاقات بين المكتبات و الأرشيفات و مراكز المعلومات", "022 إدارة المبنى", "023 إدارة العاملين", "025 العمليات الفنية المكتبية", "026 المكتبات لموضوعات معينة", "027 المكتبات العمومية", "028 القراءة و إستخدام وسائط المعلومات الأخرى", "030 الأعمال الموسوعية العامة", "031 الموسوعات العربية", "032 الموسوعات الإنجليزية", "050 الأعمال الدورية العامة", "060 المنظمات العامة و علم المتاحف", "070 الرسائل الإخبارية ، الصحافة ، النشر", "080 المجموعات العامة", "090 المخطوطات و الكتب النادرة"],
    "100 الفلسفة وعلم النفس": ["100 الفلسفة", "110 الميتافيزيقا (ما وراء الطبيعة )", "120 نظرية المعرفة ، السببية ، الجنس البشري", "130 الظواهر الخارقة", "140 مدارس فلسفية معينة", "150 علم النفس", "160 علم المنطق", "170 علم الأخلاق و الفلسفة الأخلاقية", "180 الفلسفات القديمة ، و الوسيطة و الشرقية", "190 الفلسفة الحديثة و المعاصرة"],
    "200 الأديان": ["200 الأديان", "210 الدين الإسلامي و علومه", "211 القواعد و التعاليم الإسلامية", "212 الأخلاقيات و الأداب الأسلامية", "213 الدعوة الإسلامية", "214 الثقافة الإسلامية", "215 المساجد و المزارات", "220 القرأن الكريم", "230 الحديث الشريف", "239 السيرة النبوية", "240 علم أصول الدين (التوحيد)", "250 الفقة الإسلامى و أصوله", "260 التصوف الإسلامي", "270 المباحث العامة فى المسيحية", "280 الكنائس و الطوائف المسيحية", "290 الدين المقارن", "296 اليهودية"],
    "300 العلوم الاجتماعية": ["300 العلوم الاجتماعية", "310 مجموعة الإحصاءات العامة", "320 علم السياسة", "330 علم الاقتصاد", "340 القانون", "350 الإدارة العامة و العلوم العسكرية", "360 المشكلات و الخدمات الاجتماعية", "370 التربية والتعليم", "380 التجارة ، الاتصالات ، النقل", "390 العادات ،الاتيكيت ، الفلكلور"],
    "400 اللغات": ["400 اللغات", "410 اللغة العربية", "411 الكتابة و الأصوات", "413 المعاجم العربية", "414 علم البلاغة العربية", "415 قواعد اللغة العربية", "420 اللغة الإنجليزية الحديثة و القديمة", "430 اللغات الجرمانية الألمانية", "440 اللغات الرومانسية الفرنسية", "450 اللغات الإيطالية الرومانية", "460 اللغتان الأسبانية و البرتغالية", "470 اللغات اللاتينية", "480 اللغات اليونانية الكلاسيكية", "490 اللغات الأفرو أسيوية السامية"],
    "500 العلوم الطبيعية": ["500 العلوم الطبيعية", "510 الرياضيات", "520 الفلك و العلوم ذات العلاقة", "530 الفيزياء", "540 الكيمياء و العلوم ذات العلاقة", "550 علم الأرض", "560 علم الحفريات", "570 علوم الحياة ، الأحياء", "580 النباتات", "590 الحيوانات"],
    "600 العلوم التطبيقية": ["600 العلوم التطبيقية", "610 العلوم الطبية - الطب", "620 الهندسة و العمليات ذات العلاقة", "630 الزراعة و التكنولوجيات ذات العلاقة", "640 الاقتصاد المنزلي و الحياة الاسرية", "650 إدارة الأعمال و الخدمات المساعدة", "657 المحاسبة", "658 إدارة الأعمال", "660 الهندسة الكيميائية", "670 الصناعات", "680 الصناعات لأغراض معينة", "686 الطباعة و الأنشطة ذات العلاقة", "690 المباني"],
    "700 الفنون": ["700 الفنون", "710 التصميم العمراني", "720 العمارة", "730 الفنون التشكيلية", "740 الرسم و الفنون الزخرفية", "750 التصوير و اللوحات", "770 التصوير الفوتوغرافي", "780 الموسيقى", "790 الفنون الترفيهية و الأدائية"],
    "800 الآداب": ["800 الآداب", "810 الأدب العربي", "811 الشعر العربي", "812 الدراما العربية", "813 القصص العربي", "820 الأداب الناطقة بالإنجليزية", "830 أداب اللغة الجرمانية", "840 أداب اللغة الرومانسية", "850 أداب البغات الإيطالية", "860 الأداب الأسبانية و البرتغالية", "870 الأداب الإيطالية القديمة - اللاتينية", "880 الأدب اليوناني الكلاسيكي", "890 أداب اللغات الأخري"],
    "900 التاريخ والجغرافيا": ["900 التاريخ والجغرافيا", "910 الجغرافيا و الرحلات", "920 التراجم و الأنساب و الشارات", "930 تاريخ العالم القديم حتى حوالي 499م", "940 تاريخ أوروبا العام", "950 تاريخ أسيا العام", "953 التاريخ العام للعرب و المسلمين", "960 تاريخ أفريقيا العام", "961 تونس و ليبيا", "970 تاريخ أمريكا الشمالية العام", "980 تاريخ أمريكا الجنوبية العام", "990 التاريخ العام للمناطق الأخري"]
};

let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_جديد'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIdx = -1;
let clipboard = null;

function updateDewey10() {
    let m = document.getElementById('dewey100').value;
    document.getElementById('dewey10').innerHTML = (deweyData[m] || []).map(x => `<option value="${x}">${x}</option>`).join('');
}

function draw() {
    recs.sort((a,b) => (a.dewey10 || "").localeCompare(b.dewey10 || "") || (a.author || "").localeCompare(b.author || "", 'ar'));
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `
        <tr>
            <td>${i+1}</td>
            <td>${r.dewey10 || ""}</td>
            <td style="text-align:right"><b>${r.author}</b> - ${r.title}</td>
            <td><button onclick="edit(${i})">تعديل</button> <button onclick="del(${i})">حذف</button></td>
        </tr>`).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
}

function save() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value);
    d.dewey100 = document.getElementById('dewey100').value;
    d.dewey10 = document.getElementById('dewey10').value;
    if(!d.author || !d.title) return alert("المؤلف والعنوان مطلوبان");
    if(editIdx > -1) recs[editIdx] = d; else recs.push(d);
    editIdx = -1; document.getElementById('bForm').reset(); updateDewey10(); draw();
}

function copyRec() {
    clipboard = {}; document.querySelectorAll('.in').forEach(i => clipboard[i.id] = i.value);
    alert("تم النسخ");
}

function pasteRec() {
    if(!clipboard) return;
    document.querySelectorAll('.in').forEach(i => i.value = clipboard[i.id] || "");
}

function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${curP}.xlsx`); }

function importX() {
    let input = document.createElement('input'); input.type = 'file';
    input.onchange = e => {
        let reader = new FileReader();
        reader.onload = ev => {
            let wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            recs = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            draw();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };
    input.click();
}

function openBiblio() {
    const win = window.open('', '_blank');
    let html = `<html dir="rtl"><body>`;
    recs.forEach((r, idx) => {
        let auth = r.author + (r.collab ? ` ، ${r.collab}` : "") + (r.translator ? ` ؛ ترجمة ${r.translator}` : "");
        html += `<p>${idx+1}. <b>${r.title}</b> / ${auth}. ـــ ${r.journal} (${r.affiliation})، ${r.year}، ع ${r.issue}. ـــ ص ${r.pages}.</p>`;
    });
    win.document.write(html + "</body></html>"); win.document.close();
}

function edit(i) {
    editIdx = i; let r = recs[i];
    document.getElementById('dewey100').value = r.dewey100; updateDewey10();
    document.getElementById('dewey10').value = r.dewey10;
    document.querySelectorAll('.in').forEach(inp => { if(r[inp.id]) inp.value = r[inp.id]; });
}

function del(i) { if(confirm("حذف؟")) { recs.splice(i,1); draw(); } }
function newP() { let n = prompt("الاسم:"); if(n) { projs.push(n); curP=n; recs=[]; draw(); } }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }

window.onload = () => { 
    document.getElementById('dewey100').innerHTML = Object.keys(deweyData).map(x => `<option value="${x}">${x}</option>`).join('');
    updateDewey10(); draw(); 
};
</script>
</body>
</html>
