<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الفهرس الليبي الموحد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; overflow: hidden; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; padding: 2px; table-layout: fixed; border-spacing: 2px; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 1px; }
        input, select { width: 100%; height: 24px; font-size: 12px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 5px; display: flex; justify-content: center; gap: 4px; }
        .btn { padding: 4px 10px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 11px; font-weight: bold; }
        .scroll-area { margin-top: 155px; height: calc(100vh - 165px); overflow-y: auto; padding: 5px; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; }
        .admin-table td, th { border: 1px solid #ccc; padding: 4px; font-size: 12px; text-align: center; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; }
        #modalBody { background:white; width:90%; margin:20px auto; padding:20px; height:80vh; overflow:auto; border-radius:8px; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="background:#34495e; color:white; padding:5px 15px; display:flex; justify-content:space-between; align-items:center;">
        <strong style="font-size: 16px;">الفهرس الليبي الموحد</strong>
        <div style="display:flex; gap:5px;">
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير Excel</button>
            <button onclick="importX()" class="btn" style="background:#27ae60">استيراد</button>
            <select id="pSel" style="width:120px;" onchange="switchP(this.value)"></select>
            <button onclick="newP()" class="btn" style="background:#27ae60">+ جديد</button>
        </div>
    </div>

    <form id="bForm">
        <table class="input-table">
            <tr style="background:#b3b3b3;">
                <td colspan="3"><span class="field-label">تصنيف المئات</span><select id="dewey100" onchange="updateDewey10()"></select></td>
                <td colspan="3"><span class="field-label">تصنيف العشرات</span><select id="dewey10"></select></td>
            </tr>
            <tr>
                <td><span class="field-label">المؤلف (مقلوب)</span><input type="text" id="author" class="in"></td>
                <td colspan="2"><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
                <td><span class="field-label">المجلة</span><input type="text" id="journal" class="in" list="jList"></td>
                <td><span class="field-label">التبعية</span><input type="text" id="affiliation" class="in"></td>
                <td><span class="field-label">مترجمون</span><input type="text" id="translator" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">مشاركون</span><input type="text" id="collab" class="in"></td>
                <td><span class="field-label">السنة</span><input type="text" id="year" class="in"></td>
                <td><span class="field-label">العدد</span><input type="text" id="issue" class="in"></td>
                <td><span class="field-label">الصفحات</span><input type="text" id="pages" class="in"></td>
                <td colspan="2"><span class="field-label">ملاحظات</span><input type="text" id="notes" class="in"></td>
            </tr>
        </table>

        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ</button>
            <button type="button" class="btn" style="background:#34495e" onclick="copyRec()">نسخ</button>
            <button type="button" class="btn" style="background:#34495e" onclick="pasteRec()">لصق</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="openBiblio()">ببليوغرافيا</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runIdx('author')">كشاف مؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title')">كشاف عناوين</button>
            <button type="button" class="btn" style="background:#16a085" onclick="runIdx('translator')">كشاف مترجمين</button>
        </div>
    </form>
</div>

<datalist id="jList"></datalist>
<div id="modalOverlay"><div style="padding:10px;"><button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق</button></div><div id="modalBody"></div></div>

<div class="scroll-area">
    <table class="admin-table">
        <thead><tr><th>ت</th><th>التصنيف</th><th>المحتوى</th><th>إجراء</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
// دمج كل التصنيفات التي أرسلتها سابقاً
const deweyData = {
    "000 المعارف العامة": ["000 العموميات", "001 المعرفة", "002 الكتاب", "003 النظم", "004 معالجة البيانات ،علم الحاسوب", "005 برمجة الحاسوب ،البرامج و البيانات", "006 طرق حاسوبية خاصة", "010 الببليوجرافيا", "011 الببليوجرافيات العامة", "012 ببليوجرافيات الأفراد", "013 ببليوجرافيات الأعمال لفئات معينة من المؤلفين", "014 ببليوجرافيات الأعمال مجهولة المؤلف ، و الأعمال ذات الأسماء المستعارة", "015 ببليوجرافيات الأعمال المكانية", "016 الببليوجرافيات الموضوعية", "017 الفهارس الموضوعية العامة", "018 الفهارس المرتبة بالمؤلف أو التاريخ ،ألخ", "019 الفهارس القاموسية", "020 علوم المكتبات و المعلومات", "021 العلاقات بين المكتبات و الأرشيفات و مراكز المعلومات", "022 إدارة المبنى", "023 إدارة العاملين", "025 العمليات الفنية المكتبية", "026 المكتبات لموضوعات معينة", "027 المكتبات العمومية", "028 القراءة و إستخدام وسائط المعلومات الأخرى", "030 الأعمال الموسوعية العامة", "031 الموسوعات العربية", "032 الموسوعات الإنجليزية", "033 الموسوعات باللغات الألمانية", "034 الموسوعات بالغات الفرنسية و البروفنسالية", "035 الموسوعات باللغات الإيطالية و الرومانية", "036 الموسوعات باللغات الأسبانية و البرتغالية", "037 الموسوعات باللغات السلافية", "038 الموسوعات بالغات الاسكندنافية", "039 الموسوعات بلغات أخرى", "050 الأعمال الدورية العامة", "051 الأعمال الدورية باللغات العربية", "052 الأعمال الدورية باللغة الإنجليزية", "053 الأعمال الدورية باللغات الألمانية", "054 الأعمال الدورية باللغات الفرنسية", "055 الأعمال الدورية باللغات الإيطالية", "056 الأعمال الدورية باللغتين الأسبانية و البرتغالية", "057 الأعمال الدورية بالغات السلافية", "058 الأعمال الدورية باللغات الاسكندنافية", "059 الأعمال الدورية بلغات أخرى", "060 المنظمات العامة و علم المتاحف", "061 المنظمات فى العالم العربى", "062 المنظمات فى المملكة المتحدة و أمريكا الشمالية", "063 المنظمات فى وسط أوروبا و فى ألمانيا", "064 المنظمات فى فرنسا و موناكو", "065 المنظمات فى إيطاليا", "066 المنظمات فى شبة جزيرة أيبيريا و الجزر الملاصقة", "067 المنظمات فى أوروبا الشرقية و فى روسيا", "068 المنظمات فى مناطق أخرى", "069 علم المتاحف", "070 الرسائل الإخبارية ، الصحافة ، النشر", "071 الصحافة و الصحف فى العالم العربي", "072 الصحافة فى الجزر البريطانية و أمريكا الشمالية", "073 الصحافة فى أوروبا الوسطى و ألمانيا", "074 الصحافة فى فرنسا و موناكو", "075 الصحافة فى إيطاليا", "076 الصحافة فى شبة جزيرة أيبيريا و الجزر الملاصقة", "077 الصحافة فى أوروبا الشرقية و فى روسيا", "078 الصحافة فى اسكندنافيا", "079 الصحافة فى المناطق الأخرى", "080 المجموعات العامة", "081 العربية", "090 المخطوطات و الكتب النادرة"],
    "100 الفلسفة وعلم النفس": ["100 الفلسفة", "101 نظرية الفلسفة", "110 الميتافيزيقا", "120 نظرية المعرفة", "130 الظواهر الخارقة", "140 مدارس فلسفية معينة", "150 علم النفس", "160 علم المنطق", "170 علم الأخلاق", "180 الفلسفات القديمة", "190 الفلسفة الحديثة"],
    "200 الأديان": ["200 الأديان", "210 الدين الإسلامي و علومه", "211 القواعد و التعاليم الإسلامية", "212 الأخلاقيات و الأداب الأسلامية", "213 الدعوة الإسلامية", "214 الثقافة الإسلامية", "215 المساجد و المزارات", "216 الدفاع عن الإسلام", "217 قضايا الإحياء و الإصلاح و التجديد", "218 حركات الإحياء و الإصلاح و التجديد فى العالم العربي", "219 حركات الإحياء و التجديد خارج العالم العربي", "220 القرأن الكريم", "221 نزول القرأن", "227 تفسير القرأن", "230 الحديث الشريف", "239 السيرة النبوية", "240 علم أصول الدين (التوحيد)", "250 الفقة الإسلامى و أصوله", "260 التصوف الإسلامي", "270 المسيحية", "290 الدين المقارن", "296 اليهودية"],
    "300 العلوم الاجتماعية": ["300 العلوم الاجتماعية", "301 علم النفس و الأنثروبولوجيا", "310 الإحصاءات العامة", "320 علم السياسة", "330 علم الاقتصاد", "340 القانون", "350 الإدارة العامة", "360 الخدمات الاجتماعية", "370 التربية والتعليم", "380 التجارة و النقل", "390 العادات والفلكلور"],
    "400 اللغات": ["400 اللغات", "410 اللغة العربية", "415 قواعد اللغة العربية", "420 اللغة الإنجليزية", "440 اللغة الفرنسية", "490 لغات أخرى"],
    "500 العلوم الطبيعية": ["500 العلوم الطبيعية", "510 الرياضيات", "520 الفلك", "530 الفيزياء", "540 الكيمياء", "550 علم الأرض", "570 الأحياء", "580 النبات", "590 الحيوان"],
    "600 العلوم التطبيقية": ["600 العلوم التطبيقية", "610 الطب", "620 الهندسة", "630 الزراعة", "640 الاقتصاد المنزلي", "650 إدارة الأعمال", "657 المحاسبة", "660 الهندسة الكيميائية", "690 المباني"],
    "800 الآداب": ["800 الآداب", "810 الأدب العربي", "811 الشعر العربي", "813 القصص العربي", "820 الأدب الإنجليزي", "840 الأدب الفرنسي", "890 آداب أخرى"],
    "900 التاريخ والجغرافيا": ["900 التاريخ والجغرافيا", "910 الجغرافيا والرحلات", "920 التراجم والأنساب", "930 العالم القديم", "953 التاريخ العربي والإسلامي", "961 تونس وليبيا", "999 العوالم الخارجية"]
};

let projs = JSON.parse(localStorage.getItem('L_P')) || ['كشاف_المجلات'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIdx = -1;
let clipboard = null;

function updateDewey10() {
    let m = document.getElementById('dewey100').value;
    document.getElementById('dewey10').innerHTML = (deweyData[m] || []).map(x => `<option value="${x}">${x}</option>`).join('');
}

function draw() {
    recs.sort((a,b) => (a.dewey10 || "").localeCompare(b.dewey10 || "") || (a.author || "").localeCompare(b.author || "", 'ar'));
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `
        <tr>
            <td>${i+1}</td>
            <td>${r.dewey10 || ""}</td>
            <td style="text-align:right"><b>${r.author}</b> - ${r.title}</td>
            <td><button onclick="edit(${i})">تعديل</button> <button onclick="del(${i})">حذف</button></td>
        </tr>`).join('');
    
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
    
    // قائمة المجلات التلقائية
    let js = [...new Set(recs.map(r=>r.journal))].filter(j=>j);
    document.getElementById('jList').innerHTML = js.map(j=>`<option value="${j}">`).join('');
}

function save() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value);
    d.dewey100 = document.getElementById('dewey100').value;
    d.dewey10 = document.getElementById('dewey10').value;
    if(!d.author || !d.title) return alert("المؤلف والعنوان مطلوبان");
    if(editIdx > -1) recs[editIdx] = d; else recs.push(d);
    editIdx = -1; document.getElementById('bForm').reset(); updateDewey10(); draw();
}

function copyRec() {
    clipboard = {}; document.querySelectorAll('.in').forEach(i => clipboard[i.id] = i.value);
    alert("تم نسخ البيانات الحالية");
}

function pasteRec() {
    if(!clipboard) return alert("لا يوجد بيانات منسوخة");
    document.querySelectorAll('.in').forEach(i => i.value = clipboard[i.id] || "");
}

function importX() {
    let input = document.createElement('input');
    input.type = 'file';
    input.onchange = e => {
        let file = e.target.files[0];
        let reader = new FileReader();
        reader.onload = event => {
            let data = new Uint8Array(event.target.result);
            let workbook = XLSX.read(data, {type: 'array'});
            let firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            let json = XLSX.utils.sheet_to_json(firstSheet);
            recs = json; draw(); alert("تم الاستيراد بنجاح");
        };
        reader.readAsArrayBuffer(file);
    };
    input.click();
}

function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${curP}.xlsx`); }

function openBiblio() {
    const win = window.open('', '_blank');
    let html = `<html dir="rtl"><head><style>body{font-family:'Times New Roman'; padding:40px; line-height:1.6;}</style></head><body>`;
    recs.forEach((r, idx) => {
        let authors = r.author;
        if(r.collab) authors += ` ، ${r.collab}`;
        if(r.translator) authors += ` ؛ ترجمة ${r.translator}`;
        html += `<p>${idx+1}. <b>${r.title}</b> / ${authors}. ـــ ${r.journal}، ${r.year}، ع ${r.issue}. ـــ ص ${r.pages}.</p>`;
    });
    win.document.write(html + "</body></html>"); win.document.close();
}

function runIdx(type) {
    let map = {};
    recs.forEach((r, idx) => {
        let keys = [];
        if(type === 'author') keys = [r.author, ...(r.collab||"").split('،')];
        else if(type === 'translator') keys = (r.translator||"").split('؛');
        else keys = [r.title];
        
        keys.map(k=>k.trim()).filter(k=>k).forEach(k => {
            if(!map[k]) map[k] = []; map[k].push(idx+1);
        });
    });
    let sorted = Object.keys(map).sort((a,b)=>a.localeCompare(b,'ar'));
    document.getElementById('modalBody').innerHTML = `<h3>كشاف ${type}</h3>` + sorted.map(k=>`<div>${k} (${map[k].join(', ')})</div>`).join('');
    document.getElementById('modalOverlay').style.display='block';
}

function edit(i) {
    editIdx = i; let r = recs[i];
    document.getElementById('dewey100').value = r.dewey100; updateDewey10();
    document.getElementById('dewey10').value = r.dewey10;
    document.querySelectorAll('.in').forEach(inp => { if(r[inp.id]) inp.value = r[inp.id]; });
    window.scrollTo(0,0);
}

function del(i) { if(confirm("حذف السجل؟")) { recs.splice(i,1); draw(); } }
function newP() { let n = prompt("اسم الكشاف الجديد:"); if(n) { projs.push(n); curP=n; recs=[]; draw(); } }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
function closeM() { document.getElementById('modalOverlay').style.display='none'; }

window.onload = () => { 
    document.getElementById('dewey100').innerHTML = Object.keys(deweyData).map(x => `<option value="${x}">${x}</option>`).join('');
    updateDewey10(); draw(); 
};
</script>
</body>
</html>
