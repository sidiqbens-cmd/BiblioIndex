<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الإدخال الببليوغرافي المتقدم</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; overflow: hidden; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; padding: 2px; table-layout: fixed; border-spacing: 2px; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 1px; }
        input, select { width: 100%; height: 24px; font-size: 12px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 5px; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .btn { padding: 4px 10px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 11px; font-weight: bold; }
        .scroll-area { margin-top: 175px; height: calc(100vh - 180px); overflow-y: auto; padding: 5px; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; }
        .admin-table td, th { border: 1px solid #ccc; padding: 4px; font-size: 12px; text-align: center; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; }
        #modalBody { background:white; width:90%; margin:20px auto; padding:20px; height:80vh; overflow:auto; border-radius:8px; border: 2px solid #34495e; }
        .bib-class-header { background: #d3d3d3; text-align: center; font-size: 14px; font-weight: bold; padding: 5px; margin: 10px 0; border: 1px solid #999; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="background:#34495e; color:white; padding:5px 15px; display:flex; justify-content:space-between; align-items:center;">
        <strong style="font-size: 16px;">نظام إدارة المدخلات الببليوغرافية</strong>
        <div style="display:flex; gap:5px;">
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير Excel</button>
            <button onclick="importX()" class="btn" style="background:#27ae60">استيراد</button>
            <select id="pSel" style="width:120px;" onchange="switchP(this.value)"></select>
            <button onclick="newP()" class="btn" style="background:#27ae60">+ جديد</button>
            <button onclick="deleteP()" class="btn" style="background:#c0392b">حذف المشروع</button>
        </div>
    </div>

    <form id="bForm">
        <table class="input-table">
            <tr style="background:#b3b3b3;">
                <td colspan="3"><span class="field-label">تصنيف المئات</span><select id="dewey100" onchange="updateDewey10()"></select></td>
                <td colspan="3"><span class="field-label">تصنيف العشرات</span><select id="dewey10"></select></td>
            </tr>
            <tr>
                <td><span class="field-label">المؤلف (مقلوب)</span><input list="list_author" id="author" class="in"></td>
                <td colspan="2"><span class="field-label">العنوان</span><input list="list_title" id="title" class="in"></td>
                <td><span class="field-label">المجلة</span><input list="list_journal" id="journal" class="in"></td>
                <td><span class="field-label">التبعية</span><input list="list_affiliation" id="affiliation" class="in"></td>
                <td><span class="field-label">مترجمون</span><input list="list_translator" id="translator" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">مشاركون (بفاصلة ،)</span><input list="list_collab" id="collab" class="in"></td>
                <td><span class="field-label">السنة</span><input list="list_year" id="year" class="in"></td>
                <td><span class="field-label">العدد</span><input list="list_issue" id="issue" class="in"></td>
                <td><span class="field-label">الصفحات</span><input list="list_pages" id="pages" class="in"></td>
                <td colspan="2"><span class="field-label">ملاحظات</span><input list="list_notes" id="notes" class="in"></td>
            </tr>
        </table>
        <datalist id="list_author"></datalist><datalist id="list_title"></datalist><datalist id="list_journal"></datalist>
        <datalist id="list_affiliation"></datalist><datalist id="list_translator"></datalist><datalist id="list_collab"></datalist>
        <datalist id="list_year"></datalist><datalist id="list_issue"></datalist><datalist id="list_pages"></datalist><datalist id="list_notes"></datalist>

        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ السجل</button>
            <button type="button" class="btn" style="background:#34495e" onclick="copyRec()">نسخ</button>
            <button type="button" class="btn" style="background:#34495e" onclick="pasteRec()">لصق</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="openBiblio()">معاينة الببليوغرافيا</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runIdx('author')">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title')">كشاف العناوين</button>
            <button type="button" class="btn" style="background:#e67e22" onclick="runIdx('journal')">كشاف المجلات</button>
            <button type="button" class="btn" style="background:#7f8c8d" onclick="runIdx('dewey')">كشاف التصنيف</button>
        </div>
    </form>
</div>

<div id="modalOverlay">
    <div style="padding:10px; background:#2c3e50;"><button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق المعاينة</button></div>
    <div id="modalBody"></div>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead><tr><th>ت</th><th>التصنيف</th><th>المحتوى</th><th>إجراء</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
const deweyData = {
    "000 المعارف العامة": ["000 العموميات", "001 المعرفة", "002 الكتاب", "003 النظم", "004 علم الحاسوب", "005 البرامج و البيانات", "010 الببليوجرافيا", "020 علوم المكتبات و المعلومات", "030 الموسوعات العامة", "050 الدوريات العامة", "070 الصحافة والنشر", "090 المخطوطات"],
    "100 الفلسفة وعلم النفس": ["100 الفلسفة", "150 علم النفس", "160 المنطق", "170 الأخلاق"],
    "200 الأديان": ["210 الإسلام وعلومه", "220 القرآن", "230 الحديث", "239 السيرة النبوية", "250 الفقه وأصوله", "260 التصوف"],
    "300 العلوم الاجتماعية": ["310 الإحصاء", "320 السياسة", "330 الاقتصاد", "340 القانون", "350 الإدارة العامة", "370 التربية والتعليم", "380 التجارة والاتصالات"],
    "400 اللغات": ["410 اللغة العربية", "415 قواعد العربية", "420 الإنجليزية"],
    "500 العلوم الطبيعية": ["510 الرياضيات", "520 الفلك", "530 الفيزياء", "540 الكيمياء"],
    "600 العلوم التطبيقية": ["610 الطب", "620 الهندسة", "630 الزراعة", "650 إدارة الأعمال", "657 المحاسبة"],
    "700 الفنون": ["720 العمارة", "750 التصوير", "780 الموسيقى"],
    "800 الآداب": ["810 الأدب العربي", "811 الشعر", "813 القصص"],
    "900 التاريخ والجغرافيا": ["910 الجغرافيا", "920 التراجم", "953 تاريخ العرب", "961 ليبيا وتونس"]
};

let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_جديد'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIdx = -1, clipboard = null;

// دالة تنظيف ال التعريف للترتيب الهجائي
function cleanAL(txt) {
    if(!txt) return "";
    let t = txt.trim();
    if(t.startsWith("الـ")) t = t.substring(3);
    else if(t.startsWith("ال")) t = t.substring(2);
    return t;
}

function updateDewey10() {
    let m = document.getElementById('dewey100').value;
    document.getElementById('dewey10').innerHTML = (deweyData[m] || []).map(x => `<option value="${x}">${x}</option>`).join('');
}

function updateDataLists() {
    const fields = ['author', 'title', 'journal', 'affiliation', 'translator', 'collab', 'year', 'issue', 'pages', 'notes'];
    fields.forEach(f => {
        let unique = [...new Set(recs.map(r => r[f]).filter(v => v))];
        document.getElementById('list_' + f).innerHTML = unique.map(v => `<option value="${v}">`).join('');
    });
}

function draw() {
    recs.sort((a,b) => (a.dewey10 || "").localeCompare(b.dewey10 || "") || cleanAL(a.author).localeCompare(cleanAL(b.author), 'ar'));
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `
        <tr>
            <td>${i+1}</td>
            <td>${r.dewey10 || ""}</td>
            <td style="text-align:right"><b>${r.author}</b> - ${r.title}</td>
            <td><button onclick="edit(${i})">تعديل</button> <button onclick="del(${i})">حذف</button></td>
        </tr>`).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
    updateDataLists();
}

function save() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value);
    d.dewey100 = document.getElementById('dewey100').value;
    d.dewey10 = document.getElementById('dewey10').value;
    if(!d.author || !d.title) return alert("المؤلف والعنوان مطلوبان");
    if(editIdx > -1) recs[editIdx] = d; else recs.push(d);
    editIdx = -1; document.getElementById('bForm').reset(); updateDewey10(); draw();
}

function flipName(name) {
    if(!name || !name.includes('،')) return name;
    let parts = name.split('،');
    return parts[1].trim() + " " + parts[0].trim();
}

function openBiblio() {
    let grouped = {};
    recs.forEach(r => { if(!grouped[r.dewey10]) grouped[r.dewey10] = []; grouped[r.dewey10].push(r); });
    
    let html = `<div style="font-family:'Times New Roman'; padding:20px; direction:rtl;">`;
    Object.keys(grouped).sort().forEach(cls => {
        html += `<div class="bib-class-header">${cls}</div>`;
        grouped[cls].sort((a,b) => cleanAL(a.author).localeCompare(cleanAL(b.author), 'ar')).forEach((r, idx) => {
            let hasCollab = r.collab && r.collab.trim() !== "";
            let authorAfterTitle = hasCollab ? ` / ${flipName(r.author)}${r.collab ? '، ' + r.collab : ''}${r.translator ? '؛ ترجمة ' + r.translator : ''}` : (r.translator ? ` / ترجمة ${r.translator}` : "");
            
            html += `<div style="margin-bottom:15px;">
                <div style="display:flex; justify-content:space-between;">
                    <b style="font-size:12pt;">${r.author}</b>
                    <span style="font-size:12pt;">(${idx+1})</span>
                </div>
                <div style="font-size:12pt;">
                    ${r.title}${authorAfterTitle}
                    ${r.journal ? ' . ـــ ' + r.journal : ''}
                    ${r.issue || r.year ? ' . ـــ ' + [r.issue, r.year].filter(x=>x).join('، ') : ''}
                    ${r.pages ? ' . ـــ ص ' + r.pages : ''}.
                </div>
            </div>`;
        });
    });
    document.getElementById('modalBody').innerHTML = html + "</div>";
    document.getElementById('modalOverlay').style.display='block';
}

function runIdx(type) {
    let map = {};
    recs.forEach((r, idx) => {
        let keys = [];
        if(type === 'author') keys = [r.author, ...(r.collab||"").split('،')];
        else if(type === 'dewey') keys = [r.dewey10];
        else if(type === 'journal') keys = [r.journal];
        else keys = [r.title];
        
        keys.map(k=>k.trim()).filter(k=>k).forEach(k => {
            if(!map[k]) map[k] = []; map[k].push(idx+1);
        });
    });
    let sorted = Object.keys(map).sort((a,b)=>cleanAL(a).localeCompare(cleanAL(b),'ar'));
    document.getElementById('modalBody').innerHTML = `<h3>كشاف ${type}</h3>` + 
        sorted.map(k=>`<div style="margin-bottom:5px;">${k} (${map[k].join(', ')})</div>`).join('');
    document.getElementById('modalOverlay').style.display='block';
}

function deleteP() { if(projs.length > 1 && confirm("حذف المشروع الحالي؟")) { localStorage.removeItem('R_'+curP); projs = projs.filter(p=>p!==curP); curP=projs[0]; draw(); } }
function copyRec() { clipboard = {}; document.querySelectorAll('.in').forEach(i => clipboard[i.id] = i.value); }
function pasteRec() { if(clipboard) document.querySelectorAll('.in').forEach(i => i.value = clipboard[i.id] || ""); }
function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${curP}.xlsx`); }
function importX() {
    let input = document.createElement('input'); input.type = 'file';
    input.onchange = e => {
        let reader = new FileReader();
        reader.onload = ev => {
            let wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            recs = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            draw();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };
    input.click();
}
function edit(i) { editIdx = i; let r = recs[i]; document.getElementById('dewey100').value = r.dewey100; updateDewey10(); document.getElementById('dewey10').value = r.dewey10; document.querySelectorAll('.in').forEach(inp => inp.value = r[inp.id] || ""); }
function del(i) { if(confirm("حذف؟")) { recs.splice(i,1); draw(); } }
function newP() { let n = prompt("الاسم:"); if(n) { projs.push(n); curP=n; recs=[]; draw(); } }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
function closeM() { document.getElementById('modalOverlay').style.display='none'; }

window.onload = () => { 
    document.getElementById('dewey100').innerHTML = Object.keys(deweyData).map(x => `<option value="${x}">${x}</option>`).join('');
    updateDewey10(); draw(); 
};
</script>
</body>
</html>
