<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كشاف المجلات الليبية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; overflow: hidden; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; padding: 2px; table-layout: fixed; border-spacing: 2px; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 1px; }
        input, select { width: 100%; height: 24px; font-size: 12px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 5px; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .btn { padding: 4px 10px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 11px; font-weight: bold; }
        .scroll-area { margin-top: 175px; height: 35vh; overflow-y: auto; padding: 5px; background: #fff; border-top: 2px solid #2c3e50; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; }
        .admin-table td, th { border: 1px solid #ccc; padding: 4px; font-size: 11px; text-align: center; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; }
        #modalBody { background:white; width:95%; margin:10px auto; padding:20px; height:85vh; overflow:auto; border-radius:8px; border: 2px solid #34495e; }
        .dewey-header { text-align: center; background-color: #e0e0e0; font-size: 14pt; font-weight: bold; padding: 10px; margin: 25px 0 15px 0; border: 1px solid #bbb; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="background:#34495e; color:white; padding:5px 15px; display:flex; justify-content:space-between; align-items:center;">
        <strong style="font-size: 14px;">نظام إدارة المدخلات - كشاف المجلات الليبية</strong>
        <div style="display:flex; gap:5px; align-items: center;">
            <input type="text" id="globalSearch" placeholder="بحث..." style="width:110px; height:24px; font-size:11px;" oninput="draw()">
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير Excel</button>
            <button onclick="importX()" class="btn" style="background:#27ae60">استيراد</button>
            <select id="pSel" style="height:24px; font-size:11px; width: auto;" onchange="switchP(this.value)"></select>
            <button onclick="newP()" class="btn" style="background:#27ae60">+ جديد</button>
            <button onclick="delP()" class="btn" style="background:#c0392b">حذف</button>
        </div>
    </div>

    <form id="bForm">
        <table class="input-table">
            <tr>
                <td colspan="2"><span class="field-label">تصنيف المئات</span><select id="dewey100" class="in" onchange="updateDewey10()"></select></td>
                <td colspan="4"><span class="field-label">تصنيف العشرات</span><select id="dewey10" class="in"></select></td>
            </tr>
            <tr>
                <td><span class="field-label">المؤلف الرئيسي</span><input id="author" class="in" autocomplete="off"></td>
                <td><span class="field-label">مشاركون (بالمائلة /)</span><input id="co_authors" class="in" autocomplete="off"></td>
                <td colspan="2"><span class="field-label">العنوان</span><input id="title" class="in" autocomplete="off"></td>
                <td><span class="field-label">المجلة</span><input id="journal" class="in" autocomplete="off"></td>
                <td><span class="field-label">مترجمون</span><input id="translator" class="in" autocomplete="off"></td>
            </tr>
            <tr>
                <td><span class="field-label">التبعية</span><input id="affiliation" class="in" autocomplete="off"></td>
                <td><span class="field-label">السنة</span><input id="year" class="in" autocomplete="off"></td>
                <td><span class="field-label">العدد</span><input id="issue" class="in" autocomplete="off"></td>
                <td><span class="field-label">الصفحات</span><input id="pages" class="in" autocomplete="off"></td>
                <td colspan="2"><span class="field-label">ملاحظات</span><input id="notes" class="in" autocomplete="off"></td>
            </tr>
        </table>
        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="openBiblio()">الببليوغرافيا</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runIdx('author')">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title')">كشاف العناوين</button>
            <button type="button" class="btn" style="background:#e67e22" onclick="runIdx('journal')">كشاف المجلات</button>
            <button type="button" class="btn" style="background:#7f8c8d" onclick="runIdx('dewey10')">كشاف التصنيف</button>
        </div>
    </form>
</div>

<div id="modalOverlay"><div style="padding:10px; background:#2c3e50;"><button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق</button></div><div id="modalBody"></div></div>

<div class="scroll-area">
    <table class="admin-table">
        <thead>
            <tr>
                <th>ت</th><th>مئات</th><th>عشرات</th><th>المؤلف</th><th>العنوان</th><th>إجراء</th>
            </tr>
        </thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
const deweyData = {
    "000": ["000 المعارف العامة", "010 الببليوغرافيا", "020 المكتبات والمعلومات", "030 الموسوعات العامة", "050 الدوريات العامة", "060 المنظمات والمتاحف", "070 الإعلام والصحافة", "080 المجموعات العامة", "090 المخطوطات والكتب النادرة"],
    "100": ["100 الفلسفة", "110 الميتافيزيقا", "120 نظرية المعرفة", "130 الظواهر الخارقة", "140 المدارس الفلسفية", "150 علم النفس", "160 المنطق", "170 الأخلاق", "180 الفلسفة القديمة", "190 الفلسفة الحديثة"],
    "200": ["200 الأديان", "210 الفلسفة والنظرية", "220 الإنجيل", "230 اللاهوت المسيحي", "240 الأخلاق اللاهوتية", "250 الكنيسة", "260 اللاهوت الاجتماعي", "270 تاريخ الكنيسة", "280 الطوائف المسيحية", "290 الأديان الأخرى"],
    "300": ["300 العلوم الاجتماعية", "310 الإحصاء", "320 العلوم السياسية", "330 الاقتصاد", "340 القانون", "350 الإدارة العامة", "360 المشاكل والخدمات الاجتماعية", "370 التربية والتعليم", "380 التجارة والاتصالات", "390 العادات والتقاليد"],
    "400": ["400 اللغات", "410 اللسانيات", "420 اللغة الإنجليزية", "430 اللغات الجرمانية", "440 اللغة الفرنسية", "450 اللغة الإيطالية", "460 اللغة الإسبانية", "470 اللغة اللاتينية", "480 اللغة اليونانية", "490 اللغات الأخرى"],
    "500": ["500 العلوم الطبيعية", "510 الرياضيات", "520 الفلك", "530 الفيزياء", "540 الكيمياء", "550 علوم الأرض", "560 الأحافير", "570 العلوم الحياتية", "580 النباتات", "590 الحيوانات"],
    "600": ["600 العلوم التطبيقية", "610 الطب", "620 الهندسة", "630 الزراعة", "640 الاقتصاد المنزلي", "650 إدارة الأعمال", "660 الصناعات الكيميائية", "670 التصنيع", "680 الصناعات المتخصصة", "690 البناء والإشادة"],
    "700": ["700 الفنون", "710 التخطيط العمراني", "720 العمارة", "730 النحت", "740 الرسم والتصميم", "750 التصوير الزيتي", "760 الفنون الجرافيكية", "770 التصوير الفوتوغرافي", "780 الموسيقى", "790 الألعاب والترفيه"],
    "800": ["800 الآداب", "810 الأدب الأمريكي", "820 الأدب الإنجليزي", "830 الأدب الألماني", "840 الأدب الفرنسي", "850 الأدب الإيطالي", "860 الأدب الإسباني", "870 الأدب اللاتيني", "880 الأدب اليوناني", "890 آداب اللغات الأخرى"],
    "900": ["900 التاريخ والجغرافيا", "910 الجغرافيا والرحلات", "920 التراجم والأنساب", "930 تاريخ العالم القديم", "940 تاريخ أوروبا", "950 تاريخ آسيا", "960 تاريخ أفريقيا", "970 تاريخ أمريكا الشمالية", "980 تاريخ أمريكا الجنوبية", "990 تاريخ المناطق الأخرى"]
};

function initDewey() {
    let d100 = document.getElementById('dewey100');
    d100.innerHTML = '<option value="">اختر المئة...</option>';
    Object.keys(deweyData).forEach(k => {
        let opt = document.createElement('option');
        opt.value = deweyData[k][0]; opt.text = deweyData[k][0];
        d100.appendChild(opt);
    });
}

function updateDewey10(selectedFullText = "") {
    let fullVal = document.getElementById('dewey100').value;
    if(!fullVal) return;
    let codeKey = fullVal.substring(0, 3);
    let d10 = document.getElementById('dewey10');
    d10.innerHTML = '<option value="">اختر العشرات...</option>';
    if(deweyData[codeKey]) {
        deweyData[codeKey].forEach(item => {
            let opt = document.createElement('option');
            opt.value = item; opt.text = item;
            if(item === selectedFullText) opt.selected = true;
            d10.appendChild(opt);
        });
    }
}

let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_جديد'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIdx = -1;
const collator = new Intl.Collator('ar', { sensitivity: 'accent' });

function cleanSort(txt) { return (txt || "").trim().replace(/^(الـ|ال|أل|الأ|الإ|آل)/, ""); }

function sortRecords(arr) {
    return arr.sort((a, b) => {
        let d1 = (a.dewey10 || "").substring(0,3).padStart(3, '0');
        let d2 = (b.dewey10 || "").substring(0,3).padStart(3, '0');
        if (d1 !== d2) return d1.localeCompare(d2);
        return collator.compare(cleanSort(a.author || a.title), cleanSort(b.author || b.title));
    });
}

function draw() {
    let g = document.getElementById('globalSearch').value.toLowerCase();
    recs = sortRecords(recs);
    let filtered = recs.map((r, i) => ({...r, originalIdx: i}))
                       .filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(g)));
    
    document.getElementById('adminBody').innerHTML = filtered.map((r, i) => `
        <tr>
            <td>${i + 1}</td>
            <td>${r.dewey100 || ""}</td>
            <td>${r.dewey10 || ""}</td>
            <td style="text-align:right"><b>${r.author || ""}</b></td>
            <td style="text-align:right">${r.title || ""}</td>
            <td>
                <button onclick="prepareEdit(${r.originalIdx})">تعديل</button> 
                <button onclick="del(${r.originalIdx})">حذف</button>
            </td>
        </tr>`).join('');

    document.getElementById('pSel').innerHTML = projs.map(p => `<option value="${p}" ${p === curP ? 'selected' : ''}>${p}</option>`).join('');
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
}

function save() { 
    let d = {}; 
    document.querySelectorAll('.in').forEach(i => d[i.id] = i.value); 
    if(editIdx > -1) recs[editIdx] = d; else recs.push(d); 
    editIdx = -1; document.getElementById('bForm').reset(); draw(); 
}

function prepareEdit(i) { 
    editIdx = i; 
    let r = recs[i]; 
    document.getElementById('dewey100').value = r.dewey100 || "";
    updateDewey10(r.dewey10);
    document.querySelectorAll('.in').forEach(inp => {
        if(inp.id !== 'dewey100' && inp.id !== 'dewey10') inp.value = r[inp.id] || "";
    });
}

function openBiblio() {
    let html = `<div style="direction:rtl; padding:20px; font-family:'Times New Roman';">`;
    let lastDewey = null;
    recs.forEach((r, i) => {
        let currentDewey = r.dewey10 || "بدون تصنيف";
        if (currentDewey !== lastDewey) {
            html += `<div class="dewey-header">${currentDewey}</div>`;
            lastDewey = currentDewey;
        }
        html += `<div style="margin-bottom:12px; padding:0 30px; line-height:1.6; border-bottom: 1px dotted #eee;">
            <div style="display:flex; justify-content:space-between;"><b>${r.author || r.title}</b><span>(${i+1})</span></div>
            <div style="font-size:12pt;">${r.title} . ـــ ${r.journal} . ـــ ${r.issue} . ـــ ${r.year} . ـــ ص ${r.pages}.</div>
        </div>`;
    });
    document.getElementById('modalBody').innerHTML = html + "</div>";
    document.getElementById('modalOverlay').style.display='block';
}

function runIdx(type) {
    let map = {};
    recs.forEach((r, i) => {
        let val = r[type] || "بدون بيانات";
        if(!map[val]) map[val] = [];
        map[val].push(i + 1);
    });
    let sortedKeys = Object.keys(map).sort(collator.compare);
    let html = `<div style="direction:rtl; column-count: 3; column-gap: 30px; padding:20px;">`;
    sortedKeys.forEach(k => {
        html += `<div style="break-inside: avoid; margin-bottom:8px; font-size:11pt;"><b>${k}</b>: ${map[k].join(', ')}</div>`;
    });
    document.getElementById('modalBody').innerHTML = html + "</div>";
    document.getElementById('modalOverlay').style.display='block';
}

function del(i) { if(confirm("حذف؟")) { recs.splice(i,1); draw(); } }
function switchP(v) { curP = v; recs = JSON.parse(localStorage.getItem('R_' + v)) || []; draw(); }
function newP() { let n = prompt("اسم المشروع:"); if(n) { projs.push(n); curP = n; recs = []; draw(); } }
function delP() { if(projs.length > 1 && confirm("حذف؟")) { localStorage.removeItem('R_' + curP); projs = projs.filter(p => p !== curP); curP = projs[0]; draw(); } }
function closeM() { document.getElementById('modalOverlay').style.display='none'; }
function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${curP}.xlsx`); }
function importX() { let input = document.createElement('input'); input.type='file'; input.onchange=e=>{ let reader=new FileReader(); reader.onload=ev=>{ let wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'}); recs=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); draw(); }; reader.readAsArrayBuffer(e.target.files[0]); }; input.click(); }

window.onload = () => { initDewey(); draw(); };
</script>
</body>
</html>
