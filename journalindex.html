<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كشاف المجلات الليبية المحكمة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; padding: 5px; table-layout: fixed; border-spacing: 2px; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 26px; font-size: 12px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 8px; display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
        .btn { padding: 5px 12px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 175px; height: calc(100vh - 185px); overflow-y: auto; padding: 10px; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; }
        .admin-table td, th { border: 1px solid #ccc; padding: 5px; font-size: 12px; text-align: center; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; }
        #modalBody { background:white; width:90%; margin:20px auto; padding:20px; height:80vh; overflow:auto; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="background:#34495e; color:white; padding:8px 15px; display:flex; justify-content:space-between; align-items:center;">
        <strong style="font-size: 18px;">كشاف المجلات الليبية المحكمة</strong>
        <div style="display:flex; gap:5px;">
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير Excel</button>
            <select id="pSel" style="width:130px;" onchange="switchP(this.value)"></select>
            <button onclick="newP()" class="btn" style="background:#27ae60">+ جديد</button>
        </div>
    </div>

    <form id="bForm">
        <table class="input-table">
            <tr style="background:#b3b3b3;">
                <td colspan="3"><span class="field-label">تصنيف المئات</span><select id="dewey100" onchange="updateDewey10()"></select></td>
                <td colspan="3"><span class="field-label">تصنيف العشرات</span><select id="dewey10"></select></td>
            </tr>
            <tr>
                <td><span class="field-label">المؤلف (مقلوب)</span><input type="text" id="author" class="in"></td>
                <td colspan="3"><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
                <td><span class="field-label">المجلة</span><input type="text" id="journal" class="in"></td>
                <td><span class="field-label">التبعية</span><input type="text" id="affiliation" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">مشاركون</span><input type="text" id="collab" class="in"></td>
                <td><span class="field-label">مترجمون</span><input type="text" id="translator" class="in"></td>
                <td><span class="field-label">السنة</span><input type="text" id="year" class="in"></td>
                <td><span class="field-label">العدد</span><input type="text" id="issue" class="in"></td>
                <td><span class="field-label">الصفحات</span><input type="text" id="pages" class="in"></td>
                <td><span class="field-label">ملاحظات</span><input type="text" id="notes" class="in"></td>
            </tr>
        </table>

        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ السجل</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="openBiblio()">المعاينة الببليوغرافية</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runIdx('author')">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title')">كشاف العناوين</button>
        </div>
    </form>
</div>

<div id="modalOverlay"><div style="padding:10px;"><button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق</button></div><div id="modalBody"></div></div>

<div class="scroll-area">
    <table class="admin-table">
        <thead><tr><th>ت</th><th>التصنيف</th><th>المؤلف / العنوان</th><th>إجراء</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
const deweyData = {

    "100 الفلسفة وعلم النفس": ["100 الفلسفة", "101 نظرية الفلسفة", "102 متفرقات فى الفلسفة", "103 المعاجم و الموسوعات", "105 المطبوعات الدورية", "106 المنظمات و الجمعيات", "107 التعليم و البحث", "109 المعالجة التاريخية", "110 الميتافيزيقا", "111 علم الوجود", "113 علم الكونيات", "114 المكان", "115 الزمان", "116 التغير و الحركة", "120 نظرية المعرفة ، السببية", "121 نظرية المعرفة", "123 الحتمية و اللاحتمية", "128 الجنس البشري", "130 الظواهر الخارقة", "133 التخاطر", "135 الأحلام و الأسرار", "140 مدارس فلسفية معينة", "141 المثالية", "144 الإنسانية", "146 المذهب الطبيعي", "150 علم النفس", "152 الإدراك و العواطف", "153 العمليات العقلية", "154 العقل الباطن", "155 علم النفس الارتقائى", "158 علم النفس التطبيقي", "160 علم المنطق", "161 المنطق الإستقرائي", "162 المنطق الاستنباطى", "170 علم الأخلاق", "171 النظم الأخلاقية", "172 الأخلاق السياسية", "173 أخلاقيات العلاقات الأسرية", "180 الفلسفات القديمة و الشرقية", "181 الفلسفة الشرقية", "185 الفلسفة الارسطية", "189 الفلسفة فى العصور الوسطى", "190 الفلسفة الحديثة و المعاصرة"],
    "200 الأديان": ["200 الأديان", "210 الدين الإسلامي و علومه", "211 القواعد و التعاليم الإسلامية", "212 الأخلاقيات و الأداب الأسلامية", "213 الدعوة الإسلامية", "214 الثقافة الإسلامية", "215 المساجد و المزارات", "220 القرأن الكريم", "227 تفسير القرأن", "228 القراءات و التجويد", "230 الحديث الشريف", "231 مصطلح الحديث", "239 السيرة النبوية", "240 علم أصول الدين (التوحيد)", "245 الفرق الكلامية", "250 الفقة الإسلامى و أصوله", "251 أصول الفقة", "252 العبادات", "253 الأحوال الشخصية", "254 المعاملات", "260 التصوف الإسلامي", "270 المباحث العامة فى المسيحية", "290 الدين المقارن", "296 اليهودية"],
    "300 العلوم الاجتماعية": ["300 العلوم الاجتماعية", "301 علم النفس و الأنثروبولوجيا", "305 الجماعات الإجتماعية", "310 الإحصاءات العامة", "316 الإحصاءات العامة لأفريقيا", "320 علم السياسة", "321 نظم الدول و الحكومات", "327 العلاقات الدولية", "330 علم الاقتصاد", "331 اقتصاديات العمل", "336 المالية العامة", "340 القانون", "341 القانون الدولي", "345 القانون الجنائي", "350 الإدارة العامة و العلوم العسكرية", "360 المشكلات و الخدمات الاجتماعية", "370 التربية والتعليم", "378 التعليم العالي", "380 التجارة ، الاتصالات ، النقل", "390 العادات والفللور"],
    "400 اللغات": ["400 اللغات", "401 علم اللغات", "403 علم المعاجم", "405 النحو و الصرف", "410 اللغة العربية", "413 المعاجم العربية", "414 علم البلاغة العربية", "415 قواعد اللغة العربية", "420 اللغة الإنجليزية", "430 اللغات الجرمانية", "440 اللغات الفرنسية", "492 اللغات السامية (العربية وغيرها)"],
    "500 العلوم الطبيعية": ["500 العلوم الطبيعية", "510 الرياضيات", "512 الجبر", "516 الهندسة", "520 الفلك", "530 الفيزياء", "537 الكهرباء و الإلكترونيات", "540 الكيمياء", "550 علم الأرض", "551 الجيولوجيا و الأرصاد", "570 علوم الحياة ، الأحياء", "580 النباتات", "590 الحيوانات"],
    "600 العلوم التطبيقية": ["600 العلوم التطبيقية", "610 العلوم الطبية - الطب", "612 الفسيولوجيا البشرية", "615 علم الصيدلة", "616 الأمراض", "620 الهندسة", "621 الفيزياء التطبيقية", "630 الزراعة", "640 الاقتصاد المنزلي", "650 إدارة الأعمال", "657 المحاسبة", "660 الهندسة الكيميائية", "690 المباني"],
    "700 الفنون والترفيه": ["700 الفنون", "710 فنون العمادة", "720 العمارة", "730 الفنون البلاستيكية والنحت", "740 الرسم والفنون الزخرفية", "750 التصوير واللوحات", "770 التصوير الفوتوغرافي", "780 الموسيقى", "790 الألعاب والترفيه"],
    "800 الآداب": ["800 الآداب", "801 الفلسفة و النظرية الأدبية", "808 البلاغة و المجموعات الأدبية", "810 الأدب العربي", "811 الشعر العربي", "812 الدراما العربية", "813 القصص العربي", "820 الأداب الناطقة بالإنجليزية", "830 أداب اللغة الجرمانية", "840 أداب اللغة الفرنسية", "892 أداب اللغات السامية"],
    "900 التاريخ والجغرافيا": ["900 التاريخ والجغرافيا", "901 الفلسفة و النظرية", "909 التاريخ العام للعالم", "910 الجغرافيا و الرحلات", "916 الجغرافيا و الرحلات فى أفريقيا", "920 التراجم و الأنساب", "930 تاريخ العالم القديم", "932 تاريخ مصر القديم", "940 تاريخ أوروبا العام", "950 تاريخ أسيا العام", "953 التاريخ العام للعرب و المسلمين", "960 تاريخ أفريقيا العام", "961 تونس و ليبيا", "962 مصر و السودان", "999 العوالم الخارجية"]
};

let projs = JSON.parse(localStorage.getItem('L_P')) || ['كشاف_المجلات'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIdx = -1;

function updateDewey10() {
    let m = document.getElementById('dewey100').value;
    document.getElementById('dewey10').innerHTML = (deweyData[m] || []).map(x => `<option value="${x}">${x}</option>`).join('');
}

function draw() {
    recs.sort((a,b) => (a.dewey10 || "").localeCompare(b.dewey10 || "") || (a.author || "").localeCompare(b.author || "", 'ar'));
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `<tr><td>${i+1}</td><td>${r.dewey10 || ""}</td><td style="text-align:right"><b>${r.author}</b> - ${r.title}</td><td><button onclick="edit(${i})">تعديل</button> <button onclick="del(${i})">حذف</button></td></tr>`).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
}

function save() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value);
    d.dewey100 = document.getElementById('dewey100').value;
    d.dewey10 = document.getElementById('dewey10').value;
    if(!d.author || !d.title) return alert("المؤلف والعنوان مطلوبان");
    if(editIdx > -1) recs[editIdx] = d; else recs.push(d);
    editIdx = -1; document.getElementById('bForm').reset(); updateDewey10(); draw();
}

function edit(i) {
    editIdx = i; let r = recs[i];
    document.getElementById('dewey100').value = r.dewey100; updateDewey10();
    document.getElementById('dewey10').value = r.dewey10;
    document.querySelectorAll('.in').forEach(inp => { if(r[inp.id]) inp.value = r[inp.id]; });
    window.scrollTo(0,0);
}

function del(i) { if(confirm("حذف؟")) { recs.splice(i,1); draw(); } }
function newP() { let n = prompt("المشروع:"); if(n) { projs.push(n); curP=n; recs=[]; draw(); } }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
function closeM() { document.getElementById('modalOverlay').style.display='none'; }

function openBiblio() {
    const win = window.open('', '_blank');
    let html = `<html dir="rtl"><body><h2>المعاينة الببليوغرافية</h2>`;
    recs.forEach((r, idx) => {
        let authors = r.author;
        if(r.collab) authors += ` ، ${r.collab}`;
        if(r.translator) authors += ` ؛ ترجمة ${r.translator}`;
        html += `<p>${idx+1}. <b>${r.title}</b> / ${authors}. ـــ ${r.journal}، ${r.year}، ${r.issue}. ـــ ص ${r.pages}.</p>`;
    });
    win.document.write(html + "</body></html>"); win.document.close();
}

function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${curP}.xlsx`); }

window.onload = () => { 
    document.getElementById('dewey100').innerHTML = Object.keys(deweyData).map(x => `<option value="${x}">${x}</option>`).join('');
    updateDewey10(); draw(); 
};
</script>
</body>
</html>
