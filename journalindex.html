<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كشاف المجلات الليبية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; overflow: hidden; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; padding: 2px; table-layout: fixed; border-spacing: 2px; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 1px; }
        input { width: 100%; height: 24px; font-size: 12px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 5px; display: flex; justify-content: center; gap: 4px; }
        .btn { padding: 4px 10px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 11px; font-weight: bold; }
        .scroll-area { margin-top: 175px; height: calc(100vh - 180px); overflow-y: auto; padding: 5px; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; }
        .admin-table td, th { border: 1px solid #ccc; padding: 4px; font-size: 12px; text-align: center; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; }
        #modalBody { background:white; width:90%; margin:20px auto; padding:20px; height:85vh; overflow:auto; border-radius:8px; border: 2px solid #34495e; }
        .search-tool { height: 24px; font-size: 11px; border: 1px solid #fff; border-radius: 3px; padding: 0 5px; background: #fdfdfd; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="background:#34495e; color:white; padding:5px 15px; display:flex; justify-content:space-between; align-items:center;">
        <strong style="font-size: 14px;">كشاف المجلات الليبي</strong>
        <div style="display:flex; gap:5px; align-items: center;">
            <input type="text" id="idSearch" placeholder="رقم (ت)" class="search-tool" style="width:80px;" oninput="draw()">
            <input type="text" id="globalSearch" placeholder="بحث..." class="search-tool" style="width:130px;" oninput="draw()">
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير Excel</button>
            <button onclick="importX()" class="btn" style="background:#27ae60">استيراد</button>
            <select id="pSel" style="height:24px; font-size:11px;" onchange="switchP(this.value)"></select>
            <button onclick="newP()" class="btn" style="background:#27ae60">+ جديد</button>
            <button onclick="deleteP()" class="btn" style="background:#c0392b">حذف المشروع</button>
        </div>
    </div>

    <form id="bForm">
        <table class="input-table">
            <tr>
                <td colspan="2"><span class="field-label">تصنيف المئات</span><input list="list_dewey100" id="dewey100" class="in"></td>
                <td colspan="4"><span class="field-label">تصنيف العشرات (رقم التصنيف)</span><input list="list_dewey10" id="dewey10" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">المؤلف الرئيسي (مقلوب)</span><input list="list_author" id="author" class="in"></td>
                <td><span class="field-label">مؤلفون مشاركون (مقلوب، فاصلة ،)</span><input list="list_co_authors" id="co_authors" class="in"></td>
                <td colspan="2"><span class="field-label">العنوان</span><input list="list_title" id="title" class="in"></td>
                <td><span class="field-label">المجلة</span><input list="list_journal" id="journal" class="in"></td>
                <td><span class="field-label">مترجمون</span><input list="list_translator" id="translator" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">التبعية</span><input list="list_affiliation" id="affiliation" class="in"></td>
                <td><span class="field-label">السنة</span><input list="list_year" id="year" class="in"></td>
                <td><span class="field-label">العدد</span><input list="issue" id="issue" class="in"></td>
                <td><span class="field-label">الصفحات</span><input list="list_pages" id="pages" class="in"></td>
                <td colspan="2"><span class="field-label">ملاحظات</span><input list="list_notes" id="notes" class="in"></td>
            </tr>
        </table>
        
        <datalist id="list_dewey100">
            <option value="000 المعارف العامة"> <option value="100 الفلسفة وعلم النفس"> <option value="200 الأديان"> 
            <option value="300 العلوم الاجتماعية"> <option value="400 اللغات"> <option value="500 العلوم البحتة"> 
            <option value="600 العلوم التطبيقية"> <option value="700 الفنون"> <option value="800 الآداب"> <option value="900 الجغرافيا والتاريخ">
        </datalist>

        <datalist id="list_dewey10">
            <option value="010 الببليوجرافيا">
            <option value="020 علوم المكتبات والمعلومات">
            <option value="030 الأعمال الموسوعية العامة">
            <option value="050 الأعمال الدورية العامة">
            <option value="060 المنظمات العامة وعلم المتاحف">
            <option value="070 الرسائل الإخبارية، الصحافة، النشر">
            <option value="080 المجموعات العامة">
            <option value="090 المخطوطات والكتب النادرة">
            <option value="110 الميتافيزيقا (ما وراء الطبيعة)">
            <option value="120 نظرية المعرفة، السببية، الجنس البشري">
            <option value="130 الظواهر الخارقة">
            <option value="140 مدارس فلسفية معينة">
            <option value="150 علم النفس">
            <option value="160 علم المنطق">
            <option value="170 علم الأخلاق والفلسفة الأخلاقية">
            <option value="180 الفلسفات القديمة، والوسيطة والشرقية">
            <option value="190 الفلسفة الحديثة والمعاصرة">
            <option value="210 الدين الإسلامي وعلومه">
            <option value="220 القرآن الكريم">
            <option value="230 الحديث الشريف">
            <option value="240 علم أصول الدين (التوحيد أو علم الكلام)">
            <option value="250 الفقه الإسلامي وأصوله">
            <option value="260 التصوف الإسلامي">
            <option value="270 المباحث العامة في المسيحية">
            <option value="280 الكنائس والطوائف والمذاهب المسيحية">
            <option value="290 الدين المقارن">
            <option value="310 مجموعة الإحصاءات العامة">
            <option value="320 علم السياسة">
            <option value="330 علم الاقتصاد">
            <option value="340 القانون">
            <option value="350 الإدارة العامة والعلوم العسكرية">
            <option value="360 المشكلات والخدمات الاجتماعية، الاتحادات والجمعيات">
            <option value="370 التربية والتعليم">
            <option value="380 التجارة، الاتصالات، النقل">
            <option value="390 العادات، الإتيكيت، الفلكلور">
            <option value="410 اللغة العربية">
            <option value="420 اللغة الإنجليزية الحديثة والقديمة">
            <option value="430 اللغات الجرمانية الألمانية">
            <option value="440 اللغات الرومانسية الفرنسية">
            <option value="450 اللغات الإيطالية الرومانية">
            <option value="460 اللغتان الإسبانية والبرتغالية">
            <option value="470 اللغات الإيطالية القديمة - اللاتينية">
            <option value="480 اللغات الهيلنية - اللغات اليونانية الكلاسيكية">
            <option value="490 اللغات الأخرى">
            <option value="510 الرياضيات">
            <option value="520 الفلك والعلوم ذات العلاقة">
            <option value="530 الفيزياء">
            <option value="550 علم الأرض">
            <option value="560 علم الحفريات - علم الحفريات الحيوانية">
            <option value="570 علوم الحياة، الأحياء">
            <option value="580 النباتات">
            <option value="590 الحيوانات">
            <option value="610 العلوم الطبية - الطب">
            <option value="620 الهندسة والعمليات ذات العلاقة">
            <option value="630 الزراعة والتكنولوجيات ذات العلاقة">
            <option value="641 الأطعمة والأشربة">
            <option value="650 إدارة الأعمال والخدمات المساعدة">
            <option value="660 الهندسة الكيميائية">
            <option value="670 الصناعات">
            <option value="680 الصناعات لأغراض معينة">
            <option value="690 المباني">
            <option value="710 الفن المدني والخلوي">
            <option value="720 العمارة">
            <option value="730 الفنون التشكيلية - النحت">
            <option value="739 أشغال المعادن الفنية">
            <option value="740 الرسوم والفنون الزخرفية">
            <option value="750 التصوير الزيتي والصور الزيتية">
            <option value="760 الفنون التخطيطية">
            <option value="770 التصوير الفوتوغرافي">
            <option value="780 الموسيقي">
            <option value="790 الفنون الترويحية والتمثيلية">
            <option value="810 الأدب العربي">
            <option value="820 الآداب الناطقة بالإنجليزية">
            <option value="830 آداب اللغة الجرمانية">
            <option value="840 آداب اللغة الرومانسية">
            <option value="850 آداب اللغات الإيطالية والرومانية">
            <option value="860 الآداب الإسبانية والبرتغالية">
            <option value="870 الآداب الإيطالية القديمة">
            <option value="890 آداب اللغات الأخرى">
            <option value="910 الجغرافيا والرحلات">
            <option value="920 التراجم والأنساب والشارات">
            <option value="930 تاريخ العالم القديم">
            <option value="940 تاريخ أوروبا العام">
            <option value="950 تاريخ أسيا العام">
            <option value="960 تاريخ أفريقيا العام">
            <option value="970 تاريخ أمريكا الشمالية">
            <option value="980 تاريخ أمريكا الجنوبية">
            <option value="990 التاريخ العام للمناطق الأخرى">
        </datalist>

        <datalist id="list_author"></datalist><datalist id="list_co_authors"></datalist><datalist id="list_title"></datalist><datalist id="list_journal"></datalist>
        <datalist id="list_affiliation"></datalist><datalist id="list_translator"></datalist><datalist id="list_year"></datalist><datalist id="list_pages"></datalist><datalist id="list_notes"></datalist>

        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ السجل</button>
            <button type="button" class="btn" style="background:#34495e" onclick="copyRec()">نسخ</button>
            <button type="button" class="btn" style="background:#34495e" onclick="pasteRec()">لصق</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="openBiblio()">معاينة الببليوغرافيا</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runIdx('author')">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title')">كشاف العناوين</button>
            <button type="button" class="btn" style="background:#e67e22" onclick="runIdx('journal')">كشاف المجلات</button>
            <button type="button" class="btn" style="background:#7f8c8d" onclick="runIdx('dewey10')">كشاف التصنيف</button>
        </div>
    </form>
</div>

<div id="modalOverlay">
    <div style="padding:10px; background:#2c3e50;"><button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق</button></div>
    <div id="modalBody"></div>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead><tr><th>ت</th><th>التصنيف</th><th>المؤلف الرئيسي</th><th>العنوان</th><th>إجراء</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_جديد'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIdx = -1, clipboard = null;

function cleanAL(txt) {
    if(!txt) return "";
    let t = txt.trim();
    if(t.startsWith("الـ")) t = t.substring(3);
    else if(t.startsWith("ال")) t = t.substring(2);
    return t;
}

function updateDataLists() {
    const fields = ['author', 'co_authors', 'title', 'journal', 'affiliation', 'translator', 'year', 'issue', 'pages', 'notes'];
    fields.forEach(f => {
        let unique = [...new Set(recs.map(r => r[f]).filter(v => v))];
        let dl = document.getElementById('list_' + f);
        if(dl) dl.innerHTML = unique.map(v => `<option value="${v}">`).join('');
    });
}

function draw() {
    let gTerm = document.getElementById('globalSearch').value.toLowerCase();
    let idTerm = document.getElementById('idSearch').value.trim();
    let filtered = recs.map((r, i) => ({...r, originalIdx: i+1})).filter(r => {
        let matchG = Object.values(r).some(v => String(v).toLowerCase().includes(gTerm));
        let matchID = idTerm === "" || String(r.originalIdx) === idTerm;
        return matchG && matchID;
    });
    document.getElementById('adminBody').innerHTML = filtered.map(r => `
        <tr><td>${r.originalIdx}</td><td>${r.dewey10||""}</td><td style="text-align:right"><b>${r.author}</b></td><td style="text-align:right">${r.title}</td>
        <td><button onclick="edit(${r.originalIdx-1})">تعديل</button> <button onclick="del(${r.originalIdx-1})">حذف</button></td></tr>`).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
    updateDataLists();
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
}

function save() {
    let d = {}; 
    document.querySelectorAll('.in').forEach(i => d[i.id] = i.value);
    if(!d.author || !d.title) return alert("المؤلف والعنوان مطلوبان");
    if(editIdx > -1) recs[editIdx] = d; else recs.push(d);
    editIdx = -1;
    document.getElementById('bForm').reset();
    draw();
}

function flipName(name) {
    if(!name || !name.includes('،')) return name;
    let parts = name.split('،');
    return parts[1].trim() + " " + parts[0].trim();
}

function openBiblio() {
    let sortedRecs = [...recs].sort((a,b) => cleanAL(a.title).localeCompare(cleanAL(b.title), 'ar'));
    let grouped = {};
    sortedRecs.forEach(r => { if(!grouped[r.dewey10]) grouped[r.dewey10] = []; grouped[r.dewey10].push(r); });

    let html = `<div style="direction:rtl; padding:20px; font-family:'Times New Roman';">`;
    let globalCounter = 1;

    Object.keys(grouped).sort().forEach(cls => {
        html += `<div style="background:#d3d3d3; text-align:center; font-weight:bold; padding:5px; margin:15px 0; border:1px solid #999;">${cls}</div>`;
        grouped[cls].forEach((r) => {
            let hasCollab = r.co_authors && r.co_authors.trim() !== "";
            let hasTrans = r.translator && r.translator.trim() !== "";
            let responsLine = "";
            
            if (hasCollab) {
                let allAuthors = [flipName(r.author), ...r.co_authors.split('،').map(n => flipName(n.trim()))];
                responsLine = ` / ${allAuthors.join('، ')}${hasTrans ? '؛ ترجمة ' + r.translator : ''}`;
            } else if (hasTrans) {
                responsLine = ` / ترجمة ${r.translator}`;
            }

            html += `<div style="margin-bottom:15px; line-height:1.6;">
                <div style="display:flex; justify-content:space-between;"><b>${r.author}</b> <span>(${globalCounter})</span></div>
                <div style="font-size:12pt;">${r.title}${responsLine}${r.journal?' . ـــ '+r.journal:''}${r.issue?' . ـــ '+r.issue:''}${r.year?' . ـــ '+r.year:''}${r.pages?' . ـــ ص '+r.pages:''}.</div>
            </div>`;
            globalCounter++;
        });
    });
    document.getElementById('modalBody').innerHTML = html + "</div>";
    document.getElementById('modalOverlay').style.display='block';
}

function runIdx(type) {
    let map = {};
    recs.forEach((r, i) => {
        let keys = [];
        if(type === 'author') {
            keys.push(r.author);
            if(r.co_authors) r.co_authors.split('،').forEach(n => keys.push(n.trim()));
        } else {
            keys.push(r[type] || "");
        }
        keys.filter(k=>k && k.trim()).forEach(k => {
            let ck = k.trim(); if(!map[ck]) map[ck]=[]; map[ck].push(i+1);
        });
    });
    let sorted = Object.keys(map).sort((a,b)=>cleanAL(a).localeCompare(cleanAL(b),'ar'));
    document.getElementById('modalBody').innerHTML = `<div style="direction:rtl; padding:10px;">` + 
        sorted.map(k=>`<div style="border-bottom:1px solid #eee; padding:3px;">${k} ............ (${map[k].join(', ')})</div>`).join('') + `</div>`;
    document.getElementById('modalOverlay').style.display='block';
}

function deleteP() { if(projs.length > 1 && confirm("حذف المشروع؟")) { localStorage.removeItem('R_'+curP); projs = projs.filter(p=>p!==curP); curP=projs[0]; draw(); } }
function edit(i) { editIdx = i; let r = recs[i]; document.querySelectorAll('.in').forEach(inp => inp.value = r[inp.id] || ""); }
function del(i) { if(confirm("حذف؟")) { recs.splice(i,1); draw(); } }
function newP() { let n = prompt("الاسم:"); if(n) { projs.push(n); curP=n; recs=[]; draw(); } }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
function closeM() { document.getElementById('modalOverlay').style.display='none'; }
function copyRec() { clipboard = {}; document.querySelectorAll('.in').forEach(i => clipboard[i.id] = i.value); }
function pasteRec() { if(clipboard) document.querySelectorAll('.in').forEach(i => i.value = clipboard[i.id] || ""); }
function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${curP}.xlsx`); }
function importX() { let input = document.createElement('input'); input.type='file'; input.onchange=e=>{ let reader=new FileReader(); reader.onload=ev=>{ let wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'}); recs=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); draw(); }; reader.readAsArrayBuffer(e.target.files[0]); }; input.click(); }

window.onload = draw;
</script>
</body>
</html>
