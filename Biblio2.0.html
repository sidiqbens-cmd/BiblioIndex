<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الفهرس الليبي الموحد - 1.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; padding: 5px; table-layout: fixed; }
        .field-label { font-size: 10px; font-weight: bold; color: #333; display: block; }
        input, select, textarea { width: 100%; height: 22px; font-size: 12px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        textarea { height: 40px !important; }
        .actions { background: #cfcfcf; padding: 5px; display: flex; justify-content: center; gap: 4px; border-bottom: 2px solid #2c3e50; flex-wrap: wrap; }
        .btn { padding: 4px 8px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 11px; font-weight: bold; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; }
        .modal-content { background:white; width:95%; margin:1% auto; padding:15px; height: 85vh; overflow-y: auto; }
        .admin-table { border-collapse: collapse; width: 100%; font-size: 11px; }
        .admin-table th { background: #34495e; color: white; padding: 4px; }
        .admin-table td { border: 1px solid #ccc; padding: 2px 5px; height: 20px; }
        .btn-group { display: flex; gap: 2px; justify-content: center; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#34495e; color:white; padding:4px 15px;">
        <strong>الفهرس الليبي الموحد</strong>
        <div style="display:flex; gap:5px;">
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير</button>
            <button onclick="newP()" class="btn" style="background:#27ae60">+ مشروع</button>
            <button onclick="delP()" class="btn" style="background:#c0392b">حذف المشروع</button>
            <select id="pSel" style="width:120px;" onchange="switchP(this.value)"></select>
        </div>
    </div>
    
    <div style="background:#ecf0f1; padding:5px; border-bottom:1px solid #bdc3c7; display:flex; gap:10px; align-items:center; justify-content:center;">
        <span style="font-size:11px; font-weight:bold;">الرقم:</span>
        <input type="number" id="searchID" style="width:50px; height:22px;">
        <button class="btn" style="background:#27ae60;" onclick="loadRec()">استرجاع</button>
        <button class="btn" style="background:#c0392b;" onclick="deleteByNum()">حذف</button>
        <button class="btn" style="background:#3498db;" onclick="openMagManager()">المجلات</button>
        <button class="btn" style="background:#34495e;" onclick="openAdminModal()">إدارة السجلات</button>
        <b id="totalCounter" style="color:red; font-size:14px;"></b>
    </div>

    <form id="mainForm">
        <table class="input-table">
            <tr>
                <td colspan="2"><span class="field-label">رأس الموضوع</span><input type="text" id="subject" list="list_subject" class="in"></td>
                <td><span class="field-label">إحالة انظر</span><input type="text" id="see" list="list_subject" class="in"></td>
                <td><span class="field-label">إحالة انظر أيضاً</span><input type="text" id="see_also" list="list_subject" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">المؤلف (مقلوب)</span><input type="text" id="author" class="in"></td>
                <td><span class="field-label">مؤلفون مشاركون</span><input type="text" id="co_authors" class="in"></td>
                <td><span class="field-label">المترجمون</span><input type="text" id="translator" class="in"></td>
                <td><span class="field-label">المشرف</span><input type="text" id="supervisor" class="in"></td>
            </tr>
            <tr>
                <td colspan="2"><span class="field-label">العنوان الرئيسي</span><input type="text" id="title" class="in"></td>
                <td><span class="field-label">الوعاء</span><select id="doc_type" class="in"><option>كتاب</option><option>مقالة</option><option>رسالة</option></select></td>
                <td><span class="field-label">نوع الرسالة</span><select id="res_type" class="in"><option></option><option>رسالة ماجستير</option><option>أطروحة دكتوراه</option></select></td>
            </tr>
            <tr>
                <td><span class="field-label">الجامعة/الكلية/القسم</span><input type="text" id="uni_info" class="in"></td>
                <td><span class="field-label">المجلة</span><input type="text" id="journal" list="list_mag" class="in"></td>
                <td><span class="field-label">العدد / الناشر</span><input type="text" id="pub_info" class="in"></td>
                <td>
                    <div style="display:flex; gap:2px;">
                        <input type="text" id="year" class="in" placeholder="سنة" style="flex:1">
                        <input type="text" id="edition" class="in" placeholder="طبعة" style="flex:1">
                        <input type="text" id="pages" class="in" placeholder="ص" style="flex:1">
                    </div>
                </td>
            </tr>
        </table>
        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60; flex:1;" onclick="save()">حفظ (Enter)</button>
            <button type="button" class="btn" style="background:#8e44ad;" onclick="openBiblioWindow()">المعاينة</button>
            <button type="button" class="btn" style="background:#34495e;" onclick="runIdx('author', 'المؤلفين')">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400;" onclick="runIdx('supervisor', 'المشرفين')">كشاف المشرفين</button>
            <button type="button" class="btn" style="background:#16a085;" onclick="runIdx('title', 'العناوين')">كشاف العناوين</button>
            <button type="button" class="btn" style="background:#2980b9;" onclick="runIdx('subject', 'الموضوعات', false, true)">الموضوعات</button>
        </div>
    </form>
</div>

<div id="modalOverlay">
    <div style="padding:10px; background:#2c3e50; color:white; display:flex; justify-content:space-between;">
        <span id="mTitle">إدارة البيانات</span>
        <button onclick="closeM()" class="btn" style="background:red">إغلاق</button>
    </div>
    <div class="modal-content" id="modalBody"></div>
</div>

<script>
let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_1'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let mags = JSON.parse(localStorage.getItem('MAG_DATA')) || {}; 
let editIndex = -1;

const cleanSort = (s) => s ? s.toString().replace(/^(ال)/, '').trim() : '';
const fixN = (n) => (n && n.includes('،')) ? n.split('،')[1].trim() + ' ' + n.split('،')[0].trim() : n;

function draw() {
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('MAG_DATA', JSON.stringify(mags));
    recs.sort((a, b) => cleanSort(a.subject).localeCompare(cleanSort(b.subject), 'ar'));
    let c = 0; recs.forEach(r => { if(!r.see) { c++; r.finalID = c; } else r.finalID = null; });
    document.getElementById('pSel').innerHTML = projs.map(p => `<option ${p === curP ? 'selected' : ''}>${p}</option>`).join('');
    document.getElementById('totalCounter').innerText = `[ السجلات: ${c} ]`;
}

// الانتقال بـ Enter
document.getElementById('mainForm').addEventListener('keydown', e => {
    if(e.key === 'Enter') {
        e.preventDefault();
        const inputs = Array.from(document.querySelectorAll('.in'));
        const idx = inputs.indexOf(e.target);
        if(idx < inputs.length - 1) inputs[idx+1].focus(); else save();
    }
});

function save() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    if(!d.subject) return alert("الموضوع مطلوب");
    if (editIndex > -1) { recs[editIndex] = d; editIndex = -1; } else recs.push(d);
    document.getElementById('mainForm').reset();
    document.getElementById('searchID').value = '';
    draw(); document.getElementById('subject').focus();
}

function loadRec() {
    let id = document.getElementById('searchID').value;
    let idx = recs.findIndex(r => r.finalID == id && !r.see);
    if(idx !== -1) { editIndex = idx; document.querySelectorAll('.in').forEach(inp => inp.value = recs[idx][inp.id] || ''); } else alert("غير موجود");
}

function deleteByNum() {
    let id = document.getElementById('searchID').value;
    let idx = recs.findIndex(r => r.finalID == id && !r.see);
    if(idx !== -1 && confirm("حذف؟")) { recs.splice(idx, 1); document.getElementById('mainForm').reset(); draw(); }
}

function openAdminModal() {
    let h = `<input type="text" placeholder="بحث..." oninput="filterT(this.value)" style="width:100%; margin-bottom:5px;">
    <table class="admin-table" id="adminTbl"><thead><tr><th>رقم</th><th>الموضوع</th><th>العنوان</th><th>إجراء</th></tr></thead><tbody>`;
    recs.forEach((r, i) => {
        h += `<tr><td>${r.finalID || '-'}</td><td>${r.subject}</td><td>${r.title || ''}</td>
        <td><div class="btn-group"><button onclick="loadFromIdx(${i})">تعديل</button><button onclick="delIdx(${i})">حذف</button></div></td></tr>`;
    });
    document.getElementById('modalBody').innerHTML = h + `</tbody></table>`;
    document.getElementById('modalOverlay').style.display = 'block';
}

function loadFromIdx(i) { editIndex = i; document.querySelectorAll('.in').forEach(inp => inp.value = recs[i][inp.id] || ''); closeM(); }
function delIdx(i) { if(confirm("حذف؟")) { recs.splice(i, 1); openAdminModal(); draw(); } }
function filterT(q) { document.querySelectorAll('#adminTbl tbody tr').forEach(r => r.style.display = r.innerText.includes(q) ? '' : 'none'); }

function openMagManager() {
    let h = `<div style="display:flex; gap:5px;"><input id="mN" placeholder="مجلة"><input id="mT" placeholder="تبعية"><button onclick="addM()">إضافة</button></div><hr>`;
    for(let m in mags) h += `<div>${m} (${mags[m]}) <button onclick="delM('${m}')">x</button></div>`;
    document.getElementById('modalBody').innerHTML = h; document.getElementById('modalOverlay').style.display = 'block';
}
function addM() { let n=document.getElementById('mN').value, t=document.getElementById('mT').value; if(n){mags[n]=t; openMagManager(); draw();} }
function delM(m) { delete mags[m]; openMagManager(); draw(); }

function openBiblioWindow() {
    const win = window.open('', '_blank');
    let content = `<html dir="rtl"><body style="font-family:'Times New Roman'; padding:40px; line-height:1.4;">`;
    let lastSub = '';
    
    recs.forEach(r => {
        if (r.subject !== lastSub && !r.see) { content += `<div style="text-align:center; background:#eee; font-weight:bold; border:1px solid #000; margin:15px 0;">${r.subject}</div>`; lastSub = r.subject; }
        if (r.see) content += `<div style="text-align:center;"><b>${r.subject} انظر: ${r.see}</b></div>`;
        else if (r.title) {
            // منطق المسؤولية المحدث
            let resp = "";
            if(r.doc_type === 'رسالة') resp = `${fixN(r.author)} ؛ إشراف ${r.supervisor || ''}`;
            else {
                resp = r.co_authors ? `${fixN(r.author)} ، ${r.co_authors}` : "";
                if(r.translator) resp += (resp ? " ؛ ترجمة " : "ترجمة ") + r.translator;
                if(r.supervisor) resp += (resp ? " ؛ إشراف " : "إشراف ") + r.supervisor;
            }

            let jInfo = r.journal ? (mags[r.journal] ? `${r.journal} (${mags[r.journal]})` : r.journal) : "";
            let details = [r.uni_info, jInfo, r.pub_info, r.year, r.edition].filter(x=>x).join(" ، ");
            let pg = r.pages ? (r.doc_type === 'مقالة' ? "ص." + r.pages : r.pages + " ص") : "";

            content += `<div style="margin-bottom:10px; text-align:justify;">
                <span style="float:left">(${r.finalID})</span><b>${r.author}</b><br>
                ${r.title}${resp ? " / " + resp : ""} 
                ${details ? " . ـــ " + details : ""} 
                ${pg ? " . ـــ " + pg : ""} 
                ${r.res_type ? " . ـــ (" + r.res_type + ")" : ""}${pg ? " ." : " . ـــ"}
            </div>`;
        }
    });
    win.document.write(content + '</body></html>'); win.document.close();
}

function runIdx(f, t, isL=false, isS=false) {
    let m = {};
    recs.forEach(r => { if (r.finalID && r[f]) { r[f].split('؛').forEach(v => { v=v.trim(); if(!m[v]) m[v]=[]; if(!m[v].includes(r.finalID)) m[v].push(r.finalID); }); } });
    let k = Object.keys(m).sort((a,b)=>cleanSort(a).localeCompare(cleanSort(b), isL?'en':'ar'));
    let h = `<div style="column-count:2">` + k.map(x=>`<div>${x} (${m[x].join(' ، ')})</div>`).join('') + `</div>`;
    document.getElementById('modalBody').innerHTML = `<h2>كشاف ${t}</h2>` + h; document.getElementById('modalOverlay').style.display='block';
}

function exportX() { XLSX.writeFile(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(recs), `${curP}.xlsx`); }
function newP() { let n=prompt("الاسم:"); if(n){projs.push(n); curP=n; recs=[]; draw();} }
function delP() { if(confirm("حذف المشروع؟")){ projs=projs.filter(p=>p!==curP); curP=projs[0]||'مشروع_1'; if(!projs.length) projs=['مشروع_1']; switchP(curP); } }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
function closeM() { document.getElementById('modalOverlay').style.display='none'; }
window.onload = draw;
</script>
</body>
</html>
