<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة الرسائل الجامعية</title>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; padding: 5px; }
        input, select { width: 100%; height: 26px; border: 1px solid #999; box-sizing: border-box; }
        .actions { background: #cfcfcf; padding: 8px; display: flex; justify-content: center; gap: 6px; border-bottom: 2px solid #2c3e50; }
        .btn { padding: 5px 12px; cursor: pointer; border: none; border-radius: 3px; color: white; font-weight: bold; background: #34495e; }
        .scroll-area { margin-top: 310px; padding: 10px; }
        .admin-table { border-collapse: collapse; width: 100%; background: #fff; }
        .admin-table th, .admin-table td { border: 1px solid #ccc; padding: 6px; text-align: right; }
        /* تصميم النافذة المنبثقة كما في صورة 547810 */
        #modal { display: none; position: fixed; top: 10%; left: 10%; width: 80%; height: 80%; background: white; border: 2px solid #2c3e50; z-index: 2000; overflow-y: auto; padding: 20px; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="background:#34495e; color:white; padding:6px 15px; display:flex; justify-content:space-between;">
        <strong>منظومة الرسائل الجامعية</strong>
        <div>
            <button class="btn" onclick="alert('نسخ')">نسخ</button>
            <button class="btn" onclick="alert('لصق')">لصق</button>
            <button class="btn" onclick="alert('استيراد')">استيراد</button>
            <button class="btn" onclick="alert('تصدير')">تصدير</button>
            <button class="btn" onclick="addProject()">+ مشروع جديد</button>
            <select id="pSel"><option>المشروع الرئيسي</option></select>
            <button class="btn" style="background:#c0392b" onclick="delProject()">حذف</button>
        </div>
    </div>
    
    <div style="background:#ecf0f1; padding:8px; display:flex; justify-content:space-between;">
        <div>رقم التسجيلة: <input type="number" id="searchID" style="width:80px;"> <button class="btn" onclick="loadRec()">استرجاع</button></div>
        <span id="totalCounter" style="font-weight:bold;">[ العدد الإجمالي: 0 ]</span>
    </div>

    <table class="input-table">
        <tr>
            <td>رأس الموضوع<select id="subject" class="in"><option>القانون الدولي</option></select></td>
            <td>إحالة انظر<select id="see" class="in"></select></td>
            <td>إحالة انظر أيضاً<select id="see_also" class="in"></select></td>
        </tr>
        <tr>
            <td>اسم الطالب<select id="author" class="in"><option>ابن كثير، محمد</option></select></td>
            <td colspan="2">العنوان<select id="title" class="in"></select></td>
        </tr>
        <tr>
            <td>المشرف<select id="editor" class="in"></select></td>
            <td>القسم<select id="dept" class="in"><option>المكتبات</option></select></td>
            <td>الكلية<select id="faculty" class="in"><option>الآداب</option></select></td>
        </tr>
        <tr>
            <td>الجامعة<select id="uni" class="in"><option>المركزية</option></select></td>
            <td>السنة<select id="year" class="in"><option>2025</option></select></td>
            <td>نوع الرسالة<select id="type" class="in"><option>ماجستير</option></select></td>
        </tr>
    </table>

    <div class="actions">
        <button class="btn" onclick="save()">حفظ السجل</button>
        <button class="btn" onclick="openModal('المعاينة النهائية')">المعاينة</button>
        <button class="btn" onclick="openModal('قائمة الأقسام')">قائمة الأقسام</button>
        <button class="btn" onclick="openModal('قائمة الكليات')">قائمة الكليات</button>
        <button class="btn" onclick="openModal('قائمة الجامعات')">قائمة الجامعات</button>
    </div>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead><tr><th style="width:40px;">رقم</th><th>المحتوى</th><th style="width:120px;">إجراءات</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<div id="modal">
    <button onclick="document.getElementById('modal').style.display='none'">إغلاق</button>
    <div id="modalContent"></div>
</div>

<script>
function addProject() {
    let name = prompt("أدخل اسم المشروع الجديد:");
    if(name) {
        let opt = document.createElement('option');
        opt.text = name;
        document.getElementById('pSel').add(opt);
    }
}
function openModal(title) {
    document.getElementById('modal').style.display = 'block';
    document.getElementById('modalContent').innerHTML = `<h2>${title}</h2><p>محتوى ${title} سيظهر هنا كما في الصورة...</p>`;
}
// الدوال الأخرى تبقى كما هي...
</script>
</body>
</html>
