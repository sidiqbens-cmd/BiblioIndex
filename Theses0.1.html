<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Theses 0.1 - منظومة الرسائل الجامعية</title>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; padding: 5px; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; }
        .field-label { font-size: 12px; font-weight: bold; display: block; color: #000; }
        input, select { width: 100%; height: 32px; font-size: 14px; font-weight: bold; border: 1px solid #7f8c8d; }
        .actions { background: #cfcfcf; padding: 10px; display: flex; justify-content: center; gap: 10px; border-top: 2px solid #34495e; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; color: #fff; font-size: 14px; font-weight: bold; }
        .stats-area { background: #34495e; color: white; padding: 5px; font-size: 12px; display: flex; justify-content: space-around; }
        .scroll-area { margin-top: 240px; padding: 10px; }
        .ent { margin-bottom: 8px; padding: 8px; background: white; border-bottom: 1px solid #ccc; font-size: 14px; }
    </style>
</head>
<body>

<div class="fixed-header">
    <table class="input-table">
        <tr>
            <td><span class="field-label">رأس الموضوع</span><input type="text" id="subject" class="in"></td>
            <td><span class="field-label">إحالة انظر</span><input type="text" id="see" class="in"></td>
            <td><span class="field-label">إحالة انظر أيضاً</span><input type="text" id="see_also" class="in"></td>
            <td><span class="field-label">اسم الطالب (مقلوب)</span><input type="text" id="student" class="in"></td>
        </tr>
        <tr>
            <td><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
            <td><span class="field-label">المشرف</span><input type="text" id="supervisor" class="in"></td>
            <td><span class="field-label">الجامعة</span><input type="text" id="univ" class="in"></td>
            <td><span class="field-label">الكلية</span><input type="text" id="faculty" class="in"></td>
            <td><span class="field-label">القسم</span><input type="text" id="dept" class="in"></td>
            <td><span class="field-label">السنة</span><input type="text" id="year" class="in"></td>
            <td><span class="field-label">النوع</span>
                <select id="type" class="in">
                    <option value="رسالة ماجستير">ماجستير</option>
                    <option value="أطروحة دكتوراه">دكتوراه</option>
                </select>
            </td>
        </tr>
    </table>
    
    <div class="actions">
        <button class="btn" style="background:#27ae60" onclick="save()">حفظ التسجيلة</button>
        <button class="btn" style="background:#8e44ad" onclick="viewBiblio()">المعاينة النهائية</button>
        <button class="btn" style="background:#2980b9">الجامعات</button>
        <button class="btn" style="background:#d35400">الكليات</button>
        <button class="btn" style="background:#16a085">الأقسام</button>
    </div>

    <div class="stats-area" id="statsBar">
        <span>إجمالي الرسائل: 0</span>
    </div>
</div>

<div id="displayArea" class="scroll-area"></div>

<script>
    let theses = JSON.parse(localStorage.getItem('theses_db')) || [];

    function save() {
        let entry = {};
        document.querySelectorAll('.in').forEach(el => entry[el.id] = el.value);
        theses.push(entry);
        localStorage.setItem('theses_db', JSON.stringify(theses));
        updateUI();
    }

    function updateUI() {
        // تحديث الإحصائيات
        let masterCount = theses.filter(t => t.type === "رسالة ماجستير").length;
        let docCount = theses.filter(t => t.type === "أطروحة دكتوراه").length;
        document.getElementById('statsBar').innerHTML = 
            `<span>إجمالي: ${theses.length}</span> | <span>ماجستير: ${masterCount}</span> | <span>دكتوراه: ${docCount}</span>`;

        let html = '';
        theses.forEach((t, i) => {
            html += `<div class="ent">
                <b>(${i+1})</b> <span style="font-weight:bold; font-size:16px;">${t.student}</span><br>
                ${t.title} / إشراف: ${t.supervisor} . ــــ ${t.dept}، ${t.faculty}، ${t.univ}، ${t.year} . ـــ ${t.type}
            </div>`;
        });
        document.getElementById('displayArea').innerHTML = html;
    }
    updateUI();

    function viewBiblio() {
        let win = window.open('', '_blank');
        win.document.write('<html><body dir="rtl" style="font-family:Times New Roman; padding:40px;">' + document.getElementById('displayArea').innerHTML + '</body></html>');
    }
</script>
</body>
</html>
