<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Theses 0.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; padding: 5px; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 26px; font-size: 13px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; padding: 8px; display: flex; justify-content: center; gap: 6px; border-bottom: 2px solid #2c3e50; flex-wrap: wrap; }
        .btn { padding: 5px 12px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 280px; height: calc(100vh - 290px); overflow-y: auto; padding: 10px; }
        .stats-area { background: #bdbdbd; padding: 5px; font-weight: bold; font-size: 13px; text-align: center; }
        .admin-table { border-collapse: collapse; background: #fff; font-size: 12px; width: 100%; }
        .admin-table th { background: #34495e; color: white; padding: 8px; }
        .admin-table td { border: 1px solid #ccc; padding: 6px; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#34495e; color:white; padding:6px 15px;">
        <strong style="font-size: 18px;">Theses 0.1</strong>
        <div style="display:flex; gap:8px;">
            <button class="btn" style="background:#7f8c8d">نسخ</button>
            <button class="btn" style="background:#e67e22">استيراد</button>
            <button class="btn" style="background:#2980b9">تصدير</button>
            <button class="btn" style="background:#27ae60">+ مشروع</button>
        </div>
    </div>
    
    <div style="background:#ecf0f1; padding:8px; display:flex; align-items:center; gap:10px;">
        <strong>رقم التسجيلة:</strong>
        <input type="number" id="searchID" style="width:80px; padding:2px;">
        <button class="btn" style="background:#27ae60" onclick="loadRec()">استرجاع</button>
        <span id="totalCounter">[ العدد: 0 ]</span>
    </div>

    <table class="input-table">
        <tr>
            <td><span class="field-label">رأس الموضوع</span><input type="text" id="subject" class="in"></td>
            <td><span class="field-label">إحالة انظر</span><input type="text" id="see" class="in"></td>
            <td><span class="field-label">إحالة انظر أيضاً</span><input type="text" id="see_also" class="in"></td>
        </tr>
        <tr>
            <td><span class="field-label">اسم الطالب (مقلوب)</span><input type="text" id="author" class="in"></td>
            <td colspan="2"><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
        </tr>
        <tr>
            <td><span class="field-label">المشرف</span><input type="text" id="editor" class="in"></td>
            <td><span class="field-label">القسم، الكلية، الجامعة</span><input type="text" id="details" class="in"></td>
            <td><span class="field-label">السنة، نوع الرسالة</span><input type="text" id="year_type" class="in"></td>
        </tr>
    </table>

    <div class="actions">
        <button class="btn" style="background:#27ae60" onclick="save()">حفظ</button>
        <button class="btn" style="background:#8e44ad" onclick="openBiblioWindow()">المعاينة</button>
    </div>
    <div class="stats-area" id="statsBar">إحصائيات: الأقسام (0) | الكليات (0) | الجامعات (0)</div>
</div>

<div class="scroll-area">
    <table class="admin-table" id="adminBody"></table>
</div>

<script>
let recs = JSON.parse(localStorage.getItem('THESES_DATA')) || [];

function save() {
    let d = {};
    document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    recs.push(d);
    localStorage.setItem('THESES_DATA', JSON.stringify(recs));
    draw();
}

function draw() {
    // تحديث الإحصائيات البسيط
    document.getElementById('statsBar').innerText = `إحصائيات: العدد الكلي (${recs.length})`;
    
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `<tr>
        <td>${i+1}</td><td>${r.subject}</td>
        <td><b>${r.author}</b> - ${r.title} / إشراف: ${r.editor} . ــــ ${r.details} . ـــ ${r.year_type}</td>
    </tr>`).join('');
}
window.onload = draw;
</script>
</body>
</html>
