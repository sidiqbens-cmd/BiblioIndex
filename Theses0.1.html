<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة الرسائل الجامعية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; padding: 5px; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 26px; font-size: 13px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 8px; display: flex; justify-content: center; gap: 6px; border-bottom: 2px solid #2c3e50; flex-wrap: wrap; }
        .btn { padding: 5px 12px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 310px; height: calc(100vh - 320px); overflow-y: auto; padding: 10px; }
        .admin-table { border-collapse: collapse; background: #fff; font-size: 12px; width: 100%; }
        .admin-table th { background: #34495e; color: white; padding: 8px; border: 1px solid #2c3e50; }
        .admin-table td { border: 1px solid #ccc; padding: 6px; text-align: right; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#34495e; color:white; padding:6px 15px;">
        <strong style="font-size: 18px;">منظومة الرسائل الجامعية</strong>
        <div style="display:flex; gap:8px;">
            <button class="btn" style="background:#7f8c8d">نسخ تسجيلة</button>
            <button class="btn" style="background:#95a5a6">لصق تسجيلة</button>
            <button class="btn" style="background:#e67e22">استيراد XLSX</button>
            <button class="btn" style="background:#2980b9">تصدير XLSX</button>
            <button class="btn" style="background:#27ae60">+ مشروع جديد</button>
            <select id="pSel" style="width:120px"></select>
            <button class="btn" style="background:#c0392b">حذف المشروع</button>
        </div>
    </div>
    
    <div style="background:#ecf0f1; padding:8px; border-bottom:2px solid #bdc3c7; display:flex; align-items:center; justify-content:space-between;">
        <div>
            <strong>رقم التسجيلة:</strong>
            <input type="number" id="searchID" style="width:80px; padding:5px;">
            <button class="btn" style="background:#27ae60" onclick="loadRec()">استرجاع للتعديل</button>
        </div>
        <span id="totalCounter" style="color:#c0392b; font-weight:bold;">[ العدد الإجمالي: 0 ]</span>
    </div>

    <table class="input-table">
        <tr>
            <td><span class="field-label">رأس الموضوع</span><input type="text" id="subject" class="in"></td>
            <td><span class="field-label">إحالة انظر</span><input type="text" id="see" class="in"></td>
            <td><span class="field-label">إحالة انظر أيضاً</span><input type="text" id="see_also" class="in"></td>
        </tr>
        <tr>
            <td><span class="field-label">اسم الطالب (مقلوب)</span><input type="text" id="author" class="in"></td>
            <td colspan="2"><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
        </tr>
        <tr>
            <td><span class="field-label">المشرف</span><input type="text" id="editor" class="in"></td>
            <td><span class="field-label">القسم</span><input type="text" id="dept" class="in"></td>
            <td><span class="field-label">الكلية</span><input type="text" id="faculty" class="in"></td>
        </tr>
        <tr>
            <td><span class="field-label">الجامعة</span><input type="text" id="uni" class="in"></td>
            <td><span class="field-label">السنة</span><input type="text" id="year" class="in"></td>
            <td><span class="field-label">نوع الرسالة</span><input type="text" id="type" class="in"></td>
        </tr>
    </table>

    <div class="actions">
        <button class="btn" style="background:#27ae60" onclick="save()">حفظ السجل</button>
        <button class="btn" style="background:#2980b9" onclick="runIdx('dept', 'الأقسام')">قائمة الأقسام</button>
        <button class="btn" style="background:#d35400" onclick="runIdx('faculty', 'الكليات')">قائمة الكليات</button>
        <button class="btn" style="background:#16a085" onclick="runIdx('uni', 'الجامعات')">قائمة الجامعات</button>
    </div>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead>
            <tr><th style="width:40px;">رقم</th><th>المحتوى</th><th style="width:100px;">إجراءات</th></tr>
        </thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
let recs = JSON.parse(localStorage.getItem('THESES_DATA')) || [];

const cleanSort = (s) => s ? s.replace(/^(ال)/, '').trim() : '';

function draw() {
    document.getElementById('totalCounter').innerText = `[ العدد الإجمالي: ${recs.length} ]`;
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `<tr>
        <td>${i+1}</td>
        <td><b>${r.subject || ''}</b>: ${r.author || ''} - ${r.title || ''} (${r.year || ''})</td>
        <td>
            <button onclick="edit(${i})">تعديل</button>
            <button onclick="del(${i})" style="color:red">حذف</button>
        </td>
    </tr>`).join('');
}

function runIdx(field, label) {
    let m = {};
    recs.forEach(r => { if(r[field]) m[r[field]] = (m[r[field]] || 0) + 1; });
    let sorted = Object.keys(m).sort((a,b) => cleanSort(a).localeCompare(cleanSort(b), 'ar'));
    let h = `<h3>قائمة ${label}</h3><ul>`;
    sorted.forEach(k => h += `<li>${k} (${m[k]})</li>`);
    alert("بيانات " + label + ":\n" + sorted.join('\n'));
}

function save() {
    let d = {};
    document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    recs.push(d);
    localStorage.setItem('THESES_DATA', JSON.stringify(recs));
    draw();
}
function del(i) { recs.splice(i,1); draw(); }
window.onload = draw;
</script>
</body>
</html>
