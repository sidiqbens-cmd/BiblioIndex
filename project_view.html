<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ببليوإندكس - BiblioIndex</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* العودة لتنسيق الأمس بدقة */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 10px; font-size: 13px; }
        .container { max-width: 1200px; margin: auto; background: #fff; padding: 15px; border-radius: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #27ae60; padding-bottom: 10px; margin-bottom: 15px; }
        
        /* شبكة الإدخال كما كانت أمس مع زيادة خانتين */
        .grid-form { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 5px; }
        input, select, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
        
        .btn-add { background: #2c3e50; color: white; cursor: pointer; grid-column: span 2; }
        .btn-stats { background: #8e44ad; color: white; cursor: pointer; width: auto; padding: 5px 15px; }
        .btn-export { background: #27ae60; color: white; cursor: pointer; width: auto; padding: 5px 15px; }

        /* الأبواب والمعاينة */
        .category-header { background: #ecf0f1; padding: 5px 15px; margin: 15px 0 5px 0; border-right: 5px solid #27ae60; font-weight: bold; }
        .record-item { padding: 5px; border-bottom: 1px solid #eee; display: flex; gap: 10px; }

        /* صفحة الإحصائيات المستقلة */
        #statsPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; padding: 20px; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display: flex; gap: 10px;">
            <button onclick="exportExcel()" class="btn-export">📥 تصدير XLSX</button>
            <button onclick="showStats()" class="btn-stats">📊 الإحصائيات</button>
        </div>
        <h2 style="margin:0;">ببليوإندكس</h2>
    </div>

    <div class="grid-form">
        <select id="project" onchange="loadData()">
            <option value="">-- اختر المشروع --</option>
            <option>علوم القرآن الكريم</option>
            <option>العلم المفتوح</option>
            <option>الذكاء الاصطناعي</option>
            <option>النتاج المترجم في المكتبات</option>
        </select>
        
        <input type="text" id="deweyP" placeholder="التوزيع المئوي لديوي">
        <select id="deweyD">
            <option value="">-- التوزيع العشري --</option>
            <option>020 المكتبات والمعلومات</option>
            <option>210 علوم القرآن</option>
            <option>004 الحاسبات</option>
        </select>
        
        <input type="text" id="title" placeholder="عنوان الكتاب / البحث">
        <input type="text" id="author" placeholder="المؤلف الأصلي">
        <input type="text" id="translator" placeholder="المترجم">
        <input type="number" id="year" placeholder="السنة">
        <input type="text" id="country" placeholder="الدولة">
        <input type="text" id="publisher" placeholder="دار النشر / المجلة">
        <select id="type"><option>كتاب</option><option>بحث/مقال</option></select>
        
        <button onclick="addRecord()" class="btn-add">إضافة التسجيلة</button>
    </div>

    <div id="previewArea"></div>
</div>

<div id="statsPage">
    <button onclick="document.getElementById('statsPage').style.display='none'" style="background:red; color:white; border:none; padding:10px; cursor:pointer;">إغلاق والعودة ✖</button>
    <h2 id="statsTitle" style="text-align:center;">إحصائيات المشروع</h2>
    <div class="stats-grid">
        <div style="border:1px solid #ddd; padding:10px;"><canvas id="chart1"></canvas></div>
        <div style="border:1px solid #ddd; padding:10px;"><canvas id="chart2"></canvas></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('biblioIndex')) || {};

    function addRecord() {
        const p = document.getElementById('project').value;
        if(!p) return alert("اختر المشروع");
        const entry = {
            id: Date.now(),
            title: document.getElementById('title').value,
            deweyP: document.getElementById('deweyP').value,
            deweyD: document.getElementById('deweyD').value || "عام",
            author: document.getElementById('author').value,
            translator: document.getElementById('translator').value,
            year: document.getElementById('year').value,
            country: document.getElementById('country').value,
            publisher: document.getElementById('publisher').value,
            type: document.getElementById('type').value
        };
        if(!db[p]) db[p] = [];
        db[p].push(entry);
        localStorage.setItem('biblioIndex', JSON.stringify(db));
        loadData();
    }

    function loadData() {
        const p = document.getElementById('project').value;
        const area = document.getElementById('previewArea');
        area.innerHTML = "";
        if(!db[p]) return;

        // الترتيب الهجائي مع تجاهل "أل" كما كان أمس
        const clean = (s) => s.replace(/^(ال|الـ)/, "").trim();
        let cats = [...new Set(db[p].map(r => r.deweyD))].sort((a,b) => clean(a).localeCompare(clean(b), 'ar'));
        
        let idx = 1;
        cats.forEach(c => {
            area.innerHTML += `<div class="category-header">${c}</div>`;
            let items = db[p].filter(r => r.deweyD === c).sort((a,b) => clean(a.title).localeCompare(clean(b.title), 'ar'));
            items.forEach(r => {
                area.innerHTML += `<div class="record-item"><span>${idx++}.</span> <span><strong>${r.title}</strong> | ${r.author} | ${r.year}</span></div>`;
            });
        });
    }

    function showStats() {
        const p = document.getElementById('project').value;
        if(!p || !db[p]) return alert("لا توجد بيانات");
        document.getElementById('statsPage').style.display = "block";
        document.getElementById('statsTitle').innerText = `إحصائيات مشروع: ${p}`;
        // سيتم توليد الرسوم هنا بناءً على بيانات المشروع المختصرة
    }

    function exportExcel() {
        const p = document.getElementById('project').value;
        if(!p) return;
        const ws = XLSX.utils.json_to_sheet(db[p]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, `${p}_${new Date().toLocaleDateString()}.xlsx`);
    }
</script>
</body>
</html>
