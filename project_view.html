<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ببليوإندكس - الفهرس الليبي الموحد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; padding: 5px; table-layout: fixed; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 26px; font-size: 13px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 8px; display: flex; justify-content: center; gap: 6px; border-bottom: 2px solid #2c3e50; flex-wrap: wrap; }
        .btn { padding: 5px 12px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 340px; height: calc(100vh - 350px); overflow-y: auto; padding: 10px; }
        .admin-table { border-collapse: collapse; background: #fff; font-size: 12px; width: 100%; table-layout: fixed; }
        .admin-table th { position: sticky; top: 0; background: #34495e; color: white; padding: 8px; border: 1px solid #2c3e50; }
        .admin-table td { border: 1px solid #ccc; padding: 6px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; }
        .modal-content { background:white; width:95%; margin:1% auto; padding:20px; height: 85vh; overflow-y: auto; border: 1px solid #000; }
        .bib-container { column-count: 2; column-gap: 30px; text-align: justify; }
        .dewey-header { text-align: center; font-size: 16px; font-weight: bold; margin: 15px 0; display: block; width: 100%; }
        .subject-row { text-align: center; font-size: 14px; font-weight: bold; background: #f2f2f2; margin: 10px 0; padding: 4px; border: none; }
        .see-also-row { text-align: right; font-size: 13px; background: #f9f9f9; margin: -5px 0 10px 0; padding: 3px 10px; }
        .author-line { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; margin-bottom: 2px; line-height: 1.1; font-weight: bold; }
        .data-block { font-size: 12px; line-height: 1.1; margin-bottom: 12px; }
        .title-bold { font-weight: bold; }
        .ltr { direction: ltr; text-align: left; }
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#34495e; color:white; padding:6px 15px;">
        <strong style="font-size: 18px;">ببليوإندكس - الفهرس الليبي الموحد</strong>
        <div style="display:flex; gap:8px;">
            <button onclick="document.getElementById('xlIn').click()" class="btn" style="background:#e67e22">استيراد</button>
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير</button>
            <input type="file" id="xlIn" style="display:none" onchange="importX(event)">
            <select id="pSel" style="width:140px" onchange="switchP(this.value)"></select>
            <button onclick="newP()" class="btn" style="background:#27ae60">+</button>
        </div>
    </div>

    <form id="bForm">
        <div style="background:#bdc3c7; padding:4px; display:flex; gap:10px; justify-content:center; border-bottom:2px solid #7f8c8d;">
            <div style="display:flex; align-items:center; gap:5px;">
                <span class="field-label">المئوي:</span>
                <select id="dewey_hundred" class="in" style="width:180px" onchange="fillDewey(this.value)">
                    <option value="">-- اختر --</option>
                    <option value="000">000 الأعمال العامة</option>
                    <option value="100">100 الفلسفة</option>
                    <option value="200">200 الديانات</option>
                    <option value="300">300 العلوم الاجتماعية</option>
                    <option value="400">400 اللغات</option>
                    <option value="500">500 العلوم البحتة</option>
                    <option value="600">600 العلوم التطبيقية</option>
                    <option value="700">700 الفنون</option>
                    <option value="800">800 الآداب</option>
                    <option value="900">900 الجغرافيا والتاريخ</option>
                </select>
            </div>
            <div style="display:flex; align-items:center; gap:5px;">
                <span class="field-label">العشري:</span>
                <select id="dewey_decimal" class="in" style="width:250px"></select>
            </div>
        </div>

        <table class="input-table">
            <tr>
                <td><span class="field-label">رأس الموضوع</span><input type="text" id="subject" list="list_subject" class="in"></td>
                <td><span class="field-label">إحالة انظر</span><input type="text" id="see" list="list_see" class="in"></td>
                <td><span class="field-label">إحالة انظر أيضاً</span><input type="text" id="see_also" list="list_see_also" class="in"></td>
                <td><span class="field-label">المؤلف الأصلي</span><input type="text" id="original_author" list="list_original_author" class="in"></td>
                <td><span class="field-label">المؤلف (مقلوب) /</span><input type="text" id="author" list="list_author" class="in"></td>
                <td><span class="field-label">المحقق/المراجع /</span><input type="text" id="editor" list="list_editor" class="in"></td>
            </tr>
            <tr>
                <td colspan="3"><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
                <td><span class="field-label">الدولة</span><input type="text" id="country" list="list_country" class="in"></td>
                <td><span class="field-label">المجلة</span><input type="text" id="journal" list="list_journal" class="in"></td>
                <td><span class="field-label">العدد/المجلد</span><input type="text" id="issue" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">السنة</span><input type="text" id="year" list="list_year" class="in"></td>
                <td><span class="field-label">الناشر</span><input type="text" id="publisher" list="list_publisher" class="in"></td>
                <td><span class="field-label">التبعية</span><input type="text" id="affiliation" list="list_affiliation" class="in"></td>
                <td><span class="field-label">نوع الوعاء</span><input type="text" id="material_type" list="list_material_type" class="in"></td>
                <td><span class="field-label">مترجم كشاف</span><input type="text" id="trans_idx" list="list_trans_idx" class="in"></td>
                <td><span class="field-label">الصفحات</span><input type="text" id="pages" class="in"></td>
            </tr>
        </table>

        <div id="dynamicDatalists">
            <datalist id="list_subject"></datalist><datalist id="list_see"></datalist><datalist id="list_see_also"></datalist>
            <datalist id="list_original_author"></datalist><datalist id="list_author"></datalist><datalist id="list_editor"></datalist>
            <datalist id="list_country"></datalist><datalist id="list_journal"></datalist><datalist id="list_year"></datalist>
            <datalist id="list_affiliation"></datalist><datalist id="list_publisher"></datalist><datalist id="list_material_type"></datalist>
            <datalist id="list_trans_idx"></datalist>
        </div>

        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="viewPrint()">المعاينة</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runAuthorIdx()">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title', 'العناوين')">العناوين</button>
            <button type="button" class="btn" style="background:#c0392b" onclick="runIdx('trans_idx', 'المترجمين')">المترجمين</button>
            <button type="button" class="btn" style="background:#16a085" onclick="journalIdx()">المجلات</button>
        </div>
    </form>
</div>

<div id="modalOverlay">
    <div style="padding: 8px; background: #2c3e50; color:white; display: flex; justify-content: space-between; align-items: center;">
        <strong>المعاينة النهائية</strong>
        <button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق</button>
    </div>
    <div class="modal-content" id="modalBody"></div>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead><tr><th style="width:40px;">#</th><th style="width:180px;">رأس الموضوع</th><th>البيانات</th><th style="width:100px;">إجراءات</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
const deweyMap = {
    "000": ["010 الببليوجرافيات", "020 المكتبات والمعلومات", "030 الموسوعات العامة", "050 الدوريات العامة", "070 الصحافة والنشر", "090 المخطوطات والكتب النادرة"],
    "100": ["110 ما وراء الطبيعة", "150 علم النفس", "160 المنطق", "170 الأخلاق", "180 الفلسفة القديمة", "190 الفلسفة الغربية"],
    "200": ["210 الإسلام", "220 القرآن وعلومه", "230 الحديث الشريف", "240 التوحيد", "250 الفقه الإسلامي"],
    "300": ["310 الإحصاء", "320 العلوم السياسية", "330 الاقتصاد", "340 القانون", "370 التربية والتعليم"],
    "400": ["410 اللغة العربية", "420 اللغة الإنجليزية"],
    "500": ["510 الرياضيات", "530 الفيزياء", "540 الكيمياء"],
    "600": ["610 الطب", "620 الهندسة", "630 الزراعة"],
    "700": ["720 العمارة", "750 الرسم"],
    "800": ["810 الأدب العربي", "820 الأدب الإنجليزي"],
    "900": ["910 الجغرافيا", "920 التراجم", "950 تاريخ آسيا", "960 تاريخ أفريقيا"]
};

function fillDewey(v) {
    const d = document.getElementById('dewey_decimal');
    d.innerHTML = '<option value="">-- اختر القسم العشري --</option>';
    if (deweyMap[v]) deweyMap[v].forEach(x => { let o = document.createElement('option'); o.value = x; o.innerText = x; d.appendChild(o); });
}

function isAr(t) { return /[\u0600-\u06FF]/.test(t); }

function viewPrint() {
    if (recs.length === 0) return;
    let h = `<div class="bib-container">`, lastD = "", lastS = "", counter = 1;
    recs.forEach(r => {
        if (r.dewey_decimal && r.dewey_decimal !== lastD) { lastD = r.dewey_decimal; h += `<div class="dewey-header">${lastD}</div>`; }
        let currentH = r.see || r.subject;
        if (currentH !== lastS) { 
            lastS = currentH; 
            h += `<div class="subject-row">${lastS}${r.see ? ' (انظر)' : ''}</div>`;
            if (r.see_also) h += `<div class="see-also-row">انظر أيضاً: ${r.see_also}</div>`;
        }
        if (r.title) {
            let dir = isAr(r.author || r.title) ? 'rtl' : 'ltr';
            let n = counter++;
            let authorField = r.author || '';
            let editorField = r.editor || '';
            
            h += `<div class="data-block ${dir}">
                    <div class="author-line">
                        ${dir === 'rtl' ? `<span>${authorField}${editorField ? '؛ ' + editorField : ''}</span><span>${n}</span>` : `<span>${n}</span><span>${authorField}${editorField ? '; ' + editorField : ''}</span>`}
                    </div>
                    <div><span class="title-bold">${r.title}.</span> ${r.journal ? r.journal + '.' : ''} ${r.issue ? 'ع ' + r.issue + '.' : ''} ${r.publisher ? r.publisher + '.' : ''} ${r.year ? r.year + '.' : ''} ${r.pages ? 'ص ' + r.pages + '.' : ''}</div>
                  </div>`;
        }
    });
    document.getElementById('modalBody').innerHTML = h + `</div>`;
    document.getElementById('modalOverlay').style.display = 'block';
}

let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_1'], curP = localStorage.getItem('L_A') || projs[0], recs = JSON.parse(localStorage.getItem('R_' + curP)) || [], editIdx = -1;
const clean = (s) => s ? s.replace(/^(ال)/, '').trim() : '';

function updateLists() {
    const fields = ['subject', 'see', 'see_also', 'original_author', 'author', 'editor', 'country', 'journal', 'year', 'affiliation', 'publisher', 'material_type', 'trans_idx'];
    fields.forEach(f => {
        let vals = [];
        if (f === 'see_also' || f === 'see') vals = recs.map(r => r.subject).filter(v => v);
        else recs.forEach(r => { if(r[f]) { if(f==='author'||f==='editor') vals.push(...r[f].split('/')); else vals.push(r[f]); } });
        let unique = [...new Set(vals.map(v=>v.trim()))].sort((a,b)=>clean(a).localeCompare(clean(b), 'ar'));
        document.getElementById('list_' + f).innerHTML = unique.map(v => `<option value="${v}">`).join('');
    });
}

function draw() {
    recs.sort((a,b) => clean(a.subject||'').localeCompare(clean(b.subject||''), 'ar'));
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    updateLists();
    let c = 1;
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => {
        let id = (r.see || r.see_also) && !r.title ? '-' : c++;
        return `<tr><td>${id}</td><td>${r.subject}</td><td>${r.title || (r.see?'انظر: '+r.see:'')}</td><td><button onclick="edit(${i})">تعديل</button><button onclick="deleteRec(${i})" style="color:red">X</button></td></tr>`;
    }).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
}

function save() { 
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim()); 
    if(!d.subject) return; 
    if (editIdx > -1) recs[editIdx] = d; else recs.push(d); 
    editIdx = -1; draw(); document.getElementById('bForm').reset(); 
}

function edit(i) { 
    editIdx = i; let r = recs[i]; 
    document.querySelectorAll('.in').forEach(inp => {
        if(inp.id === 'dewey_hundred') { inp.value = r.dewey_hundred || ''; fillDewey(r.dewey_hundred); }
        else if(inp.id === 'dewey_decimal') { setTimeout(() => inp.value = r.dewey_decimal || '', 10); }
        else inp.value = r[inp.id] || '';
    });
    window.scrollTo(0,0); 
}

function runAuthorIdx() {
    let m = {}, bibC = 1;
    recs.forEach(r => {
        if (r.title) {
            let names = [...new Set([...(r.author||'').split('/'), ...(r.editor||'').split('/')])].map(n=>n.trim()).filter(n=>n);
            names.forEach(n => { if(!m[n]) m[n]=[]; if(!m[n].includes(bibC)) m[n].push(bibC); });
            bibC++;
        }
    });
    renderIdx(m, "المؤلفين والمحققين");
}

function runIdx(f, l) {
    let m = {}, bibC = 1;
    recs.forEach(r => { if (r.title) { let v = r[f]; if(v) { if(!m[v]) m[v]=[]; m[v].push(bibC); } bibC++; } });
    renderIdx(m, l);
}

function renderIdx(m, title) {
    let k = Object.keys(m).sort((a,b)=>clean(a).localeCompare(clean(b),'ar'));
    let h = `<div class="bib-container">`;
    k.forEach(x => h += `<div>${x} (${m[x].join(', ')})</div>`);
    document.getElementById('modalBody').innerHTML = h + `</div>`;
    document.getElementById('modalOverlay').style.display='block';
}

function journalIdx() {
    let m = {}, bibC = 1;
    recs.forEach(r => { if(r.title) { if(r.journal) { if(!m[r.journal]) m[r.journal]=[]; m[r.journal].push(bibC); } bibC++; } });
    renderIdx(m, "المجلات");
}

function closeM() { document.getElementById('modalOverlay').style.display='none'; }
function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${curP}.xlsx`); }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
function newP() { let n = prompt("مشروع جديد:"); if(n) { if(!projs.includes(n)) projs.push(n); curP=n; recs=[]; draw(); } }
function deleteRec(i) { if(confirm("حذف؟")) { recs.splice(i, 1); draw(); } }
function importX(e) { const reader = new FileReader(); reader.onload = (evt) => { recs = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, {type:'binary'}).Sheets[XLSX.read(evt.target.result, {type:'binary'}).SheetNames[0]]); draw(); }; reader.readAsBinaryString(e.target.files[0]); }
window.onload = draw;
</script>
</body>
</html>
