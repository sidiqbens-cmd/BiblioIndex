<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ببليوإندكس - BiblioIndex</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* الحفاظ على الكثافة والواجهة كما في الصورة */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 10px; font-size: 13px; }
        .container { max-width: 1250px; margin: auto; background: #fff; padding: 15px; border-radius: 8px; }
        .grid-form { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        input, select, button { padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        .btn-add { background: #2c3e50; color: white; cursor: pointer; grid-column: span 2; }
        .btn-stats { background: #8e44ad; color: white; cursor: pointer; }
        
        /* صفحة الإحصائيات (نافذة منبثقة) */
        #statsPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; padding: 20px; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .chart-box { border: 1px solid #eee; padding: 10px; border-radius: 5px; background: #fafafa; }
        .close-btn { background: #c0392b; color: white; padding: 5px 15px; cursor: pointer; float: left; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 style="margin: 0;">ببليوإندكس</h2>
        <div>
            <button onclick="exportData()" style="background:#27ae60; color:white;">📥 تصدير XLSX</button>
            <button onclick="showStats()" class="btn-stats">📊 الإحصائيات التحليلية</button>
        </div>
    </div>

    <div class="grid-form">
        <select id="project"><option value="">-- اختر المشروع --</option>
            <option>علوم القرآن الكريم</option><option>العلم المفتوح</option>
            <option>الذكاء الاصطناعي</option><option>النتاج المترجم في المكتبات</option>
        </select>
        
        <input type="text" id="deweyPercent" placeholder="التوزيع المئوي لديوي">
        <select id="deweyDec">
            <option value="">-- التوزيع العشري --</option>
            <option>020 المكتبات والمعلومات</option>
            <option>004 علوم الحاسبات</option>
            <option>210 علوم القرآن</option>
            <option>001 المعارف العامة</option>
        </select>
        <input type="text" id="title" placeholder="عنوان الكتاب / البحث">
        <input type="text" id="author" placeholder="المؤلف الأصلي">
        <input type="text" id="translator" placeholder="المترجم">
        <input type="number" id="year" placeholder="السنة">
        <input type="text" id="country" placeholder="الدولة">
        <input type="text" id="publisher" placeholder="دار النشر / المجلة">
        <select id="type"><option>كتاب</option><option>بحث/مقال</option></select>
        <button onclick="saveRecord()" class="btn-add">إضافة التسجيلة</button>
    </div>

    <div id="displayArea"></div>
</div>

<div id="statsPage">
    <button class="close-btn" onclick="document.getElementById('statsPage').style.display='none'">إغلاق الصفحة ✖</button>
    <h2 id="statsHeader" style="text-align: center; color: #2c3e50;">تحليل بيانات المشروع</h2>
    <hr>
    <div class="stats-grid">
        <div class="chart-box"><canvas id="chartYears"></canvas></div>
        <div class="chart-box"><canvas id="chartDewey"></canvas></div>
        <div class="chart-box" id="textStats"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('biblioIndexDB')) || {};

    function saveRecord() {
        const p = document.getElementById('project').value;
        if(!p) return alert("يرجى اختيار المشروع");
        const entry = {
            id: Date.now(),
            title: document.getElementById('title').value,
            deweyP: document.getElementById('deweyPercent').value,
            deweyD: document.getElementById('deweyDec').value,
            author: document.getElementById('author').value,
            translator: document.getElementById('translator').value,
            year: document.getElementById('year').value,
            country: document.getElementById('country').value,
            publisher: document.getElementById('publisher').value,
            type: document.getElementById('type').value
        };
        if(!db[p]) db[p] = [];
        db[p].push(entry);
        localStorage.setItem('biblioIndexDB', JSON.stringify(db));
        renderList();
    }

    function renderList() {
        const p = document.getElementById('project').value;
        const area = document.getElementById('displayArea');
        area.innerHTML = "";
        if(!db[p]) return;
        
        // ترتيب هجائي مع تجاهل "أل" وتجميع حسب العشري
        let sorted = db[p].sort((a,b) => a.title.replace(/^ال/,"").localeCompare(b.title.replace(/^ال/,""), 'ar'));
        sorted.forEach((r, i) => {
            area.innerHTML += `<div style="padding:4px; border-bottom:1px solid #eee;">${i+1}. <strong>${r.title}</strong> | ${r.author} | ${r.deweyD}</div>`;
        });
    }

    function showStats() {
        const p = document.getElementById('project').value;
        if(!p || !db[p]) return alert("لا توجد بيانات لهذا المشروع");
        document.getElementById('statsPage').style.display = "block";
        document.getElementById('statsHeader').innerText = `إحصائيات مشروع: ${p}`;
        
        // رسم بياني بسيط للسنين (مثال)
        const years = db[p].reduce((a,c) => { a[c.year] = (a[c.year]||0)+1; return a; }, {});
        new Chart(document.getElementById('chartYears'), {
            type: 'bar',
            data: { labels: Object.keys(years), datasets: [{ label: 'السنة', data: Object.values(years), backgroundColor: '#3498db' }] }
        });
        
        // إحصاء أكثر المترجمين تكراراً
        const trans = db[p].reduce((a,c) => { if(c.translator) a[c.translator] = (a[c.translator]||0)+1; return a; }, {});
        const topT = Object.entries(trans).sort((a,b)=>b[1]-a[1])[0];
        document.getElementById('textStats').innerHTML = `<h4>الأكثر نشراً:</h4><p>المترجم: ${topT ? topT[0] : '---'}</p>`;
    }

    function exportData() {
        const p = document.getElementById('project').value;
        if(!p) return;
        const ws = XLSX.utils.json_to_sheet(db[p]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, `${p}_${new Date().toISOString().slice(0,10)}.xlsx`);
    }
</script>
</body>
</html>
