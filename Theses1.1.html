<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرسائل الجامعية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; padding: 5px; table-layout: fixed; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 26px; font-size: 13px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 8px; display: flex; justify-content: center; gap: 6px; border-bottom: 2px solid #2c3e50; flex-wrap: wrap; }
        .btn { padding: 5px 12px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 240px; height: calc(100vh - 250px); overflow-y: auto; padding: 10px; }
        .admin-table { border-collapse: collapse; background: #fff; font-size: 12px; width: 100%; table-layout: fixed; }
        .admin-table th { position: sticky; top: 0; background: #34495e; color: white; padding: 8px; border: 1px solid #2c3e50; }
        .admin-table td { border: 1px solid #ccc; padding: 6px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; }
        .modal-content { background:white; width:90%; margin:1% auto; padding:20px; height: 85vh; overflow-y: auto; }
        .column-wrapper { column-count: 2; column-gap: 30px; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#34495e; color:white; padding:6px 15px;">
        <strong style="font-size: 18px;">الرسائل الجامعية</strong>
        <div style="display:flex; gap:8px;">
            <button onclick="copyRec()" class="btn" style="background:#7f8c8d">نسخ تسجيلة</button>
            <button onclick="pasteRec()" class="btn" style="background:#95a5a6">لصق تسجيلة</button>
            <button onclick="document.getElementById('xlIn').click()" class="btn" style="background:#e67e22">استيراد XLSX</button>
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير XLSX</button>
            <input type="file" id="xlIn" style="display:none" onchange="importX(event)">
            <button onclick="newP()" class="btn" style="background:#27ae60">+ مشروع جديد</button>
            <select id="pSel" style="width:160px" onchange="switchP(this.value)"></select>
            <button onclick="delP()" class="btn" style="background:#c0392b">حذف المشروع</button>
        </div>
    </div>
    
    <div style="background:#ecf0f1; padding:8px; border-bottom:2px solid #bdc3c7; display:flex; align-items:center; justify-content:space-between;">
        <div style="display:flex; align-items:center; gap:10px;">
            <strong style="color:#2c3e50;">رقم التسجيلة المستهدفة:</strong>
            <input type="number" id="searchID" style="width:80px; text-align:center;">
            <button class="btn" style="background:#27ae60;" onclick="loadRec()">استرجاع للتعديل</button>
        </div>
        <span id="totalCounter" style="color:#c0392b; font-weight:bold; font-size: 14pt;">[ العدد الإجمالي: 0 ]</span>
    </div>

    <form id="mainForm">
        <table class="input-table">
            <tr>
                <td>
                    <span class="field-label">رأس الموضوع</span>
                    <input type="text" id="subject" list="list_subject" class="in">
                    <datalist id="list_subject"></datalist>
                </td>
                <td>
                    <span class="field-label">إحالة انظر</span>
                    <input type="text" id="see" list="list_subject" class="in"> 
                </td>
                <td>
                    <span class="field-label">إحالة انظر أيضاً</span>
                    <input type="text" id="see_also" list="list_subject" class="in"> 
                </td>
            </tr>
            <tr>
                <td>
                    <span class="field-label">اسم الطالب (مقلوب)</span>
                    <input type="text" id="author" list="list_author" class="in">
                    <datalist id="list_author"></datalist>
                </td>
                <td>
                    <span class="field-label">المشرف</span>
                    <input type="text" id="editor" list="list_editor" class="in">
                    <datalist id="list_editor"></datalist>
                </td>
                <td>
                    <span class="field-label">العنوان</span>
                    <input type="text" id="title" list="list_title" class="in">
                    <datalist id="list_title"></datalist>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="field-label">الجامعة</span>
                    <input type="text" id="uni" list="list_uni" class="in">
                    <datalist id="list_uni"></datalist>
                </td>
                <td>
                    <span class="field-label">الكلية</span>
                    <input type="text" id="faculty" list="list_faculty" class="in">
                    <datalist id="list_faculty"></datalist>
                </td>
                <td>
                    <span class="field-label">القسم</span>
                    <input type="text" id="dept" list="list_dept" class="in">
                    <datalist id="list_dept"></datalist>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="field-label">نوع الرسالة</span>
                    <input type="text" id="material_type" list="list_material_type" class="in">
                    <datalist id="list_material_type"></datalist>
                </td>
                <td colspan="2">
                    <div style="display: flex; gap: 10px; align-items: flex-end;">
                        <div style="flex: 2;">
                            <span class="field-label">الصفحات</span>
                            <input type="text" id="pages" class="in">
                        </div>
                        <div style="flex: 1;">
                            <span class="field-label">السنة</span>
                            <input type="text" id="year" list="list_year" class="in">
                            <datalist id="list_year"></datalist>
                        </div>
                    </div>
                </td>
            </tr>
        </table>

        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60; flex: 1;" onclick="save()">حفظ السجل</button>
            <button type="button" class="btn" style="background:#8e44ad; flex: 1;" onclick="openBiblioWindow()">المعاينة النهائية</button>
            <button type="button" class="btn" style="background:#34495e; flex: 1;" onclick="runIdx('author', 'المؤلفين')">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400; flex: 1;" onclick="runIdx('editor', 'المشرفين')">كشاف المشرفين</button>
            <button type="button" class="btn" style="background:#16a085; flex: 1;" onclick="runIdx('title', 'العناوين')">كشاف العناوين</button>
            <button type="button" class="btn" style="background:#2980b9; flex: 1;" onclick="runIdx('subject', 'الموضوعات')">رؤوس الموضوعات</button>
        </div>
    </form>
</div>

<div id="modalOverlay">
    <div style="padding: 10px;"><button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق النافذة</button></div>
    <div class="modal-content" id="modalBody"></div>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead>
            <tr>
                <th style="width:50px;">رقم</th>
                <th style="width:200px;">رأس الموضوع</th>
                <th>تفاصيل السجل</th>
                <th style="width:120px;">إجراءات</th>
            </tr>
        </thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_1'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIndex = -1;

const cleanSort = (s) => s ? s.toString().replace(/^(ال)/, '').trim() : '';

function updateAllDatalists() {
    const mappings = {
        'uni': 'list_uni',
        'faculty': 'list_faculty',
        'dept': 'list_dept',
        'material_type': 'list_material_type',
        'subject': 'list_subject',
        'author': 'list_author',
        'editor': 'list_editor',
        'title': 'list_title',
        'year': 'list_year'
    };

    Object.keys(mappings).forEach(field => {
        const listId = mappings[field];
        const datalist = document.getElementById(listId);
        if (datalist) {
            const uniqueValues = [...new Set(recs.map(r => r[field]))]
                .filter(val => val && String(val).trim() !== "")
                .sort();
            datalist.innerHTML = uniqueValues.map(val => `<option value="${val}">`).join('');
        }
    });
}

function draw() {
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    
    document.getElementById('pSel').innerHTML = projs.map(p => `<option ${p===curP?'selected':''}>${p}</option>`).join('');
    document.getElementById('totalCounter').innerText = `[ العدد الإجمالي: ${recs.filter(r=>!r.see).length} ]`;
    
    let html = '';
    recs.forEach((r, i) => {
        if (!r.see) r.finalID = recs.filter((x, idx) => idx <= i && !x.see).length;
        html += `<tr>
            <td>${r.see ? '-' : r.finalID}</td>
            <td>${r.subject}</td>
            <td>${r.see ? 'إحالة انظر: ' + r.see : r.title + ' / ' + r.author}</td>
            <td>
                <button class="btn" style="background:#2980b9; padding:2px 5px;" onclick="edit(${i})">تعديل</button>
                <button class="btn" style="background:#c0392b; padding:2px 5px;" onclick="deleteRec(${i})">حذف</button>
            </td>
        </tr>`;
    });
    document.getElementById('adminBody').innerHTML = html;
    updateAllDatalists();
}

function save() {
    let d = {}; 
    document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    if(!d.subject) { alert("رأس الموضوع إلزامي"); return; }
    
    if (editIndex > -1) {
        recs[editIndex] = d;
        editIndex = -1;
    } else {
        recs.push(d);
    }
    document.getElementById('mainForm').reset();
    draw();
}

function loadRec() {
    let searchInput = document.getElementById('searchID');
    let target = searchInput.value;
    let idx = recs.findIndex(x => x.finalID == target && !x.see);
    if (idx !== -1) {
        edit(idx);
        searchInput.value = ""; 
    } else {
        alert("عذراً، هذا الرقم غير موجود");
    }
}

function edit(i) { 
    editIndex = i; 
    document.querySelectorAll('.in').forEach(inp => inp.value = recs[i][inp.id] || ''); 
    window.scrollTo(0,0); 
}

function deleteRec(i) { if(confirm("حذف؟")) { recs.splice(i, 1); draw(); } }
function closeM() { document.getElementById('modalOverlay').style.display='none'; }

function openBiblioWindow() {
    const win = window.open('', '_blank');
    const fixName = (name) => {
        if (!name || !name.includes('،')) return name;
        let parts = name.split('،');
        return parts[1].trim() + ' ' + parts[0].trim();
    };

    let content = `<html dir="rtl"><head><title>المعاينة</title><style>
    body{font-family:'Times New Roman', serif; padding:40px; font-size: 12pt;}
    .sub-header{background:#e0e0e0; text-align:center; padding:6px; margin:25px 0 15px 0; font-weight:bold; border: 1px solid #333;}
    .see-also { text-align:center; margin:-10px 0 15px 0; font-weight:bold; }
    .see-line { text-align:center; font-weight:bold; margin: 20px 0; }
    .ent { margin-bottom: 18px; text-align: justify; }
    .id-left { float: left; font-weight: bold; }
    </style></head><body>`;

    let lastSub = '';
    recs.forEach(r => {
        if (r.subject && r.subject !== lastSub) {
            if (!r.see) {
                content += `<div class="sub-header">${r.subject}</div>`;
                if (r.see_also) content += `<div class="see-also">انظر أيضاً: ${r.see_also}</div>`;
            }
            lastSub = r.subject;
        }
        if (r.see) {
            content += `<div class="see-line">${r.subject} انظر: ${r.see}</div>`;
        } else if (r.title) {
            let details = [r.uni, r.faculty, r.dept, r.year].filter(x => x).join(" ، ");
            content += `<div class="ent">
                <div style="overflow:hidden"><span class="id-left">(${r.finalID})</span><b>${r.author}</b></div>
                <div>${r.title} / إعداد ${fixName(r.author)} ؛ ${r.editor ? 'إشراف ' + r.editor : ''} . ـــ ${details} . ـــ ${r.pages?r.pages+' ص.':''} (${r.material_type}).</div>
            </div>`;
        }
    });
    win.document.write(content + '</body></html>'); win.document.close();
}

function runIdx(f, t) {
    let m = {};
    recs.forEach(r => {
        if (r.finalID && r[f]) {
            let vals = r[f].split('/').map(s=>s.trim()).filter(s=>s);
            vals.forEach(v => { if(!m[v]) m[v]=[]; if(!m[v].includes(r.finalID)) m[v].push(r.finalID); });
        }
    });
    let k = Object.keys(m).sort((a,b)=>cleanSort(a).localeCompare(cleanSort(b),'ar'));
    let h = `<h2 style="text-align:center;">كشاف ${t}</h2><div class="column-wrapper">` + k.map(x=>`<div>${x} (${m[x].join(', ')})</div>`).join('') + `</div>`;
    document.getElementById('modalBody').innerHTML = h;
    document.getElementById('modalOverlay').style.display='block';
}

function copyRec() { localStorage.setItem('BIB_CLIP', JSON.stringify(Object.fromEntries([...document.querySelectorAll('.in')].map(i=>[i.id, i.value])))); alert("تم النسخ"); }
function pasteRec() { let d = JSON.parse(localStorage.getItem('BIB_CLIP')); if(d) Object.keys(d).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = d[k]; }); }
function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${curP}.xlsx`); }
function importX(e) { const reader = new FileReader(); reader.onload = (evt) => { recs = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, {type:'binary'}).Sheets[XLSX.read(evt.target.result, {type:'binary'}).SheetNames[0]]); draw(); }; reader.readAsBinaryString(e.target.files[0]); }
function newP() { let n = prompt("اسم المشروع الجديد:"); if(n) { projs.push(n); curP=n; recs=[]; draw(); } }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
function delP() { if(confirm("حذف المشروع الحالي نهائياً؟")) { projs = projs.filter(p=>p!==curP); curP=projs[0]||'مشروع_1'; recs=JSON.parse(localStorage.getItem('R_'+curP))||[]; draw(); } }

window.onload = draw;
</script>
</body>
</html>
