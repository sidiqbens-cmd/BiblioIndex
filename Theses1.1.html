<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الفهرس الليبي الموحد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; padding: 5px; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; }
        .input-table td { padding: 2px; font-size: 11px; font-weight: bold; color: #333; }
        input, select { width: 100%; height: 24px; font-size: 13px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; padding: 5px; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .btn { padding: 4px 10px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-weight: bold; font-size: 11px; }
        .scroll-area { margin-top: 275px; height: calc(100vh - 285px); overflow-y: auto; padding: 10px; }
        .admin-table { border-collapse: collapse; background: #fff; width: 100%; font-size: 12px; table-layout: fixed; }
        .admin-table th { background: #34495e; color: white; padding: 5px; border: 1px solid #2c3e50; }
        .admin-table td { border: 1px solid #ccc; padding: 4px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; color:white; padding:5px 15px; align-items:center;">
        <strong style="font-size:18px;">الفهرس الليبي الموحد</strong>
        <span id="totalCounter" style="color:#e74c3c; font-size:16px; font-weight:bold;">[ العدد الإجمالي: 0 ]</span>
    </div>
    
    <div class="actions">
        <button onclick="delP()" class="btn" style="background:#c0392b">حذف المشروع</button>
        <select id="pSel" style="width:120px;" onchange="switchP(this.value)"></select>
        <button onclick="newP()" class="btn" style="background:#27ae60">+ مشروع جديد</button>
        <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير XLSX</button>
        <button onclick="document.getElementById('xlIn').click()" class="btn" style="background:#e67e22">استيراد XLSX</button>
        <input type="file" id="xlIn" style="display:none" onchange="importX(event)">
        <button onclick="pasteRec()" class="btn" style="background:#95a5a6">لصق تسجيلة</button>
        <button onclick="copyRec()" class="btn" style="background:#7f8c8d">نسخ تسجيلة</button>
    </div>

    <div style="padding:5px; text-align:left; background:#cfcfcf; display:flex; justify-content:flex-end; align-items:center; gap:10px;">
        <button onclick="loadRec()" class="btn" style="background:#27ae60; height:26px;">استرجاع للتعديل</button>
        <input type="number" id="searchID" style="width:80px; height:26px;"> :رقم التسجيلة المستهدفة
    </div>

    <form id="bForm">
        <table class="input-table">
            <tr>
                <td>رأس الموضوع<input type="text" id="subject" class="in"></td>
                <td>إحالة انظر<input type="text" id="see" class="in"></td>
                <td>إحالة انظر أيضاً<input type="text" id="see_also" class="in"></td>
                <td>اسم الطالب (مقلوب)<input type="text" id="author" class="in"></td>
            </tr>
            <tr>
                <td colspan="2">العنوان<input type="text" id="title" class="in"></td>
                <td>المشرف<input type="text" id="editor" class="in"></td>
                <td>نوع الرسالة<input type="text" id="material_type" class="in"></td>
            </tr>
            <tr>
                <td>المكان<select id="place" class="in"></select></td>
                <td>الجامعة<select id="uni" class="in"></select></td>
                <td>الكلية<select id="faculty" class="in"></select></td>
                <td>القسم<input type="text" id="dept" class="in"></td>
                <td>السنة<input type="text" id="year" class="in"></td>
                <td>عدد الورقات<input type="text" id="pages" class="in"></td>
            </tr>
        </table>
        <div class="actions">
            <button type="button" onclick="save()" class="btn" style="background:#27ae60">حفظ السجل</button>
            <button type="button" onclick="openBiblio()" class="btn" style="background:#8e44ad">المعاينة النهائية</button>
            <button type="button" onclick="runIdx('author', 'المؤلفين')" class="btn" style="background:#34495e">كشاف المؤلفين</button>
            <button type="button" onclick="runIdx('editor', 'المشرفين')" class="btn" style="background:#d35400">كشاف المشرفين</button>
            <button type="button" onclick="runIdx('title', 'العناوين')" class="btn" style="background:#16a085">كشاف العناوين</button>
            <button type="button" onclick="runIdx('subject', 'الموضوعات')" class="btn" style="background:#2980b9">رؤوس الموضوعات</button>
            <button type="button" class="btn" style="background:#c0392b">كشاف المترجمين</button>
        </div>
    </form>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead>
            <tr><th style="width:80px">إجراءات</th><th style="width:60%">تفاصيل السجل</th><th style="width:30%">رأس الموضوع</th><th style="width:50px">رقم</th></tr>
        </thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
let projs = JSON.parse(localStorage.getItem('L_P')) || ['قانون'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIdx = -1;

function draw() {
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    let mainRecs = recs.filter(r => r.title);
    document.getElementById('totalCounter').innerText = "[ العدد الإجمالي: " + mainRecs.length + " ]";
    ['place', 'uni', 'faculty'].forEach(f => {
        let vals = [...new Set(recs.map(r => r[f]).filter(x => x))].sort();
        document.getElementById(f).innerHTML = '<option value="">-- اختر --</option>' + vals.map(v => `<option value="${v}">${v}</option>`).join('');
    });
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `
        <tr>
            <td><button onclick="del(${i})">حذف</button> <button onclick="edit(${i})">تعديل</button></td>
            <td style="text-align:right; padding-right:10px;"><b>${r.author||''}</b> - ${r.title||''}</td>
            <td>${r.subject||''}</td>
            <td>${i+1}</td>
        </tr>`).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
}

function save() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    if(!d.subject || (!d.title && !d.see)) { alert("رأس الموضوع إلزامي"); return; }
    if(editIdx > -1) recs[editIdx] = d; else recs.push(d);
    editIdx = -1; document.getElementById('bForm').reset(); draw();
}

function openBiblio() {
    const win = window.open('', '_blank');
    let h = `<div dir="rtl" style="font-family:'Times New Roman'; padding:40px; font-size:12pt;">`;
    let lastSub = "";
    recs.forEach((r, i) => {
        if(!r.title) return;
        if(r.subject !== lastSub) {
            h += `<div style="background:#eee; text-align:center; font-weight:bold; padding:5px; margin:20px 0;">${r.subject}</div>`;
            lastSub = r.subject;
        }
        let loc = [r.place ? r.place+":" : "", r.uni, r.faculty, r.dept, r.year].filter(x => x).join("، ");
        h += `<div style="display:flex; justify-content:space-between; margin-top:10px;">
                <span style="font-weight:bold;">${r.author || ''}</span>
                <span>(${i+1})</span>
              </div>
              <div style="margin-bottom:10px;">${r.title} / إشراف: ${r.editor} . ـــ ${loc} . ـــ ${r.pages ? r.pages + "ص" : ""}. ـــ (${r.material_type || ''}) . ـــ</div>`;
    });
    win.document.write(h + '</div>');
}

function runIdx(f, t) {
    let m = {}; recs.forEach((r, i) => { if(r[f]) { let v = r[f]; if(!m[v]) m[v] = []; m[v].push(i+1); } });
    let win = window.open('', '_blank');
    let c = `<h3>كشاف ${t}</h3>` + Object.keys(m).sort().map(k => `<div>${k}: ${m[k].join(', ')}</div>`).join('');
    win.document.write(`<div dir="rtl">${c}</div>`);
}

function edit(i) { editIdx = i; document.querySelectorAll('.in').forEach(inp => inp.value = recs[i][inp.id]||''); window.scrollTo(0,0); }
function del(i) { if(confirm("حذف؟")) { recs.splice(i, 1); draw(); } }
function loadRec() { let id = document.getElementById('searchID').value; if(recs[id-1]) edit(id-1); else alert("غير موجود"); }
function copyRec() { localStorage.setItem('B_CLIP', JSON.stringify(Object.fromEntries([...document.querySelectorAll('.in')].map(i=>[i.id, i.value])))); }
function pasteRec() { let d = JSON.parse(localStorage.getItem('B_CLIP')); if(d) Object.keys(d).forEach(k => document.getElementById(k).value = d[k]); }
window.onload = draw;
</script>
</body>
</html>
