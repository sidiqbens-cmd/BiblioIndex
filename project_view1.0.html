<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نسخة التطوير - ببليوإندكس</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f4f7f6; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 3px solid #1a252f; }
        .input-table { width: 100%; background: #dfe4ea; border-spacing: 2px; padding: 8px; table-layout: fixed; }
        .field-label { font-size: 11px; font-weight: bold; color: #2f3542; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 28px; font-size: 13px; font-weight: bold; border: 1px solid #a4b0be; text-align: right; box-sizing: border-box; }
        .actions { background: #ced6e0; text-align: center; padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 2px solid #2c3e50; flex-wrap: wrap; }
        .btn { padding: 6px 15px; cursor: pointer; border: none; border-radius: 4px; color: #fff; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }
        .scroll-area { margin-top: 360px; height: calc(100vh - 380px); overflow-y: auto; padding: 15px; }
        .admin-table { border-collapse: collapse; background: #fff; font-size: 12px; width: 100%; table-layout: fixed; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .admin-table th { position: sticky; top: 0; background: #34495e; color: white; padding: 10px; border: 1px solid #2c3e50; }
        .admin-table td { border: 1px solid #dcdde1; padding: 8px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; }
        .modal-content { background:white; width:90%; margin:20px auto; padding:30px; height: 80vh; overflow-y: auto; border: 2px solid #000; }
        .bib-container { column-count: 2; column-gap: 40px; text-align: justify; direction: rtl; }
        .dewey-header { text-align: center; font-size: 16px; font-weight: bold; margin: 20px 0; border-bottom: 1px double #000; padding-bottom: 5px; }
        .subject-row { text-align: center; font-size: 14px; font-weight: bold; background: #f1f2f6; margin: 15px 0 5px 0; padding: 5px; border: 1px solid #ccc; }
        .see-also-row { text-align: right; font-size: 13px; font-style: italic; color: #57606f; margin-bottom: 10px; padding: 0 10px; }
        .data-block { font-size: 12px; line-height: 1.3; margin-bottom: 15px; }
        .author-line { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 3px; border-bottom: 0.5px solid #eee; }
        .title-bold { font-weight: bold; text-decoration: underline; }
        .ltr { direction: ltr; text-align: left; }
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#1e272e; color:white; padding:8px 20px;">
        <strong style="font-size: 20px;">الفهرس الليبي الموحد - نسخة التطوير</strong>
        <div style="display:flex; gap:10px;">
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير Excel</button>
            <select id="pSel" style="width:150px; height:30px;" onchange="switchP(this.value)"></select>
            <button onclick="closeM()" class="btn" style="background:#c0392b">إغلاق المعاينة</button>
        </div>
    </div>

    <form id="bForm">
        <div style="background:#ced6e0; padding:6px; display:flex; gap:15px; justify-content:center; border-bottom:2px solid #747d8c;">
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="field-label">الأصل المئوي:</span>
                <select id="dewey_hundred" class="in" style="width:200px" onchange="loadDewey(this.value)">
                    <option value="">-- اختر --</option>
                    <option value="000">000 الأعمال العامة</option>
                    <option value="100">100 الفلسفة وعلم النفس</option>
                    <option value="200">200 الديانات</option>
                    <option value="300">300 العلوم الاجتماعية</option>
                    <option value="400">400 اللغات</option>
                    <option value="500">500 العلوم البحتة</option>
                    <option value="600">600 العلوم التطبيقية</option>
                    <option value="700">700 الفنون</option>
                    <option value="800">800 الآداب</option>
                    <option value="900">900 الجغرافيا والتاريخ</option>
                </select>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="field-label">القسم العشري:</span>
                <select id="dewey_decimal" class="in" style="width:280px"></select>
            </div>
        </div>

        <table class="input-table">
            <tr>
                <td><span class="field-label">رأس الموضوع</span><input type="text" id="subject" list="list_subject" class="in"></td>
                <td><span class="field-label">إحالة انظر</span><input type="text" id="see" list="list_see" class="in"></td>
                <td><span class="field-label">إحالة انظر أيضاً</span><input type="text" id="see_also" list="list_see_also" class="in"></td>
                <td><span class="field-label">المؤلف (مقلوب) /</span><input type="text" id="author" list="list_author" class="in"></td>
                <td><span class="field-label">المحقق/المترجم /</span><input type="text" id="editor" list="list_editor" class="in"></td>
            </tr>
            <tr>
                <td colspan="2"><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
                <td><span class="field-label">المجلة</span><input type="text" id="journal" list="list_journal" class="in"></td>
                <td><span class="field-label">الناشر</span><input type="text" id="publisher" list="list_publisher" class="in"></td>
                <td><span class="field-label">السنة</span><input type="text" id="year" list="list_year" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">الدولة</span><input type="text" id="country" list="list_country" class="in"></td>
                <td><span class="field-label">الصفحات</span><input type="text" id="pages" class="in"></td>
                <td><span class="field-label">العدد</span><input type="text" id="issue" class="in"></td>
                <td colspan="2"><span class="field-label">ملاحظات</span><input type="text" id="note1" class="in"></td>
            </tr>
        </table>

        <div id="dynamicDatalists">
            <datalist id="list_subject"></datalist><datalist id="list_see"></datalist><datalist id="list_see_also"></datalist>
            <datalist id="list_author"></datalist><datalist id="list_editor"></datalist><datalist id="list_journal"></datalist>
            <datalist id="list_publisher"></datalist><datalist id="list_year"></datalist><datalist id="list_country"></datalist>
        </div>

        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ السجل</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="viewPrint()">المعاينة الطباعية</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runIdx('author', 'المؤلفين والمحققين')">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title', 'العناوين')">كشاف العناوين</button>
            <button type="button" class="btn" style="background:#16a085" onclick="journalIdx()">قائمة المجلات</button>
        </div>
    </form>
</div>

<div id="modalOverlay">
    <div class="modal-content" id="modalBody"></div>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead><tr><th style="width:50px;">رقم</th><th style="width:200px;">الموضوع</th><th>البيان المكتبي</th><th style="width:100px;">تحكم</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
// خوارزمية ديوي
const deweyData = {
    "000": ["010 الببليوجرافيات", "020 المكتبات والمعلومات", "070 الصحافة"],
    "100": ["150 علم النفس", "160 المنطق", "170 الأخلاق"],
    "200": ["210 الإسلام", "220 القرآن", "230 الحديث", "250 الفقه"],
    "300": ["320 السياسة", "330 الاقتصاد", "340 القانون", "370 التربية"],
    "400": ["410 اللغة العربية", "420 الإنجليزية"],
    "900": ["910 الجغرافيا", "920 التراجم", "961 تاريخ ليبيا"]
};

function loadDewey(v) {
    const d = document.getElementById('dewey_decimal');
    d.innerHTML = '<option value="">-- اختر --</option>';
    if (deweyData[v]) deweyData[v].forEach(x => { let o = document.createElement('option'); o.value = x; o.text = x; d.add(o); });
}

let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_1'], curP = localStorage.getItem('L_A') || projs[0], recs = JSON.parse(localStorage.getItem('R_' + curP)) || [], editId = -1;

function draw() {
    recs.sort((a,b) => (a.subject||'').localeCompare(b.subject||'', 'ar'));
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    
    // تحديث القوائم المنسدلة الذكية
    updateDatalists();
    
    let counter = 1;
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => {
        let n = r.title ? counter++ : '-';
        return `<tr><td>${n}</td><td>${r.subject}</td><td>${r.title || (r.see ? 'انظر: '+r.see : '')}</td><td><button onclick="edit(${i})">تعديل</button> <button onclick="del(${i})" style="color:red">X</button></td></tr>`;
    }).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
}

function updateDatalists() {
    const fields = ['subject', 'see', 'see_also', 'author', 'editor', 'journal', 'publisher', 'year', 'country'];
    fields.forEach(f => {
        let vals = [];
        if (f === 'see_also' || f === 'see') vals = recs.map(r => r.subject).filter(v => v);
        else recs.forEach(r => { if(r[f]) { if(f==='author'||f==='editor') vals.push(...r[f].split('/')); else vals.push(r[f]); } });
        let unique = [...new Set(vals.map(v=>v.trim()))].sort((a,b)=>a.localeCompare(b, 'ar'));
        document.getElementById('list_' + f).innerHTML = unique.map(v => `<option value="${v}">`).join('');
    });
}

function save() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    if(!d.subject) return;
    if(editId > -1) recs[editId] = d; else recs.push(d);
    editId = -1; document.getElementById('bForm').reset(); draw();
}

function edit(i) {
    editId = i; let r = recs[i];
    document.querySelectorAll('.in').forEach(inp => {
        if(inp.id === 'dewey_hundred') { inp.value = r.dewey_hundred || ''; loadDewey(r.dewey_hundred); }
        else if(inp.id === 'dewey_decimal') { setTimeout(()=> inp.value = r.dewey_decimal || '', 50); }
        else inp.value = r[inp.id] || '';
    });
    window.scrollTo(0,0);
}

function viewPrint() {
    let h = `<div class="bib-container">`, lastD = "", lastS = "", c = 1;
    recs.forEach(r => {
        if (r.dewey_decimal && r.dewey_decimal !== lastD) { lastD = r.dewey_decimal; h += `<div class="dewey-header">${lastD}</div>`; }
        if (r.subject && r.subject !== lastS) { 
            lastS = r.subject; 
            h += `<div class="subject-row">${lastS}${r.see ? ' (انظر)' : ''}</div>`;
            if (r.see_also) h += `<div class="see-also-row">انظر أيضاً: ${r.see_also}</div>`;
        }
        if (r.title) {
            let auth = r.author || '';
            if (r.editor) auth += (auth ? '؛ ' : '') + r.editor;
            h += `<div class="data-block">
                <div class="author-line"><span>${auth}</span><span>${c++}</span></div>
                <div><span class="title-bold">${r.title}.</span> ${r.journal ? r.journal+'.' : ''} ${r.publisher ? r.publisher+'.' : ''} ${r.year ? r.year+'.' : ''}</div>
            </div>`;
        }
    });
    document.getElementById('modalBody').innerHTML = h + `</div>`;
    document.getElementById('modalOverlay').style.display = 'block';
}

function runIdx(field, label) {
    let m = {}, c = 1;
    recs.forEach(r => {
        if(r.title) {
            let names = [];
            if(field === 'author') names = [...(r.author||'').split('/'), ...(r.editor||'').split('/')];
            else names = [r[field]];
            
            names.map(n=>n.trim()).filter(n=>n).forEach(n => {
                if(!m[n]) m[n]=[];
                if(!m[n].includes(c)) m[n].push(c);
            });
            c++;
        }
    });
    let sortedKeys = Object.keys(m).sort((a,b)=>a.localeCompare(b, 'ar'));
    let html = `<h2 style="text-align:center">كشاف ${label}</h2><div class="bib-container">`;
    sortedKeys.forEach(k => html += `<div>${k} (${m[k].join(', ')})</div>`);
    document.getElementById('modalBody').innerHTML = html + `</div>`;
    document.getElementById('modalOverlay').style.display = 'block';
}

function journalIdx() { runIdx('journal', 'المجلات'); }
function closeM() { document.getElementById('modalOverlay').style.display = 'none'; }
function switchP(v) { curP = v; recs = JSON.parse(localStorage.getItem('R_' + v)) || []; draw(); }
function del(i) { if(confirm("حذف؟")) { recs.splice(i,1); draw(); } }
function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "export.xlsx"); }

window.onload = draw;
</script>
</body>
</html>
