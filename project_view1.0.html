<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ببليواندكس - الفهرس الليبي الموحد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; padding: 5px; table-layout: fixed; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 26px; font-size: 13px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 8px; display: flex; justify-content: center; gap: 6px; border-bottom: 2px solid #2c3e50; flex-wrap: wrap; }
        .btn { padding: 5px 12px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 275px; height: calc(100vh - 285px); overflow-y: auto; padding: 10px; }
        .admin-table { border-collapse: collapse; background: #fff; font-size: 12px; width: 100%; table-layout: fixed; }
        .admin-table th { position: sticky; top: 0; background: #34495e; color: white; padding: 8px; border: 1px solid #2c3e50; }
        .admin-table td { border: 1px solid #ccc; padding: 6px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; }
        .modal-content { background:white; width:90%; margin:1% auto; padding:20px; height: 85vh; overflow-y: auto; }
        .column-wrapper { column-count: 2; column-gap: 30px; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#34495e; color:white; padding:6px 15px;">
        <strong style="font-size: 18px;">الفهرس الليبي الموحد</strong>
        <div style="display:flex; gap:8px;">
            <button onclick="copyRec()" class="btn" style="background:#7f8c8d">نسخ</button>
            <button onclick="pasteRec()" class="btn" style="background:#95a5a6">لصق</button>
            <button onclick="document.getElementById('xlIn').click()" class="btn" style="background:#e67e22">استيراد XLSX</button>
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير XLSX</button>
            <input type="file" id="xlIn" style="display:none" onchange="importX(event)">
            <button onclick="newP()" class="btn" style="background:#27ae60">+ مشروع جديد</button>
            <select id="pSel" style="width:160px" onchange="switchP(this.value)"></select>
        </div>
    </div>

    <form id="bForm">
        <table class="input-table">
            <tr>
                <td><span class="field-label">رأس الموضوع</span><input type="text" id="subject" list="list_subject" class="in"></td>
                <td><span class="field-label">إحالة انظر</span><input type="text" id="see" list="list_subject" class="in"></td>
                <td><span class="field-label">إحالة انظر أيضاً (تراكمي)</span><input type="text" id="see_also" list="list_subject" class="in" oninput="multiSelect(this)"></td>
                <td><span class="field-label">مؤلف معاينة</span><input type="text" id="author_preview" list="list_author_preview" class="in"></td>
                <td><span class="field-label">المؤلف الأصلي</span><input type="text" id="original_author" list="list_original_author" class="in"></td>
                <td><span class="field-label">المؤلف (مقلوب)</span><input type="text" id="author" list="list_author" class="in"></td>
            </tr>
            <tr>
                <td colspan="4"><span class="field-label">العنوان <span id="recCounter" style="color:red; font-size:10px;"></span></span><input type="text" id="title" list="list_title" class="in"></td>
                <td><span class="field-label">مشارك معاينة</span><input type="text" id="collab" list="list_collab" class="in"></td>
                <td><span class="field-label">مشارك كشاف</span><input type="text" id="collab_idx" list="list_collab_idx" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">المجلة</span><input type="text" id="journal" list="list_journal" class="in"></td>
                <td><span class="field-label">السنة</span><input type="text" id="year" list="list_year" class="in"></td>
                <td><span class="field-label">العنوان الأصلي (الأجنبي)</span><input type="text" id="orig_title" list="list_orig_title" class="in"></td>
                <td><span class="field-label">مترجم معاينة</span><input type="text" id="translator" list="list_translator" class="in"></td>
                <td><span class="field-label">مترجم كشاف</span><input type="text" id="trans_idx" list="list_trans_idx" class="in"></td>
                <td><span class="field-label">الصفحات</span><input type="text" id="pages" list="list_pages" class="in"></td>
            </tr>
        </table>
        <div id="datalistsContainer"></div>
        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="openBiblioWindow()">المعاينة</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title', 'العناوين العربية')">كشاف العناوين</button>
            <button type="button" class="btn" style="background:#34495e" onclick="runIdx('orig_title', 'العناوين الأجنبية')">كشاف العناوين الأجنبية</button>
            <button type="button" class="btn" style="background:#2980b9" onclick="runIdx('subject', 'الموضوعات')">رؤوس الموضوعات</button>
        </div>
    </form>
</div>

<div id="modalOverlay">
    <div style="padding: 10px;"><button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق</button></div>
    <div class="modal-content" id="modalBody"></div>
</div>

<div class="scroll-area"><table class="admin-table"><thead><tr><th>رقم</th><th>الموضوع</th><th>التفاصيل</th><th>إجراء</th></tr></thead><tbody id="adminBody"></tbody></table></div>

<script>
let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_1'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIndex = -1;

const cleanSort = (s) => (s ? s.toString().replace(/^(ال)/, '').trim() : '');

// وظيفة الاختيار المتعدد من القائمة المنسدلة
function multiSelect(input) {
    const listId = input.getAttribute('list');
    const options = document.getElementById(listId).options;
    const val = input.value;
    
    for (let i = 0; i < options.length; i++) {
        if (options[i].value === val) {
            // إذا وجدنا تطابقاً مع القائمة، نتحقق إذا كان الرأس موجوداً أصلاً لتجنب التكرار
            let currentValues = input.getAttribute('data-vals') || '';
            let valArray = currentValues.split(' / ').filter(x => x);
            
            if (!valArray.includes(val)) {
                valArray.push(val);
                const newVal = valArray.join(' / ');
                input.value = newVal;
                input.setAttribute('data-vals', newVal);
            } else {
                input.value = currentValues; // إعادة القيمة القديمة إذا كان مكرراً
            }
            break;
        }
    }
}

function draw() {
    recs.sort((a, b) => cleanSort(a.subject).localeCompare(cleanSort(b.subject), 'ar'));
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    updateAllDatalists();
    document.getElementById('recCounter').innerText = `[ إجمالي: ${recs.length} ]`;
    let counter = 1;
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => {
        r.finalID = (r.title || r.orig_title) ? counter++ : null;
        return `<tr><td>${r.finalID || '-'}</td><td>${r.subject}</td><td>${r.title || r.orig_title || ''}</td><td><button onclick="edit(${i})">تعديل</button></td></tr>`;
    }).join('');
}

function updateAllDatalists() {
    // نركز هنا على جمع رؤوس الموضوعات المستخدمة فعلياً فقط
    const usedSubjects = [...new Set(recs.filter(r => r.title || r.orig_title).map(r => r.subject))].filter(x => x).sort();
    
    let html = `<datalist id="list_subject">`;
    usedSubjects.forEach(s => { html += `<option value="${s}">`; });
    html += `</datalist>`;
    
    // باقي القوائم
    const fields = ['author', 'title', 'journal', 'orig_title', 'author_preview', 'original_author', 'collab', 'collab_idx', 'translator', 'trans_idx'];
    fields.forEach(f => {
        let vals = [...new Set(recs.map(r => r[f]))].filter(x => x && x !== 'undefined').sort();
        html += `<datalist id="list_${f}">${vals.map(v => `<option value="${v}">`).join('')}</datalist>`;
    });
    
    document.getElementById('datalistsContainer').innerHTML = html;
}

function openBiblioWindow() {
    const win = window.open('', '_blank');
    let lastSub = '';
    let html = `<html dir="rtl"><body style="font-family:'Times New Roman'; padding:40px;">`;
    
    recs.forEach(r => {
        if (r.subject !== lastSub) {
            html += `<div style="background:#eee; text-align:center; padding:5px; border:1px solid #000; margin:20px 0;"><b>${r.subject}</b></div>`;
            lastSub = r.subject;
            // عرض "انظر أيضاً" المتعدد بفاصلة منقوطة
            let seeAlsoRaw = recs.filter(x => x.subject === r.subject && x.see_also).map(x => x.see_also).join(' / ');
            if (seeAlsoRaw) {
                let formattedSeeAlso = seeAlsoRaw.split(' / ').filter((v, i, a) => v && a.indexOf(v) === i).join(' ؛ ');
                html += `<div style="text-align:center; background:#f9f9f9; width:100%; font-weight:bold;">انظر أيضاً: ${formattedSeeAlso}</div>`;
            }
        }
        if (r.title || r.orig_title) {
            const getVal = (v) => (v && v !== 'undefined' ? v : '');
            html += `<div style="margin-bottom:10px; text-align:justify;"><b>${getVal(r.author)}</b> (${r.finalID}) ${getVal(r.title)} . ـــ ${getVal(r.journal)} ${getVal(r.year)} ص ${getVal(r.pages)}.</div>`;
        }
    });
    win.document.write(html + `</body></html>`);
}

function save() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    if (editIndex > -1) recs[editIndex] = d; else recs.push(d);
    editIndex = -1; 
    document.getElementById('see_also').setAttribute('data-vals', ''); // تصفير الذاكرة التراكمية
    draw(); 
    document.getElementById('bForm').reset();
}

function edit(i) { 
    editIndex = i; 
    let r = recs[i];
    Object.keys(r).forEach(k => { 
        if(document.getElementById(k)) {
            document.getElementById(k).value = r[k] === 'undefined' ? '' : r[k];
            if(k === 'see_also') document.getElementById(k).setAttribute('data-vals', r[k]);
        }
    }); 
}

function runIdx(f, label) {
    let m = {};
    recs.forEach(r => {
        let val = r[f] ? r[f].trim() : '';
        if (val && val !== 'undefined' && r.finalID) {
            if (!m[val]) m[val] = [];
            m[val].push(r.finalID);
        }
    });
    let keys = Object.keys(m).sort((a,b) => cleanSort(a).localeCompare(cleanSort(b), 'ar'));
    let out = `<h2>كشاف ${label}</h2><div class="column-wrapper">` + keys.map(k => `<div>${k} (${m[k].join(', ')})</div>`).join('') + `</div>`;
    document.getElementById('modalBody').innerHTML = out;
    document.getElementById('modalOverlay').style.display = 'block';
}

function importX(e) {
    const reader = new FileReader();
    reader.onload = (evt) => {
        const wb = XLSX.read(evt.target.result, {type:'binary'});
        recs = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        draw();
    };
    reader.readAsBinaryString(e.target.files[0]);
}

function copyRec() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    localStorage.setItem('BIB_CLIP', JSON.stringify(d));
}

function pasteRec() {
    let data = JSON.parse(localStorage.getItem('BIB_CLIP'));
    if(data) { 
        Object.keys(data).forEach(k => { 
            if(document.getElementById(k)) document.getElementById(k).value = data[k]; 
        }); 
    }
}

function closeM() { document.getElementById('modalOverlay').style.display='none'; }
window.onload = draw;
</script>
</body>
</html>
