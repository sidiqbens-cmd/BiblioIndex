<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كشاف المجلات الليبية المحكمة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; padding: 5px; table-layout: fixed; border-spacing: 2px; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 26px; font-size: 12px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 8px; display: flex; justify-content: center; gap: 6px; }
        .btn { padding: 5px 15px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 240px; height: calc(100vh - 250px); overflow-y: auto; padding: 10px; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; }
        .admin-table td, th { border: 1px solid #ccc; padding: 5px; font-size: 12px; text-align: center; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; }
        #modalBody { background:white; width:90%; margin:20px auto; padding:20px; height:80vh; overflow:auto; }
        
        /* تنسيق المعاينة الببليوغرافية */
        .dewey-section { background: #f0f0f0; text-align: center; font-weight: bold; font-size: 14pt; padding: 10px; margin: 30px 0; border: 1px solid #ccc; }
        .entry-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 12pt; margin-top: 15px; }
        .entry-details { font-size: 12pt; line-height: 1.6; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="background:#34495e; color:white; padding:8px 15px; display:flex; justify-content:space-between; align-items:center;">
        <strong style="font-size: 18px;">كشاف المجلات الليبية المحكمة</strong>
        <div style="display:flex; gap:8px;">
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير XLSX</button>
            <select id="pSel" style="width:150px" onchange="switchP(this.value)"></select>
            <button onclick="newP()" class="btn" style="background:#27ae60">+ مشروع جديد</button>
        </div>
    </div>

    <form id="bForm">
        <table class="input-table">
            <tr style="background:#b3b3b3;">
                <td colspan="3">
                    <span class="field-label">تصنيف المئات (ديوي)</span>
                    <select id="dewey100" class="in" onchange="updateDewey10()"></select>
                </td>
                <td colspan="3">
                    <span class="field-label">تصنيف العشرات (الموضوع الفرعي)</span>
                    <select id="dewey10" class="in"></select>
                </td>
            </tr>
            <tr>
                <td><span class="field-label">المؤلف الرئيس (مقلوب)</span><input type="text" id="author" class="in"></td>
                <td colspan="3"><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
                <td><span class="field-label">المجلة</span><input type="text" id="journal" class="in"></td>
                <td><span class="field-label">التبعية (الجهة المسؤولة)</span><input type="text" id="affiliation" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">مشاركون (يفصل بـ ،)</span><input type="text" id="collab" class="in"></td>
                <td><span class="field-label">مترجمون (يفصل بـ ،)</span><input type="text" id="translator" class="in"></td>
                <td><span class="field-label">السنة</span><input type="text" id="year" class="in"></td>
                <td><span class="field-label">العدد</span><input type="text" id="issue" class="in"></td>
                <td><span class="field-label">الصفحات (مثلاً 131-145)</span><input type="text" id="pages" class="in"></td>
                <td><span class="field-label">ملاحظات</span><input type="text" id="notes" class="in"></td>
            </tr>
        </table>
        
        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ السجل</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="openBiblio()">المعاينة الببليوغرافية</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runIdx('author')">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title')">كشاف العناوين</button>
            <button type="button" class="btn" style="background:#16a085" onclick="journalList()">قائمة المجلات</button>
            <button type="button" class="btn" style="background:#2980b9" onclick="runSubjectIdx()">رؤوس الموضوعات</button>
        </div>
    </form>
</div>

<div id="modalOverlay">
    <div style="padding:10px;"><button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق (X)</button></div>
    <div id="modalBody"></div>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead><tr><th>ت</th><th>التصنيف</th><th>المؤلف / العنوان</th><th>إجراء</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
const deweyData = {
    "000 الحاسبات والمعلومات والعموميات": ["000 العموميات", "010 الببليوجرافيات", "020 المكتبات والمعلومات", "030 الموسوعات العامة", "050 الدوريات العامة", "060 المنظمات والمتاحف", "070 الإعلام والصحافة", "080 المجموعات العامة", "090 المخطوطات والكتب النادرة"],
    "100 الفلسفة وعلم النفس": ["100 الفلسفة", "110 الميتافيزيقا", "120 نظرية المعرفة", "130 الظواهر الخارقة", "140 المذاهب الفلسفية", "150 علم النفس", "160 المنطق", "170 الأخلاق", "180 الفلسفة القديمة", "190 الفلسفة الحديثة"],
    "200 الأديان": ["200 الأديان", "210 الفلسفة الدينية", "220 الكتاب المقدس", "230 اللاهوت المسيحي", "240 الشعائر المسيحية", "250 الرهبنة", "260 الكنيسة", "270 التاريخ الكنسي", "280 المذاهب المسيحية", "290 الأديان الأخرى والإسلام"],
    "300 العلوم الاجتماعية": ["300 العلوم الاجتماعية", "310 الإحصاء العام", "320 العلوم السياسية", "330 الاقتصاد", "340 القانون", "350 الإدارة العامة", "360 الخدمات الاجتماعية", "370 التربية والتعليم", "380 التجارة والمواصلات", "390 العادات والتقاليد"],
    "400 اللغات": ["400 اللغات", "410 اللسانيات", "420 اللغة الإنجليزية", "430 اللغات الجرمانية", "440 اللغة الفرنسية", "450 اللغة الإيطالية", "460 اللغة الإسبانية", "470 اللغة اللاتينية", "480 اللغة اليونانية", "490 اللغات الأخرى (العربية)"],
    "500 العلوم الطبيعية": ["500 العلوم الطبيعية", "510 الرياضيات", "520 الفلك", "530 الفيزياء", "540 الكيمياء", "550 علوم الأرض", "560 الأحافير", "570 الأحياء", "580 النباتات", "590 الحيوانات"],
    "600 العلوم التطبيقية": ["600 العلوم التطبيقية", "610 الطب والصحة", "620 الهندسة", "630 الزراعة", "640 الاقتصاد المنزلي", "650 الإدارة والمحاسبة", "660 الهندسة الكيميائية", "670 الصناعات", "680 الصناعات الدقيقة", "690 الإنشاءات"],
    "700 الفنون والترفيه": ["700 الفنون", "710 التخطيط العمراني", "720 العمارة", "730 النحت", "740 الرسم والتصميم", "750 التصوير الزيتي", "760 الفنون الجرافيكية", "770 التصوير الفوتوغرافي", "780 الموسيقى", "790 الألعاب والترفيه"],
    "800 الآداب": ["800 الآداب", "810 الأدب الأمريكي", "820 الأدب الإنجليزي", "830 الأدب الألماني", "840 الأدب الفرنسي", "850 الأدب الإيطالي", "860 الأدب الإسباني", "870 الأدب اللاتيني", "880 الأدب اليوناني", "890 آداب اللغات الأخرى"],
    "900 التاريخ والجغرافيا": ["900 التاريخ والجغرافيا", "910 الجغرافيا والرحلات", "920 التراجم والأنساب", "930 التاريخ القديم", "940 تاريخ أوروبا", "950 تاريخ آسيا", "960 تاريخ أفريقيا", "970 تاريخ أمريكا الشمالية", "980 تاريخ أمريكا الجنوبية", "990 تاريخ المناطق الأخرى"]
};

let projs = JSON.parse(localStorage.getItem('L_P')) || ['كشاف_المجلات'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIdx = -1;

function updateDewey10() {
    let m = document.getElementById('dewey100').value;
    let s = document.getElementById('dewey10');
    s.innerHTML = deweyData[m].map(x => `<option value="${x}">${x}</option>`).join('');
}

function initDewey() {
    let m = document.getElementById('dewey100');
    m.innerHTML = Object.keys(deweyData).map(x => `<option value="${x}">${x}</option>`).join('');
    updateDewey10();
}

const g = (v) => (v && v !== 'undefined') ? v.toString().trim() : "";

function draw() {
    // الترتيب حسب تصنيف ديوي العشري أولاً ثم المؤلف
    recs.sort((a,b) => {
        let cmp = g(a.dewey10).localeCompare(g(b.dewey10));
        return cmp !== 0 ? cmp : g(a.author).localeCompare(g(b.author), 'ar');
    });
    
    let counter = 1;
    recs.forEach(r => r.finalID = counter++);
    
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `
        <tr>
            <td>${r.finalID}</td>
            <td>${g(r.dewey10)}</td>
            <td style="text-align:right"><b>${g(r.author)}</b> - ${g(r.title)}</td>
            <td><button onclick="edit(${i})">تعديل</button> <button onclick="del(${i})">حذف</button></td>
        </tr>
    `).join('');
    
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
}

function save() {
    let d = {};
    document.querySelectorAll('.in').forEach(i => d[i.id] = i.value);
    if(!d.author || !d.title) return alert("المؤلف والعنوان مطلوبان");
    if(editIdx > -1) recs[editIdx] = d; else recs.push(d);
    editIdx = -1;
    document.getElementById('bForm').reset();
    initDewey();
    draw();
}

function edit(i) {
    editIdx = i;
    let r = recs[i];
    document.getElementById('dewey100').value = r.dewey100;
    updateDewey10();
    document.querySelectorAll('.in').forEach(inp => { if(r[inp.id]) inp.value = r[inp.id]; });
    window.scrollTo(0,0);
}

function openBiblio() {
    const win = window.open('', '_blank');
    let html = `<html dir="rtl"><head><style>
        body { font-family: 'Times New Roman'; padding: 50px; }
        .dewey-section { background: #f9f9f9; text-align: center; font-weight: bold; font-size: 14pt; padding: 10px; margin: 30px 0; border: 1px solid #ddd; }
        .entry-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 12pt; margin-top: 20px; }
        .entry-details { font-size: 12pt; line-height: 1.5; margin-bottom: 25px; text-align: justify; }
    </style></head><body>`;

    let lastDewey = "";
    recs.forEach(r => {
        if (g(r.dewey10) !== lastDewey) {
            html += `<div class="dewey-section">${g(r.dewey10)}</div>`;
            lastDewey = g(r.dewey10);
        }
        
        // السطر الأول: المؤلف (يمين) والرقم (يسار)
        html += `<div class="entry-header"><span>${g(r.author)}</span><span>${r.finalID}</span></div>`;
        
        // السطر الثاني: بقية البيانات
        let collab = g(r.collab);
        let trans = g(r.translator);
        let resp = "";
        if(collab) resp += " / " + collab;
        if(trans) resp += (resp ? " ؛ ترجمة " : "ترجمة ") + trans;
        
        let journalPart = [g(r.journal), g(r.issue), g(r.year)].filter(x=>x).join('، ');
        let pages = g(r.pages) ? " . ـــ ص " + g(r.pages) : "";
        
        html += `<div class="entry-details">${g(r.title)}${resp} . ـــ ${journalPart}${pages}.</div>`;
    });

    win.document.write(html + "</body></html>");
    win.document.close();
}

function runIdx(type) {
    let m = {};
    recs.forEach(r => {
        let names = [];
        if(type === 'author') {
            names = [g(r.author)];
            if(g(r.collab)) names = names.concat(g(r.collab).split('،').map(n=>n.trim()));
            if(g(r.translator)) names = names.concat(g(r.translator).split('،').map(n=>n.trim()));
        } else {
            names = [g(r[type])];
        }
        
        names.forEach(n => {
            if(n) {
                if(!m[n]) m[n] = [];
                if(!m[n].includes(r.finalID)) m[n].push(r.finalID);
            }
        });
    });
    
    let keys = Object.keys(m).sort((a,b) => a.localeCompare(b, 'ar'));
    let out = `<h2>كشاف ${type === 'author' ? 'المؤلفين' : 'العناوين'}</h2><div style="column-count:2">` + 
              keys.map(k => `<div>${k} (${m[k].join(', ')})</div>`).join('') + `</div>`;
    document.getElementById('modalBody').innerHTML = out;
    document.getElementById('modalOverlay').style.display = 'block';
}

function journalList() {
    let m = {};
    recs.forEach(r => {
        let key = g(r.journal);
        if(key) m[key] = g(r.affiliation);
    });
    let out = `<h2>قائمة المجلات</h2>` + Object.keys(m).map(k => `<div><b>${k}</b> (${m[k] || 'بدون تبعية'})</div>`).join('');
    document.getElementById('modalBody').innerHTML = out;
    document.getElementById('modalOverlay').style.display = 'block';
}

function runSubjectIdx() {
    let m = {};
    recs.forEach(r => {
        let s = g(r.dewey10);
        if(s) {
            if(!m[s]) m[s] = [];
            m[s].push(r.finalID);
        }
    });
    let out = `<h2>رؤوس الموضوعات (ديوي)</h2>` + Object.keys(m).map(k => {
        let nums = m[k].sort((a,b)=>a-b);
        let range = nums.length > 1 ? `${nums[0]}-${nums[nums.length-1]}` : nums[0];
        return `<div>${k} (${range})</div>`;
    }).join('');
    document.getElementById('modalBody').innerHTML = out;
    document.getElementById('modalOverlay').style.display = 'block';
}

function closeM() { document.getElementById('modalOverlay').style.display='none'; }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
function del(i) { if(confirm("حذف؟")) { recs.splice(i,1); draw(); } }
function newP() { let n = prompt("المشروع:"); if(n) { projs.push(n); curP=n; recs=[]; draw(); } }
function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${curP}.xlsx`); }

window.onload = () => { initDewey(); draw(); };
</script>
</body>
</html>
