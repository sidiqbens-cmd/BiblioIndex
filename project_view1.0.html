<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ببليوإندكس</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; padding: 5px; table-layout: fixed; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 26px; font-size: 13px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 8px; display: flex; justify-content: center; gap: 6px; border-bottom: 2px solid #2c3e50; flex-wrap: wrap; }
        .btn { padding: 5px 12px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 310px; height: calc(100vh - 320px); overflow-y: auto; padding: 10px; }
        .admin-table { border-collapse: collapse; background: #fff; font-size: 12px; width: 100%; table-layout: fixed; }
        .admin-table th { position: sticky; top: 0; background: #34495e; color: white; padding: 8px; border: 1px solid #2c3e50; }
        .admin-table td { border: 1px solid #ccc; padding: 6px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; }
        .modal-content { background:white; width:90%; margin:1% auto; padding:20px; height: 85vh; overflow-y: auto; border-radius: 8px; border: 2px solid #34495e; }
        .column-wrapper { column-count: 2; column-gap: 30px; line-height: 1.4; text-align: justify; }
        .bib-entry { margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #eee; font-size: 14px; }
        .subject-header { background: #f0f0f0; padding: 5px; margin-top: 15px; border-right: 5px solid #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#34495e; color:white; padding:6px 15px;">
        <strong style="font-size: 18px;">ببليوإندكس - الفهرس الليبي الموحد</strong>
        <div style="display:flex; gap:8px;">
            <button onclick="document.getElementById('xlIn').click()" class="btn" style="background:#e67e22">استيراد XLSX</button>
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير XLSX</button>
            <input type="file" id="xlIn" style="display:none" onchange="importX(event)">
            <button onclick="newP()" class="btn" style="background:#27ae60">+ مشروع جديد</button>
            <select id="pSel" style="width:160px" onchange="switchP(this.value)"></select>
            <button onclick="delP()" class="btn" style="background:#c0392b">حذف المشروع</button>
        </div>
    </div>

    <form id="bForm">
        <div style="background:#bdc3c7; padding:8px; display:flex; gap:20px; justify-content:center; border-bottom:2px solid #7f8c8d;">
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="field-label" style="margin:0">تصنيف المئوي (100):</span>
                <select id="dewey_hundred" class="in" style="width:250px" onchange="updateDeweyDecimal(this.value)">
                    <option value="">-- اختر الأصل المئوي --</option>
                    <option value="000">000 الأعمال العامة</option>
                    <option value="100">100 الفلسفة والعلوم المتصلة</option>
                    <option value="200">200 الديانات</option>
                    <option value="300">300 العلوم الاجتماعية</option>
                    <option value="400">400 اللغات</option>
                    <option value="500">500 العلوم البحتة</option>
                    <option value="600">600 العلوم التطبيقية</option>
                    <option value="700">700 الفنون الجميلة</option>
                    <option value="800">800 الآداب</option>
                    <option value="900">900 الجغرافيا والتاريخ</option>
                </select>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="field-label" style="margin:0">تصنيف العشري (020):</span>
                <select id="dewey_decimal" class="in" style="width:320px">
                    <option value="">-- اختر القسم العشري --</option>
                </select>
            </div>
        </div>

        <table class="input-table">
            <tr>
                <td><span class="field-label">رأس الموضوع</span><input type="text" id="subject" list="subjectsList" class="in"></td>
                <td><span class="field-label">إحالة انظر</span><input type="text" id="see" list="subjectsList" class="in"></td>
                <td><span class="field-label">إحالة انظر أيضاً</span><input type="text" id="see_also" list="subjectsList" class="in"></td>
                <td><span class="field-label">المؤلف الأصلي</span><input type="text" id="original_author" class="in"></td>
                <td><span class="field-label">المؤلف (مقلوب)</span><input type="text" id="author" class="in"></td>
                <td><span class="field-label">الدولة</span><input type="text" id="country" class="in"></td>
            </tr>
            <tr>
                <td colspan="3"><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
                <td><span class="field-label">المجلة</span><input type="text" id="journal" class="in"></td>
                <td><span class="field-label">العدد</span><input type="text" id="issue" class="in"></td>
                <td><span class="field-label">السنة</span><input type="text" id="year" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">طبعة</span><input type="text" id="edition" class="in"></td>
                <td><span class="field-label">التبعية</span><input type="text" id="affiliation" class="in"></td>
                <td><span class="field-label">الناشر</span><input type="text" id="publisher" class="in"></td>
                <td><span class="field-label">نوع الوعاء</span><input type="text" id="material_type" class="in"></td>
                <td><span class="field-label">مترجم كشاف</span><input type="text" id="trans_idx" class="in"></td>
                <td><span class="field-label">الصفحات</span><input type="text" id="pages" class="in"></td>
            </tr>
            <tr>
                <td colspan="3"><span class="field-label">ملاحظات 1</span><input type="text" id="note1" class="in"></td>
                <td colspan="3"><span class="field-label">ملاحظات 2</span><input type="text" id="note2" class="in"></td>
            </tr>
        </table>
        <datalist id="subjectsList"></datalist>
        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ السجل</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="viewFinal()">المعاينة النهائية</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runAuthorIdx()">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('title', 'العناوين')">كشاف العناوين</button>
            <button type="button" class="btn" style="background:#c0392b" onclick="runIdx('trans_idx', 'المترجمين')">كشاف المترجمين</button>
            <button type="button" class="btn" style="background:#16a085" onclick="journalIdx()">قائمة المجلات</button>
            <button type="button" class="btn" style="background:#2980b9" onclick="runIdx('subject', 'الموضوعات')">رؤوس الموضوعات</button>
        </div>
    </form>
</div>

<div id="modalOverlay">
    <div style="padding: 10px; background: #2c3e50; color:white; display: flex; justify-content: space-between; align-items: center;">
        <strong id="modalTitle">المعاينة</strong>
        <button onclick="closeM()" class="btn" style="background:#c0392b;">إغلاق (X)</button>
    </div>
    <div class="modal-content" id="modalBody"></div>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <thead>
            <tr>
                <th style="width:50px;">رقم</th>
                <th style="width:200px;">رأس الموضوع</th>
                <th>تفاصيل السجل</th>
                <th style="width:120px;">إجراءات</th>
            </tr>
        </thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
// مصفوفة ديوي
const deweyMap = {
    "000": ["000 الأعمال العامة", "010 الببليوجرافيات والفهارس", "020 علوم المكتبات والمعلومات", "030 الموسوعات ودوائر المعارف", "050 الدوريات العامة", "060 الجمعيات العامة وعلم المتاحف", "070 الصحافة والنشر", "080 المجموعات العامة", "090 المخطوطات والكتب النادرة"],
    "100": ["100 الفلسفة والعلوم المتصلة بها", "110 ما وراء الطبيعة", "120 المعرفة_السببية_الغرض", "130 الظواهر غير الطبيعية", "140 المذاهب والمدارس الفلسفية", "150 علم النفس", "160 المنطق", "170 علم الأخلاق", "180 الفلسفات القديمة والشرقية", "190 الفلسفة الغربية الحديثة"],
    "200": ["200 الديانات", "210 الدين الإسلامي", "220 العلوم القرآنية", "230 الحديث الشريف وعلومه", "240 التوحيد وأصول الدين", "250 الفقه الإسلامي", "260 التصوف الإسلامي", "270 المباحث العامة في المسيحية", "280 الفرق والمذاهب المسيحية", "290 الأديان الأخرى"],
    "300": ["300 العلوم الاجتماعية", "310 الإحصاء", "320 العلوم السياسية", "330 الاقتصاد", "340 القانون", "350 الإدارة العامة والعلوم العسكرية", "360 الخدمات الاجتماعية", "370 التربية والتعليم", "380 التجارة والنقل والمواصلات", "390 العادات والتقاليد والفلكلور"],
    "400": ["400 اللغات", "410 اللغة العربية", "420 اللغة الانكليزية", "430 اللغة الألمانية", "440 اللغة الفرنسية", "450 اللغة الإيطالية", "460 اللغة الإسبانية", "470 اللغة اللاتينية", "480 اللغة اليونانية القديمة", "490 اللغات الأخرى"],
    "500": ["500 العلوم البحتة", "510 الرياضيات", "520 الفلك", "530 الفيزياء", "540 الكيمياء والعلوم المتصلة بها", "550 علوم الأرض (الجيولوجيا)", "560 الحفريات", "570 علوم الحياة والإنسان", "580 العلوم النباتية", "590 العلوم الحيوانية"],
    "600": ["600 العلوم التطبيقية", "610 العلوم الطبية", "620 العلوم الهندسية", "630 العلوم الزراعية", "640 الاقتصاد المنزلي", "650 إدارة الأعمال", "660 الكيمياء التكنولوجية", "670 الصناعات", "680 مصنوعات متفرقة", "690 المباني"],
    "700": ["700 الفنون الجميلة", "710 فن المناطق المدنية والخلوية", "720 العمارة", "730 الفنون التشكيلية والنحت", "740 الرسم والفنون الزخرفية", "750 التلوين واللوحات الزيتية", "760 الطباعة والمطبوعات", "770 التصوير الفوتوغرافي", "780 الموسيقى", "790 الفنون الترفيهية الاستعراضية"],
    "800": ["800 الآداب", "810 الأدب العربي", "820 الأدب الإنكليزي", "830 الأدب الألماني", "840 الأدب الفرنسي", "850 الأدب الإيطالي", "860 الأدب الإسباني والبرتغالي", "870 الأدب اللاتيني", "880 الأدب اليوناني", "890 آداب اللغات الأخرى"],
    "900": ["900 الجغرافيا والتاريخ العام", "910 الجغرافيا والرحلات", "911 الجغرافية التاريخية", "912 المصورات لسطح الأرض", "913 جغرافية العالم القديم", "914 جغرافية أوروبا", "915 جغرافية أسيا", "916 جغرافية أفريقيا", "917 جغرافية أمريكا الشمالية", "918 جغرافية أمريكا الجنوبية", "919 جغرافية المناطق الأخرى", "920 التراجم", "930 التاريخ القديم", "940 تاريخ أوروبا الحديث", "950 تاريخ أسيا الحديث", "960 تاريخ أفريقيا الحديث", "970 تاريخ أمريكا الشمالية", "980 تاريخ أمريكا الجنوبية", "990 تاريخ المناطق الأخرى"]
};

function updateDeweyDecimal(val) {
    const d = document.getElementById('dewey_decimal');
    d.innerHTML = '<option value="">-- اختر القسم العشري --</option>';
    if (deweyMap[val]) deweyMap[val].forEach(v => { let o = document.createElement('option'); o.value = v; o.innerText = v; d.appendChild(o); });
}

// دالة المعاينة النهائية المصلحة والمؤمنة
function viewFinal() {
    if (recs.length === 0) { alert("لا توجد بيانات حالياً"); return; }
    let h = `<div class="column-wrapper">`;
    let lastSub = "";
    recs.forEach(r => {
        if (r.subject !== lastSub) {
            lastSub = r.subject;
            h += `<div class="subject-header">${lastSub}</div>`;
        }
        if (r.title) {
            h += `<div class="bib-entry">
                <b>${r.finalID || ''}. ${r.author || ''}.</b> ${r.title}. 
                ${r.journal ? '<i>' + r.journal + '</i>. ' : ''} 
                ${r.issue ? 'ع ' + r.issue + '. ' : ''}
                ${r.publisher ? r.publisher + '. ' : ''}
                ${r.year ? r.year + '. ' : ''}
                ${r.pages ? 'ص ' + r.pages + '.' : ''}
            </div>`;
        } else if (r.see) {
            h += `<div style="margin-right:15px; font-size:13px;"> انظر: ${r.see}</div>`;
        } else if (r.see_also) {
            h += `<div style="margin-right:15px; font-size:13px;"> انظر أيضاً: ${r.see_also}</div>`;
        }
    });
    document.getElementById('modalTitle').innerText = "المعاينة الببليوغرافية النهائية";
    document.getElementById('modalBody').innerHTML = h + `</div>`;
    document.getElementById('modalOverlay').style.display = 'block';
}

// بقية المنطق المستقر
let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_1'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIndex = -1;
const cleanAL = (s) => s ? s.replace(/^(ال)/, '').trim() : '';

function draw() {
    recs.sort((a,b) => cleanAL(a.subject||'').localeCompare(cleanAL(b.subject||''), 'ar'));
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    let counter = 1;
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => {
        r.finalID = (r.see || r.see_also) && !r.title ? null : counter++;
        let info = r.title ? `<b>${r.author || ''}</b> - ${r.title}` : (r.see ? `انظر: ${r.see}` : `انظر أيضاً: ${r.see_also}`);
        return `<tr><td>${r.finalID || '-'}</td><td>${r.subject}</td><td>${info}</td><td><button onclick="edit(${i})">تعديل</button><button onclick="deleteRec(${i})" style="color:red">حذف</button></td></tr>`;
    }).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
}

function save() { 
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim()); 
    if(!d.subject) { alert("رأس الموضوع إلزامي"); return; } 
    if (editIndex > -1) recs[editIndex] = d; else recs.push(d); 
    editIndex = -1; draw(); document.getElementById('bForm').reset(); 
}

function edit(i) { 
    editIndex = i; let r = recs[i]; 
    document.querySelectorAll('.in').forEach(inp => inp.value = r[inp.id] || ''); 
    if(r.dewey_hundred) { updateDeweyDecimal(r.dewey_hundred); document.getElementById('dewey_decimal').value = r.dewey_decimal || ''; }
    window.scrollTo(0,0); 
}

function splitSlash(str) { return str ? str.split('/').map(s => s.trim()).filter(s => s) : []; }
function runIdx(f, l) {
    let m = {}; const used = new Set(recs.filter(r => r.title).map(r => r.subject.trim()));
    recs.forEach(r => { 
        let rawV = r[f] ? r[f].trim() : '';
        if (rawV) {
            let vArr = (f === 'subject') ? [rawV] : splitSlash(rawV);
            vArr.forEach(v => {
                if (f === 'subject') {
                    if (r.see && used.has(r.see.trim())) v = `${v} انظر: ${r.see}`;
                    else if (r.see_also && used.has(r.see_also.trim())) v = `${v} انظر أيضاً: ${r.see_also}`;
                    else if (!r.title) return;
                }
                if(!m[v]) m[v] = []; if(r.finalID && !m[v].includes(r.finalID)) m[v].push(r.finalID);
            });
        }
    });
    renderIdx(m, l);
}

function runAuthorIdx() {
    let m = {};
    recs.forEach(r => {
        if (r.finalID) {
            let names = [...new Set(splitSlash(r.author))];
            names.forEach(n => { if(!m[n]) m[n]=[]; if(!m[n].includes(r.finalID)) m[n].push(r.finalID); });
        }
    });
    renderIdx(m, "المؤلفين");
}

function journalIdx() {
    let m = {}; let affs = {};
    recs.forEach(r => { if(r.journal && r.affiliation) affs[r.journal.trim()] = r.affiliation.trim(); });
    recs.forEach(r => { if(r.journal && r.finalID) { 
        let j = r.journal.trim(); 
        let k = j + (r.affiliation ? ` (${r.affiliation})` : (affs[j] ? ` (${affs[j]})` : ""));
        if(!m[k]) m[k]=[]; if(!m[k].includes(r.finalID)) m[k].push(r.finalID);
    }});
    renderIdx(m, "المجلات");
}

function renderIdx(m, title) {
    let k = Object.keys(m).sort((a,b)=>cleanAL(a).localeCompare(cleanAL(b),'ar'));
    let h = `<div class="column-wrapper">`;
    k.forEach(x => h += `<div>${x} (${m[x].join(', ')})</div>`);
    document.getElementById('modalTitle').innerText = "كشاف " + title;
    document.getElementById('modalBody').innerHTML = h + `</div>`;
    document.getElementById('modalOverlay').style.display='block';
}

function closeM() { document.getElementById('modalOverlay').style.display='none'; }
function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, `${curP}.xlsx`); }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
function newP() { let n = prompt("المشروع الجديد:"); if(n) { if(!projs.includes(n)) projs.push(n); curP=n; recs=[]; draw(); } }
function delP() { if(confirm("حذف؟")) { projs = projs.filter(p=>p!==curP); curP=projs[0]||'مشروع_1'; recs=JSON.parse(localStorage.getItem('R_'+curP))||[]; draw(); } }
function importX(e) { const reader = new FileReader(); reader.onload = (evt) => { recs = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, {type:'binary'}).Sheets[XLSX.read(evt.target.result, {type:'binary'}).SheetNames[0]]); draw(); }; reader.readAsBinaryString(e.target.files[0]); }
window.onload = draw;
</script>
</body>
</html>
