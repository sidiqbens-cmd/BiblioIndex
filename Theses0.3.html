<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الفهرس الليبي الموحد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #eceef1; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 2px solid #000; }
        .input-table { width: 100%; background: #cfcfcf; border-spacing: 2px; padding: 5px; table-layout: fixed; }
        .field-label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 26px; font-size: 13px; font-weight: bold; border: 1px solid #999; text-align: right; box-sizing: border-box; }
        .actions { background: #cfcfcf; text-align: center; padding: 8px; display: flex; justify-content: center; gap: 6px; border-bottom: 2px solid #2c3e50; flex-wrap: wrap; }
        .btn { padding: 5px 12px; cursor: pointer; border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 275px; height: calc(100vh - 285px); overflow-y: auto; padding: 10px; }
        .admin-table { border-collapse: collapse; background: #fff; font-size: 12px; width: 100%; table-layout: fixed; }
        .admin-table th { position: sticky; top: 0; background: #34495e; color: white; padding: 8px; border: 1px solid #2c3e50; }
        .admin-table td { border: 1px solid #ccc; padding: 6px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; }
        .modal-content { background:white; width:90%; margin:1% auto; padding:20px; height: 85vh; overflow-y: auto; }
        .column-wrapper { column-count: 2; column-gap: 30px; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#34495e; color:white; padding:6px 15px;">
        <strong style="font-size: 18px;">الفهرس الليبي الموحد</strong>
        <div style="display:flex; gap:8px;">
            <button onclick="copyRec()" class="btn" style="background:#7f8c8d">نسخ</button>
            <button onclick="pasteRec()" class="btn" style="background:#95a5a6">لصق</button>
            <button onclick="newP()" class="btn" style="background:#27ae60">+ مشروع</button>
            <select id="pSel" style="width:100px" onchange="switchP(this.value)"></select>
        </div>
    </div>
    <form id="bForm">
        <table class="input-table">
            <tr>
                <td><span class="field-label">رأس الموضوع</span><input type="text" id="subject" list="list_subject" class="in"></td>
                <td><span class="field-label">إحالة انظر</span><input type="text" id="see" list="list_subject" class="in"></td>
                <td><span class="field-label">إحالة انظر أيضاً</span><input type="text" id="see_also" list="list_subject" class="in"></td>
                <td><span class="field-label">اسم الطالب</span><input type="text" id="author" class="in"></td>
            </tr>
            <tr>
                <td colspan="2"><span class="field-label">العنوان</span><input type="text" id="title" class="in"></td>
                <td><span class="field-label">المشرف</span><input type="text" id="editor" list="list_editor" class="in"></td>
                <td><span class="field-label">نوع الرسالة</span><input type="text" id="material_type" list="list_material" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">القسم</span><input type="text" id="dept" list="list_dept" class="in"></td>
                <td><span class="field-label">الكلية</span><input type="text" id="faculty" list="list_faculty" class="in"></td>
                <td><span class="field-label">الجامعة</span><input type="text" id="uni" list="list_uni" class="in"></td>
                <td><span class="field-label">السنة</span><input type="text" id="year" class="in"></td>
            </tr>
        </table>
        <div id="datalistsContainer"></div>
        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ السجل</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="openBiblioWindow()">المعاينة النهائية</button>
        </div>
    </form>
</div>

<div class="scroll-area">
    <table class="admin-table">
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script>
let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_1'];
let curP = localStorage.getItem('L_A') || projs[0];
let recs = JSON.parse(localStorage.getItem('R_' + curP)) || [];
let editIndex = -1;

const cleanSort = (s) => (s || '').toString().replace(/^(ال)/, '').trim();

function draw() {
    recs.sort((a,b) => cleanSort(a.subject).localeCompare(cleanSort(b.subject), 'ar'));
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    updateAllDatalists();
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `<tr><td>${r.finalID || i+1}</td><td>${r.subject}</td><td>${r.title || 'إحالة'}</td><td><button onclick="edit(${i})">تعديل</button></td></tr>`).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
}

function updateAllDatalists() {
    const fields = ['subject', 'editor', 'material', 'dept', 'faculty', 'uni'];
    let html = fields.map(f => `<datalist id="list_${f}">${[...new Set(recs.map(r=>r[f]).filter(x=>x))].map(v=>`<option value="${v}">`).join('')}</datalist>`).join('');
    document.getElementById('datalistsContainer').innerHTML = html;
}

function save() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    if(!d.subject) return alert("الرأس إلزامي");
    if(editIndex > -1) recs[editIndex] = d; else { d.finalID = recs.length + 1; recs.push(d); }
    editIndex = -1; document.getElementById('bForm').reset(); draw();
}

function openBiblioWindow() {
    const win = window.open('', '_blank');
    let content = `<html dir="rtl"><head><style>body{font-family:'Times New Roman'; padding:40px; font-size:13pt;} .sub{background:#e0e0e0; font-weight:bold; padding:5px; margin-top:20px; font-size:14pt; text-align:center;} .ref{background:#f2f2f2; font-weight:bold; padding:5px; text-align:center; font-size:13pt;} .ent{margin-bottom:15px; text-align:justify;}</style></head><body>`;
    
    let grouped = {};
    recs.forEach(r => {
        if(!grouped[r.subject]) grouped[r.subject] = {items:[], see:[], see_also:[]};
        if(r.title) grouped[r.subject].items.push(r);
        if(r.see) grouped[r.subject].see.push(r.see);
        if(r.see_also) grouped[r.subject].see_also.push(r.see_also);
    });

    Object.keys(grouped).sort((a,b)=>cleanSort(a).localeCompare(cleanSort(b), 'ar')).forEach(sub => {
        content += `<div class="sub">${sub}</div>`;
        grouped[sub].see.forEach(s => content += `<div class="ref">${sub} أنظر: ${s}</div>`);
        grouped[sub].see_also.forEach(s => content += `<div class="ref" style="font-size:12pt; background:#eee;">انظر أيضاً: ${s}</div>`);
        grouped[sub].items.forEach(r => {
            let details = [r.dept?"قسم "+r.dept:"", r.faculty?"كلية "+r.faculty:"", r.uni?"جامعة "+r.uni:"", r.year].filter(x=>x).join("، ");
            content += `<div class="ent"><b>(${r.finalID}) ${r.author}</b><br>${r.title} ${r.editor?' / إشراف '+r.editor:''} . ـــ ${details} . ـــ ${r.material_type||''}</div>`;
        });
    });
    win.document.write(content + '</body></html>'); win.document.close();
}

window.onload = draw;
function edit(i) { editIndex = i; Object.keys(recs[i]).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = recs[i][k]; }); }
function newP() { let n = prompt("اسم المشروع:"); if(n) { projs.push(n); curP=n; recs=[]; draw(); } }
function switchP(v) { curP=v; recs=JSON.parse(localStorage.getItem('R_'+v))||[]; draw(); }
</script>
</body>
</html>
