<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ببليوإندكس - متخصص الذكاء الاصطناعي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; margin: 0; padding: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: #2c3e50; z-index: 1000; border-bottom: 3px solid #1a252f; }
        .input-table { width: 100%; background: #d1d8e0; border-spacing: 2px; padding: 8px; table-layout: fixed; }
        .field-label { font-size: 11px; font-weight: bold; color: #2f3542; display: block; margin-bottom: 2px; }
        input, select { width: 100%; height: 28px; font-size: 13px; font-weight: bold; border: 1px solid #a4b0be; text-align: right; box-sizing: border-box; }
        .suggest-btn { background: #f39c12; color: white; border: none; cursor: pointer; font-size: 10px; padding: 0 10px; border-radius: 0 4px 4px 0; }
        .actions { background: #ced6e0; text-align: center; padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 2px solid #2c3e50; }
        .btn { padding: 6px 15px; cursor: pointer; border: none; border-radius: 4px; color: #fff; font-size: 12px; font-weight: bold; }
        .scroll-area { margin-top: 350px; height: calc(100vh - 370px); overflow-y: auto; padding: 15px; }
        .admin-table { border-collapse: collapse; background: #fff; font-size: 12px; width: 100%; table-layout: fixed; }
        .admin-table th { position: sticky; top: 0; background: #34495e; color: white; padding: 10px; border: 1px solid #2c3e50; }
        .admin-table td { border: 1px solid #dcdde1; padding: 8px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; }
        .modal-content { background:white; width:90%; margin:20px auto; padding:30px; height: 80vh; overflow-y: auto; border: 2px solid #000; }
        .bib-container { column-count: 2; column-gap: 40px; text-align: justify; }
        .subject-row { text-align: center; font-size: 14px; font-weight: bold; background: #f1f2f6; margin: 15px 0 5px 0; padding: 5px; border: 1px solid #ccc; }
        .author-line { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 0.5px solid #eee; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#1e272e; color:white; padding:8px 20px;">
        <strong style="font-size: 18px;">ببليوإندكس: الذكاء الاصطناعي في العالم العربي</strong>
        <div style="display:flex; gap:10px;">
            <button onclick="exportX()" class="btn" style="background:#2980b9">تصدير Excel</button>
            <select id="pSel" style="width:150px;" onchange="switchP(this.value)"></select>
            <button onclick="newP()" class="btn" style="background:#27ae60">+</button>
        </div>
    </div>

    <form id="bForm">
        <table class="input-table">
            <tr>
                <td colspan="3">
                    <span class="field-label">العنوان الكامل للمقالة</span>
                    <div style="display:flex;">
                        <input type="text" id="title" class="in" style="border-radius: 4px 0 0 4px;" oninput="autoSuggest(this.value)">
                        <button type="button" class="suggest-btn" onclick="applySug()">تطبيق الاقتراح</button>
                    </div>
                </td>
                <td>
                    <span class="field-label">رأس الموضوع (المقترح)</span>
                    <input type="text" id="subject" list="list_subject" class="in" placeholder="سيظهر الاقتراح هنا...">
                </td>
                <td><span class="field-label">إحالة انظر أيضاً</span><input type="text" id="see_also" list="list_subject" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">المؤلف (مقلوب) /</span><input type="text" id="author" list="list_author" class="in"></td>
                <td><span class="field-label">المحقق/المترجم /</span><input type="text" id="editor" list="list_editor" class="in"></td>
                <td><span class="field-label">المجلة</span><input type="text" id="journal" list="list_journal" class="in"></td>
                <td><span class="field-label">الناشر/المدينة</span><input type="text" id="publisher" list="list_publisher" class="in"></td>
                <td><span class="field-label">السنة</span><input type="text" id="year" list="list_year" class="in"></td>
            </tr>
            <tr>
                <td><span class="field-label">المجلد/العدد</span><input type="text" id="issue" class="in"></td>
                <td><span class="field-label">الصفحات</span><input type="text" id="pages" class="in"></td>
                <td><span class="field-label">تصنيف ديوي</span><input type="text" id="dewey" class="in"></td>
                <td colspan="2"><span class="field-label">ملاحظات الباحث</span><input type="text" id="note" class="in"></td>
            </tr>
        </table>

        <div class="actions">
            <button type="button" class="btn" style="background:#27ae60" onclick="save()">حفظ التسجيلة</button>
            <button type="button" class="btn" style="background:#8e44ad" onclick="viewPrint()">المعاينة الببليوغرافية</button>
            <button type="button" class="btn" style="background:#2c3e50" onclick="runIdx('author', 'المؤلفين')">كشاف المؤلفين</button>
            <button type="button" class="btn" style="background:#d35400" onclick="runIdx('subject', 'الموضوعات')">كشاف الموضوعات</button>
        </div>
    </form>
</div>

<div id="modalOverlay"><div class="modal-content" id="modalBody"></div><button onclick="closeM()" style="position:fixed; top:10px; left:10px;" class="btn" style="background:red">إغلاق</button></div>

<div class="scroll-area"><table class="admin-table"><thead><tr><th style="width:50px;">#</th><th>الموضوع</th><th>العنوان</th><th style="width:100px;">تحكم</th></tr></thead><tbody id="adminBody"></tbody></table></div>

<script>
// محرك الاقتراحات المتخصص
const aiMap = {
    "قانون": "تشريعات وقوانين", "تشريع": "تشريعات وقوانين", "حوكمة": "الحوكمة الرقمية",
    "استراتيجية": "استراتيجيات وطنية", "سياسة": "سياسات حكومية",
    "تعليم": "تطبيقات تعليمية", "جامع": "تطبيقات تعليمية", "مدرس": "تطبيقات تعليمية",
    "طب": "تطبيقات طبية", "صحة": "تطبيقات طبية", "مرض": "تطبيقات طبية",
    "لغ": "معالجة اللغات الطبيعية", "ترجم": "الترجمة الآلية",
    "أخلاق": "أخلاقيات التقنية", "قيم": "أخلاقيات التقنية",
    "أمن": "الأمن السيبراني", "تزييف": "التزييف العميق",
    "مكتبات": "خدمات مكتبية", "معلومات": "علم المعلومات",
    "اقتصاد": "جوانب اقتصادية", "عمل": "سوق العمل", "وظائف": "سوق العمل"
};

const countries = ["ليبيا", "مصر", "تونس", "الجزائر", "المغرب", "السودان", "السعودية", "الإمارات", "الكويت", "قطر", "البحرين", "عمان", "الأردن", "فلسطين", "لبنان", "سوريا", "العراق", "اليمن"];

let sug = "";

function autoSuggest(t) {
    let topic = "", place = "";
    for (let k in aiMap) if (t.includes(k)) { topic = aiMap[k]; break; }
    for (let c of countries) if (t.includes(c)) { place = c; break; }
    if (topic) {
        sug = topic + (place ? " -- " + place : "");
        document.getElementById('subject').placeholder = "مقترح: " + sug;
    }
}

function applySug() { if(sug) document.getElementById('subject').value = sug; }

// نظام إدارة البيانات
let projs = JSON.parse(localStorage.getItem('L_P')) || ['مشروع_1'], curP = localStorage.getItem('L_A') || projs[0], recs = JSON.parse(localStorage.getItem('R_' + curP)) || [], editId = -1;

function draw() {
    recs.sort((a,b) => (a.subject||'').localeCompare(b.subject||'', 'ar'));
    localStorage.setItem('R_' + curP, JSON.stringify(recs));
    localStorage.setItem('L_P', JSON.stringify(projs));
    localStorage.setItem('L_A', curP);
    let c = 1;
    document.getElementById('adminBody').innerHTML = recs.map((r, i) => `<tr><td>${c++}</td><td>${r.subject}</td><td>${r.title}</td><td><button onclick="edit(${i})">تعديل</button> <button onclick="del(${i})" style="color:red">X</button></td></tr>`).join('');
    document.getElementById('pSel').innerHTML = projs.map(p=>`<option ${p===curP?'selected':''}>${p}</option>`).join('');
}

function save() {
    let d = {}; document.querySelectorAll('.in').forEach(i => d[i.id] = i.value.trim());
    if(!d.title) return;
    if(editId > -1) recs[editId] = d; else recs.push(d);
    editId = -1; document.getElementById('bForm').reset(); draw();
}

function edit(i) {
    editId = i; let r = recs[i];
    document.querySelectorAll('.in').forEach(inp => inp.value = r[inp.id] || '');
    window.scrollTo(0,0);
}

function viewPrint() {
    let h = `<div class="bib-container">`, lastS = "", c = 1;
    recs.forEach(r => {
        if (r.subject && r.subject !== lastS) { 
            lastS = r.subject; 
            h += `<div class="subject-row">${lastS}</div>`;
            if (r.see_also) h += `<div style="text-align:right; font-size:11px;">انظر أيضاً: ${r.see_also}</div>`;
        }
        let auth = r.author || ''; if (r.editor) auth += (auth ? '؛ ' : '') + r.editor;
        h += `<div style="font-size:12px; margin-bottom:10px;">
            <div class="author-line"><span>${auth}</span><span>${c++}</span></div>
            <div><strong>${r.title}.</strong> ${r.journal ? r.journal+'.' : ''} ${r.publisher ? r.publisher+'.' : ''} ${r.year ? r.year+'.' : ''}</div>
        </div>`;
    });
    document.getElementById('modalBody').innerHTML = h + `</div>`;
    document.getElementById('modalOverlay').style.display = 'block';
}

function runIdx(f, label) {
    let m = {}, c = 1;
    recs.forEach(r => {
        let vals = (r[f]||'').split('/');
        vals.map(v=>v.trim()).filter(v=>v).forEach(v => {
            if(!m[v]) m[v]=[]; if(!m[v].includes(c)) m[v].push(c);
        });
        c++;
    });
    let html = `<h2 style="text-align:center">كشاف ${label}</h2><div class="bib-container">`;
    Object.keys(m).sort((a,b)=>a.localeCompare(b, 'ar')).forEach(k => html += `<div>${k} (${m[k].join(', ')})</div>`);
    document.getElementById('modalBody').innerHTML = html + `</div>`;
    document.getElementById('modalOverlay').style.display = 'block';
}

function closeM() { document.getElementById('modalOverlay').style.display = 'none'; }
function switchP(v) { curP = v; recs = JSON.parse(localStorage.getItem('R_' + v)) || []; draw(); }
function newP() { let n = prompt("اسم المشروع:"); if(n) { projs.push(n); curP=n; recs=[]; draw(); } }
function del(i) { if(confirm("حذف؟")) { recs.splice(i,1); draw(); } }
function exportX() { const ws = XLSX.utils.json_to_sheet(recs); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "Biblio_AI_Arab.xlsx"); }

window.onload = draw;
</script>
</body>
</html>
